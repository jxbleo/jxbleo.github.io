<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IELTS Listening Practice</title>
    <style>
        :root {
            --top: #1d2430;
            --top2: #111827;
            --page: #edf2f8;
            --panel: #ffffff;
            --paper: #fbfbfd;
            --line: #cfd8e3;
            --text: #1f2937;
            --muted: #667085;
            --blue: #38bdf8;
            --blue-dark: #0369a1;
            --correct: #e8f8f0;
            --wrong: #fff1f2;
            --wrong-line: #fb7185;
        }
        * { box-sizing: border-box; }
        html, body { height: 100%; }
        body {
            margin: 0;
            overflow: hidden;
            background: var(--page);
            color: var(--text);
            font-family: Arial, Helvetica, sans-serif;
            letter-spacing: 0;
        }
        button, input { font: inherit; }
        .exam-shell {
            display: grid;
            grid-template-rows: 44px 98px minmax(0, 1fr) 78px;
            height: 100dvh;
            background: #e6edf6;
        }
        .exam-topbar {
            display: grid;
            grid-template-columns: minmax(130px, 1fr) auto minmax(180px, 1fr);
            align-items: center;
            gap: 12px;
            padding: 0 14px;
            color: #f8fafc;
            background: linear-gradient(180deg, var(--top), var(--top2));
            box-shadow: inset 0 -1px rgba(255,255,255,.18), 0 1px 4px rgba(15,23,42,.28);
        }
        .candidate {
            min-width: 0;
            color: #cbd5e1;
            font-size: 13px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .timer {
            display: inline-flex;
            align-items: baseline;
            gap: 7px;
            font-weight: 700;
            color: #f8fafc;
        }
        .timer strong { font-size: 25px; line-height: 1; }
        .timer.urgent {
            color: #f87171;
        }
        .top-actions {
            display: flex;
            justify-content: flex-end;
            align-items: center;
            gap: 8px;
        }
        .top-actions button, .teacher-toggle {
            min-height: 28px;
            padding: 0 13px;
            border: 1px solid rgba(255,255,255,.3);
            border-radius: 4px;
            color: #111827;
            background: linear-gradient(180deg, #ffffff, #dbe2ec);
            box-shadow: inset 0 1px #fff;
            font-size: 13px;
            font-weight: 700;
            cursor: pointer;
        }
        body .mrcat-back {
            display: none !important;
        }
        .part-header {
            display: flex;
            flex-direction: column;
            justify-content: center;
            gap: 18px;
            margin: 10px 18px 8px;
            padding: 16px 16px;
            border: 1px solid #d8e0eb;
            background: #fff;
            box-shadow: 0 1px 5px rgba(15,23,42,.08);
        }
        .part-header h1 {
            margin: 0;
            font-size: 24px;
            line-height: 1.1;
            color: #111827;
        }
        .part-header p {
            margin: 0;
            font-size: 15px;
        }
        .workspace {
            min-height: 0;
            margin: 0 18px;
            border: 1px solid #d8e0eb;
            background: var(--paper);
            overflow-y: auto;
            box-shadow: inset 0 0 0 1px rgba(255,255,255,.6);
        }
        .workspace-inner {
            max-width: 980px;
            min-height: 100%;
            padding: 18px 22px 84px;
        }
        .audio-dock {
            display: grid;
            grid-template-columns: auto 1fr auto;
            align-items: center;
            gap: 12px;
            max-width: 760px;
            margin: 0 0 22px;
            padding: 10px 12px;
            border: 1px solid #d8e0eb;
            border-radius: 6px;
            background: #f8fafc;
        }
        .audio-button {
            display: inline-grid;
            place-items: center;
            width: 36px;
            height: 32px;
            border: 1px solid #9fb3c8;
            border-radius: 4px;
            color: #0f172a;
            background: linear-gradient(180deg, #fff, #e2e8f0);
            cursor: pointer;
        }
        .audio-progress {
            width: 100%;
            accent-color: var(--blue-dark);
        }
        .audio-time {
            min-width: 88px;
            color: var(--muted);
            font-size: 13px;
            text-align: right;
        }
        .audio-missing {
            grid-template-columns: auto 1fr;
            color: var(--muted);
        }
        .audio-missing .audio-time {
            text-align: left;
        }
        .question-section {
            margin: 0 0 26px;
            padding: 0 0 8px;
        }
        .question-section h2 {
            margin: 24px 0 28px;
            font-size: 19px;
            color: #111827;
        }
        .section-label {
            margin: 0 0 4px;
            font-size: 16px;
            font-weight: 700;
        }
        .section-instruction {
            margin: 0 0 28px;
            font-size: 15px;
        }
        .example-line {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 12px;
            margin: 4px 0 24px;
        }
        .example-answer {
            display: inline-block;
            min-width: 98px;
            padding: 2px 12px;
            border-bottom: 1px solid #111827;
            text-align: center;
            font-weight: 700;
        }
        .ielts-notes {
            display: grid;
            gap: 14px;
            max-width: 720px;
            margin: 0;
            padding-left: 24px;
            font-size: 15px;
        }
        .ielts-notes ul {
            display: grid;
            gap: 6px;
            margin: 7px 0 0;
            padding-left: 28px;
        }
        .gap-wrap {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            margin: 0 3px;
            vertical-align: middle;
        }
        .gap-num {
            min-width: 19px;
            color: #111827;
            font-weight: 700;
            text-align: center;
        }
        .gap-input {
            width: 132px;
            height: 26px;
            padding: 2px 6px;
            border: 2px solid #b7d3db;
            border-radius: 2px;
            background: #fff;
            outline: none;
            text-align: center;
            font-weight: 700;
        }
        .gap-input:focus {
            border-color: #67c7dc;
            background: #effcff;
        }
        .gap-input.correct {
            border-color: #22c55e;
            background: var(--correct);
        }
        .gap-input.wrong {
            border-color: var(--wrong-line);
            background: var(--wrong);
        }
        .listening-mcq {
            display: grid;
            gap: 18px;
            max-width: 820px;
        }
        .listening-mcq-question {
            display: grid;
            gap: 10px;
        }
        .listening-mcq-stem {
            display: grid;
            grid-template-columns: auto 1fr;
            gap: 10px;
            align-items: start;
            font-size: 15px;
            line-height: 1.45;
        }
        .listening-mcq-number {
            min-width: 24px;
            font-weight: 700;
            color: #111827;
        }
        .listening-mcq-stem p {
            margin: 0;
        }
        .listening-mcq-options {
            display: grid;
            gap: 7px;
            padding-left: 34px;
        }
        .listening-mcq-option {
            display: grid;
            grid-template-columns: auto auto 1fr;
            gap: 8px;
            align-items: start;
            width: fit-content;
            max-width: 100%;
            padding: 4px 8px 4px 4px;
            border: 1px solid transparent;
            border-radius: 4px;
            cursor: pointer;
        }
        .listening-mcq-option input {
            margin-top: 2px;
            accent-color: var(--blue-dark);
        }
        .listening-mcq-option.correct {
            border-color: #86efac;
            background: var(--correct);
        }
        .listening-mcq-option.wrong {
            border-color: var(--wrong-line);
            background: var(--wrong);
        }
        .listening-mcq-letter {
            min-width: 16px;
            font-weight: 700;
            color: #111827;
        }
        .booking-form {
            width: min(920px, 100%);
            border-collapse: collapse;
            background: #fff;
            font-size: 15px;
        }
        .booking-form th,
        .booking-form td {
            padding: 12px 14px;
            border: 1px solid #d5dde8;
            vertical-align: middle;
            text-align: left;
        }
        .booking-form th {
            width: 150px;
            background: #f3f6fb;
            color: #111827;
        }
        .feedback {
            display: none;
            max-width: 620px;
            margin: 8px 0 0;
            padding: 8px 10px;
            border-left: 3px solid var(--wrong-line);
            background: #fff7f7;
            color: #7f1d1d;
            font-size: 13px;
            white-space: pre-line;
        }
        .feedback.show { display: block; }
        .bottom-nav {
            display: grid;
            grid-template-columns: auto 1fr auto;
            align-items: center;
            gap: 12px;
            padding: 8px 18px;
            border-top: 1px solid #cbd5e1;
            background: #e9f0f8;
            box-shadow: 0 -2px 8px rgba(15,23,42,.08);
        }
        .review {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            color: #475569;
            font-size: 13px;
        }
        .question-map {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 6px 14px;
            min-width: 0;
        }
        .part-group {
            display: inline-flex;
            align-items: center;
            gap: 4px;
        }
        .part-label {
            margin-right: 2px;
            font-weight: 700;
            color: #111827;
        }
        .q-nav {
            display: inline-grid;
            place-items: center;
            width: 28px;
            height: 28px;
            border: 1px solid #0f172a;
            border-radius: 3px;
            color: #fff;
            background: linear-gradient(180deg, #2d3748, #05070b);
            font-size: 13px;
            font-weight: 700;
            cursor: pointer;
        }
        .q-nav.active {
            border-color: #0ea5e9;
            background: linear-gradient(180deg, #7dd3fc, #0284c7);
        }
        .q-nav.answered::after {
            content: "";
            position: absolute;
        }
        .submit-btn {
            min-width: 112px;
            min-height: 44px;
            border: 0;
            border-radius: 999px;
            color: #fff;
            background: #0f172a;
            font-weight: 800;
            cursor: pointer;
            box-shadow: 0 10px 20px rgba(15,23,42,.22);
        }
        .submit-btn:disabled {
            opacity: .58;
            cursor: not-allowed;
            box-shadow: none;
        }
        .result-bar {
            position: fixed;
            left: 50%;
            bottom: 90px;
            transform: translateX(-50%);
            z-index: 20;
            display: none;
            width: min(520px, calc(100% - 32px));
            padding: 14px 16px;
            border: 1px solid #d8e0eb;
            border-radius: 8px;
            background: #fff;
            box-shadow: 0 18px 50px rgba(15,23,42,.22);
            text-align: center;
        }
        .result-bar.show { display: block; }
        .result-bar strong { display: block; font-size: 18px; }
        .result-bar span { display: block; margin-top: 3px; color: var(--muted); }
        .toolbar {
            position: fixed;
            right: 18px;
            bottom: 92px;
            z-index: 30;
            display: none;
            gap: 8px;
        }
        .toolbar.show { display: flex; }
        .toolbar button {
            min-height: 36px;
            padding: 0 14px;
            border: 1px solid #d8e0eb;
            border-radius: 999px;
            background: #fff;
            color: #111827;
            font-weight: 800;
            cursor: pointer;
            box-shadow: 0 10px 24px rgba(15,23,42,.12);
        }
        .error {
            padding: 26px;
            color: #9f1239;
            font-weight: 700;
        }
        @media (max-width: 820px) {
            body { overflow: hidden; }
            .exam-shell { grid-template-rows: 42px 86px minmax(0, 1fr) 112px; }
            .exam-topbar {
                grid-template-columns: minmax(76px, 1fr) auto minmax(96px, 1fr);
                gap: 8px;
                padding: 0 8px;
            }
            .candidate { font-size: 11px; }
            .timer { gap: 4px; }
            .timer strong { font-size: 20px; }
            .timer span { font-size: 11px; }
            .top-actions { gap: 4px; }
            .top-actions button {
                min-height: 27px;
                padding: 0 7px;
                font-size: 11px;
            }
            .part-header { margin: 8px; padding: 12px; gap: 10px; }
            .part-header h1 { font-size: 21px; }
            .workspace { margin: 0 8px; }
            .workspace-inner { padding: 14px 14px 110px; }
            .audio-dock { grid-template-columns: auto 1fr; }
            .audio-time { grid-column: 1 / -1; text-align: left; }
            .booking-form, .booking-form tbody, .booking-form tr, .booking-form th, .booking-form td {
                display: block;
                width: 100%;
            }
            .booking-form tr { border: 1px solid #d5dde8; border-bottom: 0; }
            .booking-form th, .booking-form td { border: 0; }
            .booking-form th { padding-bottom: 4px; }
            .booking-form td { padding-top: 4px; }
            .bottom-nav {
                grid-template-columns: 1fr auto;
                grid-template-rows: auto auto;
            }
            .review { grid-column: 1 / -1; }
            .question-map { max-height: 54px; overflow: auto; }
            .q-nav { width: 26px; height: 26px; }
            .submit-btn { min-width: 92px; }
        }
    </style>
</head>
<body>
<main class="exam-shell">
    <header class="exam-topbar">
        <div class="candidate" id="set-code">C7-T1-S1</div>
        <div class="timer" id="timer-display" aria-live="polite"><strong id="time-left">--</strong><span id="time-left-label">minutes left</span></div>
        <div class="top-actions">
            <button type="button" id="dashboard-btn">Dashboard</button>
            <button type="button">Settings</button>
            <button type="button">Help</button>
        </div>
    </header>
    <section class="part-header">
        <h1 id="part-title">Part 1</h1>
        <p id="part-intro">Listen and answer questions 1-10.</p>
    </section>
    <section class="workspace" id="workspace">
        <div class="workspace-inner" id="content"><p class="error">Loading listening practice...</p></div>
    </section>
    <nav class="bottom-nav" aria-label="Question navigation">
        <label class="review"><input id="review-checkbox" type="checkbox"> Review</label>
        <div class="question-map" id="question-map"></div>
        <button class="submit-btn" id="submit-btn" type="button">Submit</button>
    </nav>
</main>
<div class="toolbar" id="teacher-toolbar">
    <button type="button" id="teacher-show-answers">Show Answers</button>
</div>
<div class="result-bar" id="result-bar" role="status" aria-live="polite"></div>

<script src="https://static.cloudbase.net/cloudbase-js-sdk/2.28.6/cloudbase.full.js"></script>
<script src="assets/js/config.public.js?v=20260614-1"></script>
<script src="assets/js/cloudbase-client.js?v=20260611-2"></script>
<script src="assets/js/practice-session.js?v=20260611-2"></script>
<script>
(function() {
    'use strict';

    var params = new URLSearchParams(window.location.search);
    var setId = params.get('set') || 'C7-T1-S1';
    var assignmentId = params.get('assignment') || '';
    var teacherMode = params.get('teacher') === '1';
    var startedAt = new Date().toISOString();
    var lesson = null;
    var questionMap = {};
    var teacherAnswerKey = null;
    var teacherAnswersVisible = false;
    var audioTimerInterval = null;

    function escapeHtml(value) {
        return String(value == null ? '' : value)
            .replace(/&/g, '&amp;')
            .replace(/</g, '&lt;')
            .replace(/>/g, '&gt;')
            .replace(/"/g, '&quot;')
            .replace(/'/g, '&#39;');
    }

    function questionById(id) {
        return questionMap[id] || { id: id, number: String(id).replace(/\D/g, '') || id };
    }

    function inputHtml(questionId) {
        var question = questionById(questionId);
        return '<span class="gap-wrap" id="wrap-' + escapeHtml(questionId) + '">' +
            '<span class="gap-num">' + escapeHtml(question.number) + '</span>' +
            '<input class="gap-input" name="' + escapeHtml(questionId) + '" data-question="' + escapeHtml(questionId) + '" autocomplete="off" autocapitalize="off" autocorrect="off" spellcheck="false">' +
            '</span>';
    }

    function templateHtml(html) {
        return String(html || '').replace(/\{\{(Q\d+)\}\}/g, function(_, questionId) {
            return inputHtml(questionId);
        });
    }

    function renderMcqSection(section) {
        return '<div class="listening-mcq">' + (section.items || []).map(function(item) {
            var question = questionById(item.id);
            return '<article class="listening-mcq-question" id="q-' + escapeHtml(item.id) + '">' +
                '<div class="listening-mcq-stem">' +
                    '<span class="listening-mcq-number">' + escapeHtml(question.number) + '</span>' +
                    '<p>' + escapeHtml(item.text || '') + '</p>' +
                '</div>' +
                '<div class="listening-mcq-options">' +
                    (item.options || []).map(function(option) {
                        return '<label class="listening-mcq-option" data-option-for="' + escapeHtml(item.id) + '" data-option-value="' + escapeHtml(option.value) + '">' +
                            '<input type="radio" name="' + escapeHtml(item.id) + '" value="' + escapeHtml(option.value) + '" data-question="' + escapeHtml(item.id) + '">' +
                            '<span class="listening-mcq-letter">' + escapeHtml(option.value) + '</span>' +
                            '<span>' + escapeHtml(option.text || '') + '</span>' +
                        '</label>';
                    }).join('') +
                '</div>' +
            '</article>';
        }).join('') + '</div>';
    }

    function formatTime(seconds) {
        seconds = Math.max(0, Math.floor(seconds || 0));
        var mins = Math.floor(seconds / 60);
        var secs = seconds % 60;
        return mins + ':' + String(secs).padStart(2, '0');
    }

    function updateTimer(remainingSeconds) {
        var number = document.getElementById('time-left');
        var label = document.getElementById('time-left-label');
        var display = document.getElementById('timer-display');
        if (!number || !label || !display) return;
        if (!Number.isFinite(remainingSeconds)) {
            remainingSeconds = lesson && lesson.durationMinutes ? Number(lesson.durationMinutes) * 60 : null;
        }
        if (!Number.isFinite(remainingSeconds)) {
            number.textContent = '--';
            label.textContent = 'minutes left';
            display.classList.remove('urgent');
            return;
        }
        var seconds = Math.max(0, Math.ceil(remainingSeconds));
        if (seconds <= 60) {
            number.textContent = seconds;
            label.textContent = seconds === 1 ? 'second left' : 'seconds left';
            display.classList.add('urgent');
            return;
        }
        number.textContent = Math.ceil(seconds / 60);
        label.textContent = 'minutes left';
        display.classList.remove('urgent');
    }

    function renderAudio() {
        if (!lesson.audioSrc) {
            return '<div class="audio-dock audio-missing">' +
                '<button class="audio-button" type="button" aria-label="Audio pending" disabled>▶</button>' +
                '<div class="audio-time">Audio pending</div>' +
            '</div>';
        }
        return '<div class="audio-dock">' +
            '<audio id="listening-audio" preload="metadata" src="' + escapeHtml(lesson.audioSrc || '') + '"></audio>' +
            '<button class="audio-button" id="play-btn" type="button" aria-label="Play or pause">▶</button>' +
            '<input class="audio-progress" id="audio-progress" type="range" min="0" max="1000" value="0" aria-label="Audio progress">' +
            '<div class="audio-time" id="audio-time">0:00 / 0:00</div>' +
        '</div>';
    }

    function renderContent() {
        lesson.questions.forEach(function(question) { questionMap[question.id] = question; });
        var part = lesson.parts[0];
        document.getElementById('set-code').textContent = lesson.id || setId;
        document.getElementById('part-title').textContent = part.title || ('Part ' + part.number);
        document.getElementById('part-intro').textContent = part.intro || '';
        document.title = lesson.id + ' IELTS Listening';

        var html = renderAudio();
        (part.sections || []).forEach(function(section) {
            html += '<section class="question-section">' +
                '<div class="section-label">' + escapeHtml(section.label || '') + '</div>' +
                '<p class="section-instruction">' + (section.instruction || '') + '</p>' +
                (section.type === 'mcq' ? renderMcqSection(section) : templateHtml(section.html || '')) +
            '</section>';
        });
        document.getElementById('content').innerHTML = html;
        renderQuestionMap();
        setupAudio();
        updateTimer(null);
        restoreDraft();
        updateNavState();
        if (teacherMode) setupTeacherMode();
    }

    function renderQuestionMap() {
        var byPart = {};
        lesson.questions.forEach(function(question) {
            var part = question.part || 1;
            if (!byPart[part]) byPart[part] = [];
            byPart[part].push(question);
        });
        document.getElementById('question-map').innerHTML = Object.keys(byPart).sort(function(a, b) {
            return Number(a) - Number(b);
        }).map(function(partNo) {
            return '<span class="part-group"><span class="part-label">Part ' + escapeHtml(partNo) + '</span>' +
                byPart[partNo].map(function(question) {
                    return '<button class="q-nav" type="button" data-jump="' + escapeHtml(question.id) + '">' + escapeHtml(question.number) + '</button>';
                }).join('') +
            '</span>';
        }).join('');
    }

    function setupAudio() {
        var audio = document.getElementById('listening-audio');
        var play = document.getElementById('play-btn');
        var progress = document.getElementById('audio-progress');
        var time = document.getElementById('audio-time');
        if (!audio || !play || !progress || !time) return;
        function sync() {
            var duration = audio.duration || 0;
            var current = audio.currentTime || 0;
            play.textContent = audio.paused ? '▶' : 'Ⅱ';
            progress.value = duration ? Math.round(current / duration * 1000) : 0;
            time.textContent = formatTime(current) + ' / ' + formatTime(duration);
            updateTimer(duration ? duration - current : null);
        }
        play.addEventListener('click', function() {
            if (audio.paused) {
                var promise = audio.play();
                if (promise && promise.catch) promise.catch(function() {});
            } else {
                audio.pause();
            }
        });
        progress.addEventListener('input', function() {
            if (!audio.duration) return;
            audio.currentTime = Number(progress.value || 0) / 1000 * audio.duration;
        });
        audio.addEventListener('loadedmetadata', sync);
        audio.addEventListener('timeupdate', sync);
        audio.addEventListener('play', sync);
        audio.addEventListener('pause', sync);
        audio.addEventListener('ended', sync);
        if (audioTimerInterval) clearInterval(audioTimerInterval);
        audioTimerInterval = setInterval(sync, 1000);
        sync();
    }

    function draftKey() {
        var profile = window.MrCatPractice && window.MrCatPractice.profile;
        var student = profile && profile.student_id ? profile.student_id : 'local';
        return 'mrcat_ielts_listening_' + setId + '_' + student;
    }

    function questionValue(question) {
        if (question && question.type === 'mcq') {
            var checked = document.querySelector('[name="' + CSS.escape(question.id) + '"]:checked');
            return checked ? checked.value.trim() : '';
        }
        var input = document.querySelector('[name="' + CSS.escape(question.id) + '"]');
        return input ? input.value.trim() : '';
    }

    function setQuestionValue(questionId, value) {
        var question = questionById(questionId);
        if (question.type === 'mcq') {
            var radio = document.querySelector('[name="' + CSS.escape(questionId) + '"][value="' + CSS.escape(String(value || '')) + '"]');
            if (radio) radio.checked = true;
            return;
        }
        var input = document.querySelector('[name="' + CSS.escape(questionId) + '"]');
        if (input) input.value = value || '';
    }

    function setQuestionDisabled(question, disabled) {
        document.querySelectorAll('[name="' + CSS.escape(question.id) + '"]').forEach(function(input) {
            input.disabled = disabled;
        });
    }

    function feedbackAnchor(questionId) {
        var wrap = document.getElementById('wrap-' + questionId);
        if (wrap) return wrap;
        return document.getElementById('q-' + questionId);
    }

    function collectAnswers() {
        var answers = {};
        lesson.questions.forEach(function(question) {
            answers[question.id] = questionValue(question);
        });
        return answers;
    }

    function saveDraft() {
        try { localStorage.setItem(draftKey(), JSON.stringify(collectAnswers())); } catch (error) {}
    }

    function restoreDraft() {
        try {
            var saved = JSON.parse(localStorage.getItem(draftKey()) || '{}');
            Object.keys(saved).forEach(function(questionId) {
                setQuestionValue(questionId, saved[questionId]);
            });
        } catch (error) {}
    }

    function allAnswered() {
        return lesson.questions.every(function(question) {
            return questionValue(question);
        });
    }

    function updateNavState() {
        document.querySelectorAll('.q-nav').forEach(function(button) {
            var questionId = button.getAttribute('data-jump');
            button.classList.toggle('answered', !!questionValue(questionById(questionId)));
        });
    }

    function jumpToQuestion(questionId) {
        var target = feedbackAnchor(questionId);
        var input = document.querySelector('[name="' + CSS.escape(questionId) + '"]');
        if (!target || !input) return;
        target.scrollIntoView({ behavior: 'smooth', block: 'center' });
        setTimeout(function() { input.focus(); }, 280);
    }

    function answerText(value) {
        return Array.isArray(value) ? value.join(' / ') : String(value == null ? '' : value);
    }

    function showFeedback(questionId, result) {
        var question = questionById(questionId);
        var anchor = feedbackAnchor(questionId);
        if (!anchor) return;
        if (question.type === 'mcq') {
            anchor.querySelectorAll('.listening-mcq-option').forEach(function(option) {
                option.classList.remove('correct', 'wrong');
            });
            var selected = anchor.querySelector('[name="' + CSS.escape(questionId) + '"]:checked');
            if (selected) {
                var selectedLabel = selected.closest('.listening-mcq-option');
                if (selectedLabel) selectedLabel.classList.add(result.correct ? 'correct' : 'wrong');
            }
            if (!result.correct && result.correct_answer != null) {
                var correctValue = Array.isArray(result.correct_answer) ? result.correct_answer[0] : result.correct_answer;
                var correctLabel = anchor.querySelector('[data-option-value="' + CSS.escape(String(correctValue)) + '"]');
                if (correctLabel) correctLabel.classList.add('correct');
            }
        } else {
            var input = anchor.querySelector('input');
            if (input) input.classList.add(result.correct ? 'correct' : 'wrong');
        }
        var existing = anchor.parentNode.querySelector('[data-feedback="' + CSS.escape(questionId) + '"]');
        if (existing) existing.remove();
        if (result.correct) return;
        var feedback = document.createElement('div');
        feedback.className = 'feedback show';
        feedback.setAttribute('data-feedback', questionId);
        var parts = [];
        if (result.correct_answer != null) parts.push('Correct answer: ' + answerText(result.correct_answer));
        if (result.explanation) parts.push(result.explanation);
        feedback.textContent = parts.length ? parts.join('\n') : 'Not correct. Try again after reviewing the audio.';
        anchor.parentNode.insertBefore(feedback, anchor.nextSibling);
    }

    function applyFeedback(response) {
        var results = {};
        (response.question_results || []).forEach(function(result) { results[result.question_id] = result; });
        lesson.questions.forEach(function(question) {
            if (results[question.id]) showFeedback(question.id, results[question.id]);
            setQuestionDisabled(question, true);
        });
        var submit = document.getElementById('submit-btn');
        submit.disabled = true;
        submit.textContent = 'Submitted';
        var status = response.mastered ? 'Mastered' : response.passed ? 'Passed' : 'Keep trying';
        var score = response.passed ? response.percentage + '%' : response.correct_count + ' / ' + response.question_count;
        var bar = document.getElementById('result-bar');
        bar.innerHTML = '<strong>' + escapeHtml(status) + '</strong><span>' + escapeHtml(score) + '</span>';
        bar.classList.add('show');
    }

    function submitAttempt() {
        if (teacherMode) return;
        if (!allAnswered()) {
            alert('Please answer all questions before submitting.');
            return;
        }
        var submit = document.getElementById('submit-btn');
        submit.disabled = true;
        submit.textContent = 'Submitting...';
        window.MrCatCloud.callFunction('submitAttempt', {
            set_id: setId,
            assignment_id: assignmentId || null,
            mode: 'ielts_listening',
            answers: collectAnswers(),
            started_at: startedAt,
            duration_seconds: Math.max(0, Math.round((Date.now() - new Date(startedAt).getTime()) / 1000))
        }).then(function(response) {
            if (!response || !response.success) throw new Error(response && response.message || 'Unable to submit.');
            applyFeedback(response);
        }).catch(function(error) {
            submit.disabled = false;
            submit.textContent = 'Submit';
            alert(error && error.message ? error.message : 'Unable to submit. Please try again.');
        });
    }

    function teacherCall(action, data) {
        return window.MrCatCloud.callFunction('teacherAdmin', Object.assign({ action: action }, data || {}))
            .then(function(result) {
                if (!result || !result.success) throw new Error(result && result.message || 'Teacher action failed.');
                return result;
            });
    }

    function showTeacherAnswers(answerKey) {
        var answers = answerKey.answers || {};
        var explanations = answerKey.explanations || {};
        lesson.questions.forEach(function(question) {
            var result = {
                correct: true,
                correct_answer: answers[question.id],
                explanation: explanations[question.id] || ''
            };
            if (answers[question.id] == null) return;
            showFeedback(question.id, result);
            var feedback = document.querySelector('[data-feedback="' + CSS.escape(question.id) + '"]');
            if (!feedback) {
                var anchor = feedbackAnchor(question.id);
                if (!anchor) return;
                if (question.type === 'mcq') {
                    var correctValue = Array.isArray(answers[question.id]) ? answers[question.id][0] : answers[question.id];
                    var correctLabel = anchor.querySelector('[data-option-value="' + CSS.escape(String(correctValue)) + '"]');
                    if (correctLabel) correctLabel.classList.add('correct');
                }
                feedback = document.createElement('div');
                feedback.className = 'feedback show';
                feedback.setAttribute('data-feedback', question.id);
                feedback.textContent = 'Correct answer: ' + answerText(answers[question.id]) +
                    (explanations[question.id] ? '\n' + explanations[question.id] : '');
                anchor.parentNode.insertBefore(feedback, anchor.nextSibling);
            }
        });
        teacherAnswersVisible = true;
    }

    function clearTeacherAnswers() {
        document.querySelectorAll('.gap-input.correct,.gap-input.wrong').forEach(function(input) {
            input.classList.remove('correct', 'wrong');
        });
        document.querySelectorAll('.listening-mcq-option.correct,.listening-mcq-option.wrong').forEach(function(option) {
            option.classList.remove('correct', 'wrong');
        });
        document.querySelectorAll('[data-feedback]').forEach(function(el) { el.remove(); });
        teacherAnswersVisible = false;
    }

    function setupTeacherMode() {
        document.getElementById('submit-btn').disabled = true;
        document.getElementById('submit-btn').textContent = 'Teacher Preview';
        document.getElementById('teacher-toolbar').classList.add('show');
        document.getElementById('teacher-show-answers').addEventListener('click', function() {
            var button = this;
            if (teacherAnswersVisible) {
                clearTeacherAnswers();
                button.textContent = 'Show Answers';
                return;
            }
            if (teacherAnswerKey) {
                showTeacherAnswers(teacherAnswerKey);
                button.textContent = 'Hide Answers';
                return;
            }
            button.disabled = true;
            button.textContent = 'Loading...';
            teacherCall('getAnswerKeyForSet', { set_id: setId }).then(function(result) {
                teacherAnswerKey = result;
                showTeacherAnswers(result);
                button.textContent = 'Hide Answers';
            }).catch(function(error) {
                button.textContent = 'Show Answers';
                alert(error.message || 'Unable to load answers.');
            }).then(function() {
                button.disabled = false;
            });
        });
    }

    function bindEvents() {
        document.getElementById('dashboard-btn').addEventListener('click', function() {
            window.location.href = 'dashboard.html';
        });
        function handleQuestionInput(event) {
            if (!event.target.matches('[data-question]')) return;
            saveDraft();
            updateNavState();
        }
        document.addEventListener('input', handleQuestionInput);
        document.addEventListener('change', handleQuestionInput);
        document.getElementById('question-map').addEventListener('click', function(event) {
            var button = event.target.closest('[data-jump]');
            if (!button) return;
            jumpToQuestion(button.getAttribute('data-jump'));
        });
        document.getElementById('submit-btn').addEventListener('click', submitAttempt);
        document.getElementById('workspace').addEventListener('focusin', function(event) {
            var questionId = event.target && event.target.getAttribute('data-question');
            document.querySelectorAll('.q-nav').forEach(function(button) {
                button.classList.toggle('active', button.getAttribute('data-jump') === questionId);
            });
        });
    }

    function init() {
        bindEvents();
        document.getElementById('set-code').textContent = setId;
        updateTimer(null);
        fetch('data/' + encodeURIComponent(setId) + '.json?_=' + Date.now())
            .then(function(response) {
                if (!response.ok) throw new Error('LISTENING_DATA_NOT_FOUND');
                return response.json();
            })
            .then(function(data) {
                lesson = data;
                renderContent();
            })
            .catch(function(error) {
                document.getElementById('content').innerHTML = '<p class="error">' + escapeHtml(error.message || 'Unable to load this listening practice.') + '</p>';
            });
    }

    init();
})();
</script>
</body>
</html>
