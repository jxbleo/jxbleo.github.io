<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IELTS Reading Practice</title>
    <style>
        :root {
            --primary: #17233a;
            --accent: #2563eb;
            --accent-soft: #eaf1ff;
            --bg: #eef3f8;
            --card-bg: #ffffff;
            --text-main: #273142;
            --text-light: #667085;
            --border-color: #d9e2ec;
            --correct-bg: #e8f8f5;
            --wrong-bg: #fdf2e9;
            --panel-shadow: 0 18px 45px rgba(39, 49, 66, 0.10);
        }
        * { box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            display: grid;
            grid-template-rows: 44px minmax(0, 1fr) 78px;
            height: 100dvh;
            background: #e7edf5; color: var(--text-main); line-height: 1.6;
            margin: 0; padding: 0; overflow: hidden;
        }
        button, input, select { font: inherit; }
        .exam-topbar {
            display: grid;
            grid-template-columns: minmax(130px, 1fr) auto minmax(190px, 1fr);
            align-items: center;
            gap: 12px;
            padding: 0 14px;
            color: #f8fafc;
            background: linear-gradient(180deg, #202838, #111827);
            box-shadow: inset 0 -1px rgba(255,255,255,.18), 0 1px 4px rgba(15,23,42,.28);
        }
        .exam-set-id {
            min-width: 0;
            color: #cbd5e1;
            font-size: 13px;
            font-weight: 700;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .exam-timer {
            display: inline-flex;
            align-items: baseline;
            gap: 7px;
            color: #f8fafc;
            font-weight: 700;
        }
        .exam-timer strong { font-size: 25px; line-height: 1; }
        .exam-timer.urgent { color: #f87171; }
        .exam-actions {
            display: flex;
            justify-content: flex-end;
            align-items: center;
            gap: 8px;
        }
        .exam-actions button {
            min-height: 28px;
            padding: 0 13px;
            border: 1px solid rgba(255,255,255,.3);
            border-radius: 4px;
            color: #111827;
            background: linear-gradient(180deg, #ffffff, #dbe2ec);
            box-shadow: inset 0 1px #fff;
            font-size: 13px;
            font-weight: 700;
            cursor: pointer;
        }
        .container {
            width: 100%;
            height: 100%;
            margin: 0 auto;
            background: #e7edf5;
            padding: 8px 14px;
            position: relative;
            overflow: hidden;
        }
        h1 { color: var(--primary); text-align: center; border-bottom: 2px solid var(--accent); padding-bottom: 12px; margin-bottom: 6px; }
        .subtitle { text-align: center; color: var(--text-light); font-size: 0.95em; margin-bottom: 24px; }
        .lesson-heading { display: none; }
        #main-content { height: 100%; overflow: hidden; }

        .error-display { text-align: center; padding: 60px 20px; color: #b91c1c; }
        .error-display h2 { color: #b91c1c; }
        .loading { text-align: center; padding: 60px 20px; color: var(--text-light); }

        .login-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5); display: flex; align-items: center; justify-content: center;
            z-index: 1000;
        }
        .login-modal {
            background: var(--card-bg); padding: 40px; border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.2); max-width: 400px; width: 90%;
            text-align: center;
        }
        .login-modal h2 { color: var(--primary); margin-top: 0; margin-bottom: 8px; }
        .login-modal p { color: var(--text-light); font-size: 0.9em; margin-bottom: 24px; }
        .identity-status {
            position: fixed;
            left: -9999px;
            bottom: 14px;
            z-index: 900;
            padding: 8px 14px;
            border-radius: 999px;
            background: rgba(255,255,255,0.9);
            border: 1px solid rgba(255,255,255,0.92);
            color: var(--primary);
            font-size: 0.86em;
            font-weight: 700;
            box-shadow: 0 10px 24px rgba(44, 62, 80, 0.12);
            backdrop-filter: blur(14px);
        }
        body .mrcat-back {
            display: none !important;
        }
        .split-layout {
            display: grid;
            grid-template-columns: minmax(360px, 1.04fr) 14px minmax(360px, 0.96fr);
            gap: 0;
            height: 100%;
            min-height: 0;
            margin: 0;
            align-items: stretch;
            overflow: hidden;
        }
        @media (min-width: 769px) {
            .container {
                max-width: none;
            }
            h1 { margin: 0 0 4px; padding-bottom: 8px; font-size: 1.8em; }
            .subtitle { margin-bottom: 10px; }
            .passage-panel, .questions-panel {
                min-height: 0;
            }
            .questions-panel .question-section:first-child { margin-top: 0; }
        }
        @media (max-width: 768px) {
            .container {
                padding: 8px;
            }
            #main-content { height: 100%; overflow: hidden; }
            .split-layout {
                height: 100%;
                min-height: 0;
                grid-template-columns: 1fr;
                grid-template-rows: minmax(170px, 43%) 12px minmax(230px, 1fr);
                gap: 0;
            }
            h1 { font-size: 1.4em; }
            .passage-panel, .questions-panel {
                min-height: 0;
            }
        }
        .split-divider {
            position: relative;
            width: 14px;
            cursor: col-resize;
            user-select: none;
            pointer-events: auto;
            touch-action: none;
        }
        .split-divider::before {
            content: none;
            position: absolute;
            left: 50%;
            top: 0;
            transform: translateX(-50%);
            width: 2px;
            height: 100%;
            background: linear-gradient(180deg, rgba(37,99,235,0.05), rgba(37,99,235,0.45), rgba(37,99,235,0.05));
            border-radius: 999px;
        }
        .split-divider::after {
            content: "";
            position: absolute;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            width: 8px;
            height: 64px;
            border-radius: 999px;
            background: rgba(37,99,235,0.15);
            box-shadow: inset 0 0 0 1px rgba(37,99,235,0.12);
            transition: background .18s ease, box-shadow .18s ease, width .18s ease;
        }
        .split-divider:hover::after,
        .split-layout.resizing .split-divider::after {
            width: 10px;
            background: rgba(37,99,235,0.24);
            box-shadow: inset 0 0 0 1px rgba(37,99,235,0.22), 0 8px 18px rgba(37,99,235,0.12);
        }
        .split-layout.resizing {
            cursor: col-resize;
            user-select: none;
        }
        @media (max-width: 768px) {
            .split-divider {
                display: block;
                width: auto;
                height: 14px;
                cursor: row-resize;
            }
            .split-divider::before {
                left: 0;
                top: 50%;
                transform: translateY(-50%);
                width: 100%;
                height: 2px;
                background: linear-gradient(90deg, rgba(37,99,235,0.05), rgba(37,99,235,0.45), rgba(37,99,235,0.05));
            }
            .split-divider::after {
                width: 64px;
                height: 8px;
            }
            .split-divider:hover::after,
            .split-layout.resizing .split-divider::after {
                width: 74px;
                height: 10px;
            }
            .split-layout.resizing {
                cursor: row-resize;
            }
        }

        .passage-panel, .questions-panel {
            display: flex;
            flex-direction: column;
            min-width: 0;
            overflow: hidden;
            border: 1px solid #cfd8e3;
            border-radius: 4px;
            background: #fbfbfd;
            box-shadow: 0 1px 5px rgba(15, 23, 42, 0.08);
        }
        .panel-header {
            flex: 0 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
            min-height: 48px;
            padding: 10px 14px;
            border-bottom: 1px solid var(--border-color);
            background: linear-gradient(180deg, #ffffff, #f3f6fb);
        }
        .questions-panel .panel-header { justify-content: space-between; }
        .panel-title { min-width: 0; }
        .panel-title h2 {
            margin: 0;
            font-size: 1.05em;
            line-height: 1.25;
            border-left: 3px solid var(--accent);
            padding-left: 10px;
            color: var(--primary);
        }
        .panel-title .set-id {
            display: inline-block;
            margin-left: 10px;
            color: var(--text-light);
            font-size: 0.82em;
            font-weight: 700;
            white-space: nowrap;
        }
        .panel-scroll {
            flex: 1 1 auto;
            min-height: 0;
            overflow-y: auto;
            padding: 16px 18px 20px;
        }
        .panel-scroll::-webkit-scrollbar { width: 7px; }
        .panel-scroll::-webkit-scrollbar-thumb { background: #bcc8d6; border-radius: 999px; }
        .question-scroll {
            display: flex;
            flex-direction: column;
            gap: 18px;
        }
        #questions-container { display: grid; gap: 20px; }
        @media (max-width: 768px) {
            .panel-header { align-items: flex-start; gap: 8px; margin-bottom: 4px; }
            .panel-title h2 { font-size: 0.98em; }
            .panel-title .set-id { display: block; margin: 2px 0 0 10px; font-size: 0.76em; }
            .panel-scroll { padding: 12px 12px 14px; }
        }

        .font-controls { display: flex; align-items: center; gap: 3px; }
        .font-btn {
            width: 24px; height: 24px; display: flex; align-items: center; justify-content: center;
            border: 1px solid var(--border-color); border-radius: 4px;
            background: var(--card-bg); color: var(--text-light); cursor: pointer;
            font-size: 1em; font-weight: bold; line-height: 1; padding: 0;
            transition: all 0.15s;
        }
        .font-btn:hover { border-color: var(--accent); color: var(--accent); background: #eff6ff; }
        .font-val { font-size: 0.75em; color: var(--text-light); min-width: 20px; text-align: center; }

        .passage { font-size: 14.5px; line-height: 1.9; padding: 0; background: transparent; border: 0; border-radius: 0; }
        .passage p { margin-bottom: 1rem; text-indent: 0; }
        .passage mark.user-highlight,
        #questions-container mark.user-highlight {
            background: linear-gradient(180deg, rgba(255, 244, 133, 0.25), rgba(255, 232, 105, 0.95));
            color: inherit;
            padding: 0 1px;
            border-radius: 3px;
        }
        .highlight-toolbar {
            position: fixed;
            z-index: 1200;
            display: none;
            align-items: center;
            gap: 8px;
            padding: 7px;
            border: 1px solid rgba(126, 148, 173, 0.28);
            border-radius: 14px;
            background: rgba(248, 251, 255, 0.96);
            color: var(--primary);
            box-shadow: 0 18px 42px rgba(39, 49, 66, 0.18);
            backdrop-filter: blur(16px);
        }
        .highlight-toolbar.show { display: inline-flex; }
        .highlight-toolbar button {
            min-height: 32px;
            border: 1px solid transparent;
            border-radius: 10px;
            padding: 6px 12px;
            background: rgba(234, 241, 255, 0.86);
            color: var(--primary);
            font-size: 0.82em;
            font-weight: 800;
            cursor: pointer;
        }
        .highlight-toolbar button:hover { border-color: rgba(37,99,235,0.25); background: #fff; }
        .highlight-toolbar button.primary { background: var(--accent); color: #fff; box-shadow: 0 8px 18px rgba(37,99,235,0.18); }
        .highlight-toolbar button.primary:hover { background: #1d4ed8; }

        .question-section { margin-bottom: 0; }
        .section-label {
            font-weight: 600; font-size: 1.05em; color: var(--primary);
            margin-bottom: 16px; padding: 10px 16px; background: #f1f5f9;
            border-radius: 6px; border-left: 4px solid var(--accent);
        }
        .section-instruction { font-size: 0.9em; color: var(--text-light); margin-bottom: 16px; }

        .tfng-question, .ynng-question {
            margin-bottom: 14px; padding: 14px 16px; background: #fbfdff;
            border-radius: 12px; border: 1px solid var(--border-color);
        }
        .tfng-text, .ynng-text { font-weight: 500; margin-bottom: 10px; color: var(--primary); font-size: 0.95em; }
        .tfng-options, .ynng-options { display: flex; gap: 8px; flex-wrap: wrap; }
        .tfng-options label, .ynng-options label {
            display: flex; align-items: center; gap: 5px;
            padding: 7px 16px; border-radius: 6px; border: 1px solid var(--border-color);
            cursor: pointer; transition: all 0.2s; font-size: 0.9em; font-weight: 500;
        }
        .tfng-options label:hover:not(.disabled), .ynng-options label:hover:not(.disabled) { border-color: var(--accent); background: #eff6ff; }
        .tfng-options input[type="radio"], .ynng-options input[type="radio"] { accent-color: var(--accent); }
        .tfng-options label:has(input[type="radio"]:checked), .ynng-options label:has(input[type="radio"]:checked) { border-color: var(--accent); background: #eff6ff; }
        .tfng-options label.correct, .ynng-options label.correct { border-color: #27ae60 !important; background: var(--correct-bg) !important; }
        .tfng-options label.wrong, .ynng-options label.wrong { border-color: #e67e22 !important; background: var(--wrong-bg) !important; }
        .tfng-options label:has(input[type="radio"]:disabled), .ynng-options label:has(input[type="radio"]:disabled) { cursor: not-allowed; opacity: 0.7; }
        .mcq-question {
            margin-bottom: 16px; padding: 14px 18px; background: #fafbfc;
            border-radius: 8px; border: 1px solid var(--border-color);
        }
        .mcq-text { font-weight: 500; margin-bottom: 10px; color: var(--primary); font-size: 0.95em; }
        .mcq-options { display: flex; flex-direction: column; gap: 8px; }
        .mcq-options label {
            display: flex; align-items: flex-start; gap: 8px;
            padding: 8px 12px; border-radius: 6px; border: 1px solid var(--border-color);
            cursor: pointer; transition: all 0.2s; font-size: 0.9em;
        }
        .mcq-options label:hover:not(.disabled) { border-color: var(--accent); background: #eff6ff; }
        .mcq-options input[type="radio"] { accent-color: var(--accent); margin-top: 3px; }
        .mcq-options label:has(input[type="radio"]:checked) { border-color: var(--accent); background: #eff6ff; }
        .mcq-options label.correct { border-color: #27ae60 !important; background: var(--correct-bg) !important; }
        .mcq-options label.wrong { border-color: #e67e22 !important; background: var(--wrong-bg) !important; }

        .summary-grid { display: grid; grid-template-columns: 1fr; gap: 0; }
        .summary-question {
            margin-bottom: 14px; padding: 14px 18px; background: #fafbfc;
            border-radius: 8px; border: 1px solid var(--border-color);
            display: flex; align-items: flex-start; gap: 10px; flex-wrap: wrap;
        }
        .summary-num {
            width: 26px; height: 26px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 12px; font-weight: 600; flex-shrink: 0; margin-top: 1px;
        }
        .summary-text { flex: 1; font-size: 0.95em; line-height: 1.7; }
        .summary-text .blank-input {
            border: none; border-bottom: 2px solid var(--primary);
            background: transparent; text-align: center; color: var(--primary);
            font-size: 0.95em; font-weight: bold; width: 90px; outline: none;
            transition: border-color 0.2s, width 0.3s ease;
        }
        .summary-text .blank-input:focus { border-bottom-color: var(--accent); width: 130px; }
        .summary-text .blank-input:disabled { color: #7f8c8d; border-bottom-color: #bdc3c7; cursor: not-allowed; }
        .summary-text .blank-input.correct { border-bottom-color: #27ae60 !important; }
        .summary-text .blank-input.wrong { border-bottom-color: #e67e22 !important; }
        .summary-text .blank-select {
            min-width: 150px; border: 1px solid var(--border-color); border-radius: 6px;
            background: #fff; color: var(--primary); font-size: 0.92em; font-weight: 600;
            padding: 5px 8px; outline: none; transition: border-color 0.2s;
        }
        .summary-text .blank-select:focus { border-color: var(--accent); }
        .summary-text .blank-select:disabled { opacity: 0.65; cursor: not-allowed; }
        .summary-text .blank-select.correct { border-color: #27ae60 !important; }
        .summary-text .blank-select.wrong { border-color: #e67e22 !important; }

        .evidence-text {
            width: 100%; max-width: 100%; box-sizing: border-box;
            font-size: 0.88em; line-height: 1.55; color: #1e3a8a;
            margin-top: 8px; padding: 10px 12px; background: #eff6ff;
            border: 1px solid rgba(37,99,235,.18); border-radius: 8px;
            display: none; white-space: pre-wrap; overflow-wrap: anywhere;
        }
        .evidence-text.show { display: block; }
        .evidence-text.explanation-open { background: #eef2ff; border-color: rgba(37,99,235,.26); }
        .question-action-row {
            width: 100%; display: flex; align-items: center; justify-content: flex-end;
            gap: 8px; margin-top: 8px; flex-wrap: wrap;
        }
        .summary-question .question-action-row,
        .summary-question .evidence-text { flex: 0 0 100%; }
        .teacher-argue-btn {
            padding: 6px 12px; border: 1px solid rgba(37,99,235,.26);
            border-radius: 999px; color: var(--accent); background: #eff6ff;
            font-weight: 800; cursor: pointer;
            transition: background .18s ease, border-color .18s ease, color .18s ease, transform .18s ease;
        }
        .teacher-argue-btn:hover:not(:disabled) { background: #dbeafe; border-color: rgba(37,99,235,.4); transform: translateY(-1px); }
        .teacher-argue-btn.explain-open,
        .teacher-argue-btn.sent { color: #1d4ed8; border-color: rgba(37,99,235,.36); background: #dbeafe; }
        .teacher-argue-modal { position: fixed; inset: 0; z-index: 3000; display: grid; place-items: center; padding: 20px; background: rgba(25,35,58,.42); backdrop-filter: blur(6px); }
        .teacher-argue-card { width: min(420px, 100%); padding: 16px; border-radius: 18px; background: #fff; box-shadow: 0 24px 80px rgba(23,32,58,.24); }
        .teacher-argue-card h2 { margin: 0 0 7px; font-size: 1.2rem; color: var(--primary); }
        .teacher-argue-card p { margin: 0 0 14px; color: var(--text-light); line-height: 1.45; }
        .teacher-argue-card textarea { width: 100%; min-height: 112px; padding: 12px 13px; border: 1px solid var(--border-color); border-radius: 14px; font-family: inherit; resize: vertical; box-sizing: border-box; outline: none; }
        .teacher-argue-card textarea:focus { border-color: rgba(37,99,235,.48); box-shadow: 0 0 0 4px rgba(37,99,235,.10); }
        .teacher-argue-status { margin-top: 12px !important; padding: 10px 12px; border-radius: 12px; color: #237a52 !important; background: #ecf9f1; font-weight: 700; }
        .teacher-argue-actions { display: flex; justify-content: flex-end; gap: 9px; margin-top: 14px; }
        .teacher-argue-actions button { min-height: 38px; padding: 0 15px; border-radius: 11px; font-weight: 800; cursor: pointer; }
        .teacher-argue-submit { border: 0; color: #fff; background: var(--accent); }
        .teacher-argue-cancel { border: 1px solid var(--border-color); color: var(--primary); background: #fff; }

        .headings-section { margin-bottom: 16px; }
        .headings-list { display: grid; grid-template-columns: repeat(auto-fit, minmax(min(100%, 320px), 1fr)); gap: 8px 18px; margin-bottom: 16px; padding: 14px 18px; background: #fbfdff; border-radius: 12px; border: 1px solid var(--border-color); font-size: 0.9em; }
        .headings-list .heading-item { padding: 2px 0; color: var(--text-main); }
        .headings-list .heading-item .num { font-weight: 600; color: var(--accent); margin-right: 4px; }
        .heading-question {
            margin-bottom: 10px; padding: 12px 14px; background: #fbfdff;
            border-radius: 12px; border: 1px solid var(--border-color);
            display: grid; grid-template-columns: minmax(42px, auto) minmax(0, 1fr) auto; align-items: center; gap: 12px;
        }
        .heading-question .para-label { font-weight: 700; color: var(--accent); font-size: 1.1em; min-width: 28px; }
        .heading-question select {
            padding: 6px 10px; border: 1px solid var(--border-color); border-radius: 6px;
            font-size: 0.9em; outline: none; background: white; cursor: pointer;
            width: 100%; min-width: 0; transition: border-color 0.2s;
        }
        .heading-question select:focus { border-color: var(--accent); }
        .heading-question select:disabled { cursor: not-allowed; opacity: 0.6; }
        .heading-question select.correct { border-color: #27ae60 !important; }
        .heading-question select.wrong { border-color: #e67e22 !important; }
        .heading-question.example-row { opacity: 0.7; }
        .heading-question .question-action-row,
        .heading-question .evidence-text { grid-column: 1 / -1; margin-left: 0; }

        .submit-area {
            flex: 0 0 auto;
            display: none;
            gap: 10px;
            margin-top: 8px;
            padding: 16px;
            border: 1px solid var(--border-color);
            border-radius: 4px;
            background: #fff;
        }
        .submit-hint {
            margin: 0;
            color: var(--text-light);
            font-size: 0.86em;
            text-align: center;
        }
        .submit-btn {
            display: block; width: 100%; max-width: none; margin: 0;
            padding: 15px 20px; font-size: 1.05em; font-weight: bold; color: white;
            background: var(--accent); border: none; border-radius: 12px;
            cursor: pointer; transition: background 0.3s, transform 0.1s;
            box-shadow: 0 4px 6px rgba(37,99,235,0.2);
        }
        .submit-btn:hover:not(:disabled) { background: #1d4ed8; }
        .submit-btn:active:not(:disabled) { transform: translateY(2px); box-shadow: 0 2px 4px rgba(37,99,235,0.2); }
        .submit-btn:disabled { background: #95a5a6; cursor: not-allowed; box-shadow: none; }

        .score-display {
            text-align: center; padding: 20px; margin: 20px 0 30px;
            border-radius: 8px; display: none;
        }
        .submit-area .score-display { margin: 0; padding: 10px 0 0; }
        .score-display.show { display: block; }
        .score-display h2 { margin: 0 0 8px; }
        .score-display .score-num { font-size: 2em; font-weight: bold; color: var(--accent); }
        .score-display .score-detail { color: var(--text-light); font-size: 0.95em; }
        .result-overlay { position: fixed; inset: 0; z-index: 1200; display: grid; place-items: center; padding: 20px; background: rgba(15,23,42,.35); backdrop-filter: blur(5px); }
        .result-card { width: min(420px,100%); padding: 26px; border-radius: 24px; background: #fff; text-align: center; box-shadow: 0 24px 70px rgba(0,0,0,.24); animation: resultPop 420ms ease-out both; }
        .result-emoji { font-size: 3rem; }
        .result-card h2 { margin: 8px 0; }
        .result-score { margin: 0; font-size: 1.8rem; font-weight: 800; color: var(--accent); }
        .result-copy { color: var(--text-light); line-height: 1.45; }
        .result-actions { display: flex; flex-wrap: wrap; justify-content: center; gap: 9px; margin-top: 18px; }
        .history-toolbar { position: fixed; z-index: 999; right: 14px; bottom: 92px; display: flex; gap: 8px; justify-content: flex-end; pointer-events: none; }
        .history-toolbar button {
            pointer-events: auto;
            min-height: 40px;
            border: 1px solid rgba(126, 148, 173, 0.42);

            padding: 9px 15px;

        }
        .history-toolbar button:hover { color: var(--accent); border-color: rgba(37,99,235,.34); background: rgba(255,255,255,.98); transform: translateY(-1px); }
        @keyframes resultPop { from { opacity: 0; transform: translateY(18px) scale(.94); } to { opacity: 1; transform: translateY(0) scale(1); } }

        .exam-bottom-nav {
            display: grid;
            grid-template-columns: auto minmax(0, 1fr) auto;
            align-items: center;
            gap: 12px;
            padding: 8px 18px;
            border-top: 1px solid #cbd5e1;
            background: #e9f0f8;
            box-shadow: 0 -2px 8px rgba(15,23,42,.08);
        }
        .exam-review {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            color: #475569;
            font-size: 13px;
            white-space: nowrap;
        }
        .exam-review input { accent-color: #0f172a; }
        .exam-question-map {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 6px 14px;
            min-width: 0;
        }
        .exam-part-group {
            display: inline-flex;
            align-items: center;
            gap: 4px;
        }
        .exam-part-label {
            margin-right: 2px;
            color: #111827;
            font-weight: 700;
            white-space: nowrap;
        }
        .exam-q-nav {
            position: relative;
            display: inline-grid;
            place-items: center;
            width: 28px;
            height: 28px;
            border: 1px solid #0f172a;
            border-radius: 3px;
            color: #fff;
            background: linear-gradient(180deg, #2d3748, #05070b);
            font-size: 13px;
            font-weight: 700;
            cursor: pointer;
        }
        .exam-q-nav.current {
            border-color: #0ea5e9;
            background: linear-gradient(180deg, #7dd3fc, #0284c7);
        }
        .exam-q-nav.answered {
            box-shadow: inset 0 -4px 0 #94a3b8;
        }
        .exam-q-nav.reviewed::after {
            content: "";
            position: absolute;
            right: -2px;
            top: -2px;
            width: 9px;
            height: 9px;
            border: 1px solid rgba(15,23,42,.45);
            border-radius: 2px;
            background: #facc15;
        }
        .exam-submit-btn {
            min-width: 112px;
            min-height: 44px;
            border: 0;
            border-radius: 999px;
            color: #fff;
            background: #0f172a;
            font-weight: 800;
            cursor: pointer;
            box-shadow: 0 10px 20px rgba(15,23,42,.22);
        }
        .exam-submit-btn:hover:not(:disabled) { background: #1e293b; }
        .exam-submit-btn:disabled {

        .correct-mark { color: #27ae60; font-weight: bold; margin-left: 6px; }
        .wrong-mark { color: #e67e22; font-weight: bold; margin-left: 6px; }

        @media (max-width: 820px) {
            body {
                grid-template-rows: 42px minmax(0, 1fr) 112px;
            }
            .exam-topbar {
                grid-template-columns: minmax(76px, 1fr) auto minmax(96px, 1fr);

            }
            .exam-review { grid-column: 1 / -1; }
            .exam-question-map {
                max-height: 54px;
                overflow: auto;
                flex-wrap: nowrap;
            }
            .exam-q-nav {
                width: 26px;
                height: 26px;
                flex: 0 0 auto;
            }
            .exam-submit-btn {
                min-width: 92px;
            }

        @media (max-width: 480px) {
            .tfng-options, .ynng-options { flex-direction: column; gap: 6px; }
            .tfng-options label, .ynng-options label { width: 100%; justify-content: center; }
            .headings-list { grid-template-columns: 1fr; }
            .heading-question { grid-template-columns: 1fr; }
            .login-modal { padding: 24px 20px; }
        }
    </style>
</head>

</header>
<div class="identity-status" id="identity-status">Login</div>
<div class="container" id="app">
    <div id="login-overlay" class="login-overlay" style="display:none;">
        <div class="login-modal">
            <div class="custom-login" style="display:flex;gap:8px;margin-top:14px;">
                <input type="text" id="ielts-custom-id-input" placeholder="Enter a student ID" autocomplete="off" style="flex:1;padding:12px;border:1px solid var(--border);border-radius:8px;font-size:0.95em;outline:none;" />
                <button id="ielts-custom-login-btn" style="padding:12px 20px;background:#f97316;color:#fff;border:none;border-radius:8px;font-size:0.95em;font-weight:600;cursor:pointer;white-space:nowrap;">Login</button>
            </div>
            <button id="ielts-saved-identity-btn" style="display:none;width:100%;margin-top:12px;padding:12px;background:transparent;color:var(--text-light);border:1px solid var(--border-color);border-radius:8px;font-size:0.9em;cursor:pointer;">Continue</button>
            <div id="ielts-login-error" style="font-size:0.85em;color:var(--text-muted);margin-top:6px;min-height:1.2em;"></div>
            <div style="display:flex;align-items:center;gap:10px;margin:16px 0;color:var(--text-muted);font-size:0.85em;"><span style="flex:1;border-top:1px solid var(--border);"></span><span>or</span><span style="flex:1;border-top:1px solid var(--border);"></span></div>
            <button id="ielts-visitor-btn" style="display:block;width:100%;padding:12px;background:transparent;color:var(--text-muted);border:1px solid var(--border);border-radius:8px;font-size:0.9em;cursor:pointer;">Continue as Visitor</button>

    <div id="error-display" class="error-display" style="display:none;"></div>

        <div class="split-layout" id="split-layout">

                <div class="panel-header">

                        <h2><span id="passage-title">Reading Passage</span><span class="set-id" id="passage-set-id"></span></h2>

                    <div class="font-controls">

                        <button class="font-btn font-plus" type="button" title="Increase font size">+</button>

<div class="highlight-toolbar" id="highlight-toolbar">
    <button class="primary" id="highlight-add-btn" type="button">Highlight</button>
    <button id="highlight-clear-btn" type="button">Clear</button>
</div>
<nav class="exam-bottom-nav" aria-label="Question navigation">
    <label class="exam-review"><input id="exam-review-checkbox" type="checkbox"> Review</label>

<script src="https://static.cloudbase.net/cloudbase-js-sdk/2.28.6/cloudbase.full.js"></script>
<script src="assets/js/config.public.js?v=20260613-14"></script>
<script src="assets/js/cloudbase-client.js?v=20260611-2"></script>
<script src="assets/js/practice-session.js?v=20260614-3"></script>
<script>
    function logEvent(studentId, taskId, eventType, timestamp, eventData) {
        console.log(JSON.stringify({ studentId: studentId, taskId: taskId, eventType: eventType, timestamp: timestamp, eventData: eventData }));
    }

    var params = new URLSearchParams(window.location.search);
    var setId = params.get('set');
    var userId = params.get('user');
    var assignmentId = params.get('assignment') || '';
    var prefillAttemptId = params.get('prefill') || '';
    var historyAttemptId = params.get('history') || prefillAttemptId;
    var historyBestPercentage = params.get('history_score') == null ? null : Number(params.get('history_score'));
    if (isNaN(historyBestPercentage)) historyBestPercentage = null;
    var assignmentStatus = params.get('status') || '';
    var answerRevealAvailable = false;
    var answerRevealConfirmed = false;
    var teacherMode = params.get('teacher') === '1';
    var teacherAnswerKey = null;
    var teacherAnswersVisible = false;
    var currentArgueAttemptId = historyAttemptId || '';
    var attemptStartedAt = new Date().toISOString();
    var lessonData = null;
    var allQuestions = [];
    var activeHighlightRange = null;
    var highlightToolbar = document.getElementById('highlight-toolbar');
    var splitLayout = document.getElementById('split-layout');
    var splitDivider = document.getElementById('split-divider');
    var readingDurationSeconds = 60 * 60;
    var readingTimerStartedAt = Date.now();
    var readingTimerInterval = null;
    var activeQuestionId = '';
    var reviewedQuestions = {};

    var loginOverlay = document.getElementById('login-overlay');
    var errorDisplay = document.getElementById('error-display');
    var loadingDisplay = document.getElementById('loading-display');
    var mainContent = document.getElementById('main-content');

    function getPassageEl() {
        return document.getElementById('passage');
    }

    function getQuestionsEl() {
        return document.getElementById('questions-container');
    }

    function getHighlightStorageKey() {
        return 'ielts-highlight-' + setId + '-' + (userId || 'VISITOR');
    }

    function getSplitStorageKey() {
        return isDesktopViewport() ? 'ielts-split-ratio-desktop' : 'ielts-split-ratio-mobile';
    }

    function isDesktopViewport() {
        return window.innerWidth >= 769;
    }

    function isHorizontalLayout() {
        return isDesktopViewport();
    }

    function showError(msg) {
        errorDisplay.style.display = 'block';
        errorDisplay.innerHTML = '<h2>Error</h2><p>' + msg + '</p>';
        loadingDisplay.style.display = 'none';
    }

    function updateReadingTimer() {
        var number = document.getElementById('exam-time-left');
        var label = document.getElementById('exam-time-label');
        var display = document.getElementById('exam-timer');
        if (!number || !label || !display) return;
        var elapsed = Math.floor((Date.now() - readingTimerStartedAt) / 1000);
        var remaining = Math.max(0, readingDurationSeconds - elapsed);
        if (remaining <= 60) {
            number.textContent = remaining;
            label.textContent = remaining === 1 ? 'second left' : 'seconds left';
            display.classList.add('urgent');
            return;
        }
        number.textContent = Math.ceil(remaining / 60);
        label.textContent = 'minutes left';
        display.classList.remove('urgent');
    }

    function startReadingTimer() {
        readingTimerStartedAt = Date.now();
        updateReadingTimer();
        if (readingTimerInterval) clearInterval(readingTimerInterval);
        readingTimerInterval = setInterval(updateReadingTimer, 1000);
    }

    function storeAnswers() {
        if (!setId || (!userId && !assignmentId)) return;
        var data = {};
        var inputs = document.querySelectorAll('[data-question]');
        inputs.forEach(function(el) {
            if (el.type === 'radio') {
                if (el.checked) data[el.name] = el.value;
            } else if (el.type === 'text') {
                data[el.name] = el.value;
            } else if (el.tagName === 'SELECT') {
                data[el.name] = el.value;
            }
        });
        try { localStorage.setItem('ielts-' + setId + '-' + (assignmentId || userId), JSON.stringify(data)); } catch(e) {}
    }

    function loadSavedAnswers() {
        if (!setId || (!userId && !assignmentId)) return;
        var key = 'ielts-' + setId + '-' + (assignmentId || userId);
        if (params.get('retry') === '1') {
            localStorage.removeItem(key);
            return;
        }
        var saved;
        try { saved = JSON.parse(localStorage.getItem(key)); } catch(e) {}
        if (!saved) return;
        Object.keys(saved).forEach(function(name) {
            var val = saved[name];
            if (!val) return;
            var els = document.querySelectorAll('[name="' + CSS.escape(name) + '"]');
            els.forEach(function(el) {
                if (el.type === 'radio') {
                    if (el.value === val) el.checked = true;
                } else if (el.type === 'text') {
                    el.value = val;
                } else if (el.tagName === 'SELECT') {
                    el.value = val;
                }
            });
        });
    }

    function fetchPrefillAnswersIfNeeded() {
        if (!prefillAttemptId || !window.MrCatCloud) return Promise.resolve(false);
        var key = 'ielts-' + setId + '-' + (assignmentId || userId);
        try {
            if (localStorage.getItem(key)) return Promise.resolve(false);
        } catch (e) {}
        return window.MrCatCloud.callFunction('getDashboard', {
            action: 'getAttemptForRetry',
            attempt_id: prefillAttemptId
        }).then(function(result) {
            if (!result || !result.success || !result.attempt || !result.attempt.answers) return false;
            Object.keys(result.attempt.answers).forEach(function(name) {
                var val = result.attempt.answers[name];
                var els = document.querySelectorAll('[name="' + CSS.escape(name) + '"]');
                els.forEach(function(el) {
                    if (el.type === 'radio') el.checked = el.value === val;
                    else el.value = val;
                });
            });
            storeAnswers();
            return true;
        }).catch(function() { return false; });
    }

    function recordAnswerReveal() {
        if (!assignmentId || !window.MrCatCloud) return;
        window.MrCatCloud.callFunction('getDashboard', {
            action: 'revealAnswers',
            assignment_id: assignmentId
        }).catch(function() {});
    }

    function confirmAnswerReveal() {
        if (teacherMode) return true;
        if (answerRevealConfirmed) return true;
        if (assignmentStatus === 'mastered') {
            answerRevealConfirmed = true;
            recordAnswerReveal();
            return true;
        }
        answerRevealConfirmed = confirm('一旦查看答案，你将无法将本题进度提升至 master 等级，也无法获得对应星星，是否确认继续查看？');
        if (answerRevealConfirmed) recordAnswerReveal();
        return answerRevealConfirmed;
    }

    function applyAnswers(answers) {
        Object.keys(answers || {}).forEach(function(name) {
            var val = answers[name];
            var els = document.querySelectorAll('[name="' + CSS.escape(name) + '"]');
            els.forEach(function(el) {
                if (el.type === 'radio') el.checked = el.value === val;
                else el.value = val;
            });
        });
        storeAnswers();
    }

    function clearAllAnswers() {
        answerRevealAvailable = false;
        updateHistoryToolbar();
        document.querySelectorAll('[data-question]').forEach(function(el) {
            if (el.type === 'radio') el.checked = false;
            else el.value = '';
            el.disabled = false;
            el.classList.remove('correct', 'wrong');
            var label = el.closest('label');
            if (label) label.classList.remove('correct', 'wrong');
        });
        document.querySelectorAll('.evidence-text').forEach(function(el) {
            el.classList.remove('show');
            el.textContent = '';
            resetEvidenceAnswerData(el);
        });
        document.querySelectorAll('[data-student-argue],[data-explain-question]').forEach(function(el) { el.remove(); });
        removeEmptyQuestionActionRows();
        var submitBtn = document.getElementById('submit-btn');
        if (submitBtn) {
            submitBtn.disabled = false;
            submitBtn.textContent = 'Submit Answers';
        }
        storeAnswers();
    }

    function enableRetry() {
        document.querySelectorAll('[data-question]').forEach(function(el) { el.disabled = false; });
        document.querySelectorAll('.correct,.wrong').forEach(function(el) { el.classList.remove('correct', 'wrong'); });
        document.querySelectorAll('.evidence-text').forEach(function(el) {
            el.classList.remove('show');
            resetEvidenceAnswerData(el);
        });
        document.querySelectorAll('[data-student-argue],[data-explain-question]').forEach(function(el) { el.remove(); });
        removeEmptyQuestionActionRows();
        var submitBtn = document.getElementById('submit-btn');
        submitBtn.disabled = false;
        submitBtn.textContent = 'Submit Answers';
    }

    function showHistoryAnswers() {
        if (!historyAttemptId || !window.MrCatCloud) return;
        window.MrCatCloud.callFunction('getDashboard', {
            action: 'getAttemptForRetry',
            attempt_id: historyAttemptId
        }).then(function(result) {
            if (result && result.success && result.attempt && result.attempt.answers) {
                clearAllAnswers();
                applyAnswers(result.attempt.answers);
            }
        }).catch(function() {});
    }

    function updateHistoryFromResponse(response) {
        if (!response || !response.attempt_id) return;
        var value = response.display_percentage == null ? response.percentage : response.display_percentage;
        var percentage = value == null ? null : Number(value);
        if (percentage != null && isNaN(percentage)) percentage = null;
        if (!historyAttemptId || historyBestPercentage == null || percentage == null || percentage >= historyBestPercentage) {
            historyAttemptId = response.attempt_id;
            if (percentage != null) historyBestPercentage = percentage;
        }
    }

    function renderHistoryToolbar() {
        if (document.getElementById('history-toolbar')) return;
        var toolbar = document.createElement('div');
        toolbar.className = 'history-toolbar';
        toolbar.id = 'history-toolbar';
        toolbar.innerHTML = '<button type="button" id="show-history-btn">History</button><button type="button" id="clear-all-btn">Clear</button>';
        document.body.appendChild(toolbar);
        document.getElementById('show-history-btn').addEventListener('click', function() {
            if (answerRevealAvailable) {
                revealAllAnswers();
                return;
            }
            if (!historyAttemptId) {
                alert('No history is available for this task yet.');
                return;
            }
            if (!confirm('Replace all current answers with your best historical attempt?')) return;
            showHistoryAnswers();
        });
        document.getElementById('clear-all-btn').addEventListener('click', function() {
            if (!confirm('Clear all answers on this page?')) return;
            clearAllAnswers();
        });
        updateHistoryToolbar();
    }

    function updateHistoryToolbar() {
        var btn = document.getElementById('show-history-btn');
        if (!btn) return;
        btn.textContent = answerRevealAvailable ? 'Show Answers' : 'History';
    }

    function resetEvidenceAnswerData(el) {
        el.removeAttribute('data-answer-text');
        el.removeAttribute('data-answer-value');
        el.removeAttribute('data-explanation-text');
        el.removeAttribute('data-answer-visible');
        el.removeAttribute('data-answer-reveal');
        el.removeAttribute('data-explanation-visible');
        el.classList.remove('explanation-open');
    }

    function removeEmptyQuestionActionRows() {
        document.querySelectorAll('.question-action-row').forEach(function(row) {
            if (!row.children.length) row.remove();
        });
    }

    function questionActionRow(evidence) {
        if (!evidence || !evidence.parentNode) return null;
        var row = evidence.parentNode.querySelector('.question-action-row');
        if (!row) {
            row = document.createElement('div');
            row.className = 'question-action-row';
            evidence.parentNode.insertBefore(row, evidence);
        }
        return row;
    }

    function primaryAnswerValue(value) {
        return Array.isArray(value) ? value[0] : value;
    }

    function setEvidenceAnswer(evidence, answer, explanation, rawAnswer) {
        var answerValue = primaryAnswerValue(rawAnswer == null ? answer : rawAnswer);
        evidence.setAttribute('data-answer-text', answer || '');
        evidence.setAttribute('data-answer-value', String(answerValue == null ? '' : answerValue));
        evidence.setAttribute('data-explanation-text', explanation || '');
        evidence.setAttribute('data-explanation-visible', '0');
        evidence.textContent = '';
        evidence.classList.remove('explanation-open');
    }

    function showEvidenceAnswer(evidence) {
        evidence.setAttribute('data-answer-visible', '1');
        evidence.setAttribute('data-explanation-visible', '0');
        evidence.classList.remove('explanation-open');
        evidence.classList.remove('show');
    }

    function showEvidenceExplanation(evidence) {
        var explanation = evidence.getAttribute('data-explanation-text') || '';
        evidence.textContent = explanation || evidence.getAttribute('data-answer-text') || '';
        evidence.setAttribute('data-answer-visible', '1');
        evidence.setAttribute('data-explanation-visible', explanation ? '1' : '0');
        evidence.classList.toggle('explanation-open', !!explanation);
        evidence.classList.add('show');
    }

    function hideEvidenceExplanation(evidence) {
        evidence.textContent = '';
        evidence.setAttribute('data-explanation-visible', '0');
        evidence.classList.remove('show', 'explanation-open');
    }

    function toggleEvidenceExplanation(button, evidence, q) {
        if (evidence.getAttribute('data-explanation-visible') === '1') {
            hideEvidenceExplanation(evidence);
            button.textContent = 'Explain';
            button.classList.remove('explain-open');
            return;
        }
        if (evidence.getAttribute('data-answer-reveal') === '1' && evidence.getAttribute('data-answer-visible') !== '1') {
            if (!confirmAnswerReveal()) return;
        }
        if (q && evidence.getAttribute('data-answer-value')) {
            applyCorrectAnswerToQuestion(q, evidence.getAttribute('data-answer-value'));
        }
        showEvidenceExplanation(evidence);
        button.textContent = 'Hide Explain';
        button.classList.add('explain-open');
    }

    function renderExplainButton(q, evidence) {

    function closestHighlight(node) {
        if (!node) return null;
        if (node.nodeType === 3) node = node.parentNode;
        return node && node.closest ? node.closest('mark.user-highlight') : null;
    }

    function getHighlightRootForRange(range) {
        var passageEl = getPassageEl();
        var questionsEl = getQuestionsEl();
        if (!range || range.collapsed) return null;
        if (passageEl && passageEl.contains(range.commonAncestorContainer)) return passageEl;
        if (questionsEl && questionsEl.contains(range.commonAncestorContainer)) return questionsEl;
        return null;
    }

    function canHighlightRange(range) {
        var root = getHighlightRootForRange(range);
        if (!root) return false;
        if (!range.toString().trim()) return false;
        var startEl = range.startContainer.nodeType === 1 ? range.startContainer : range.startContainer.parentElement;
        var endEl = range.endContainer.nodeType === 1 ? range.endContainer : range.endContainer.parentElement;
        if (!startEl || !endEl || !root.contains(startEl) || !root.contains(endEl)) return false;
        var startBlock = startEl.closest ? startEl.closest('p, li, label, .section-label, .section-instruction, .tfng-text, .ynng-text, .mcq-text, .summary-text, .heading-item') : null;
        var endBlock = endEl.closest ? endEl.closest('p, li, label, .section-label, .section-instruction, .tfng-text, .ynng-text, .mcq-text, .summary-text, .heading-item') : null;
        var fragment = range.cloneContents();
        if (fragment.querySelector && fragment.querySelector('input, select, textarea, button')) return false;
        return !!startBlock && startBlock === endBlock && root.contains(startBlock);
    }

    function positionHighlightToolbar(range) {
        var rect = range.getBoundingClientRect();
        if (!rect || (!rect.width && !rect.height)) return;
        highlightToolbar.classList.add('show');
        var toolbarRect = highlightToolbar.getBoundingClientRect();
        var left = rect.left + rect.width / 2 - toolbarRect.width / 2;
        var top = rect.bottom + 10;
        left = Math.max(12, Math.min(left, window.innerWidth - toolbarRect.width - 12));
        if (top + toolbarRect.height > window.innerHeight - 12) top = rect.top - toolbarRect.height - 10;
        top = Math.max(12, Math.min(top, window.innerHeight - toolbarRect.height - 12));
        highlightToolbar.style.left = left + 'px';
        highlightToolbar.style.top = top + 'px';
        var clearBtn = document.getElementById('highlight-clear-btn');
        clearBtn.disabled = !closestHighlight(range.startContainer) && !closestHighlight(range.endContainer);
        clearBtn.style.opacity = clearBtn.disabled ? '0.45' : '1';
        clearBtn.style.cursor = clearBtn.disabled ? 'not-allowed' : 'pointer';
    }

    function normalizeHighlightMarkup(root) {
        if (!root) return;
        root.querySelectorAll('mark.user-highlight mark.user-highlight').forEach(function(nested) {
            var parent = nested.parentNode;
            while (nested.firstChild) parent.insertBefore(nested.firstChild, nested);
            parent.removeChild(nested);
        });
        root.querySelectorAll('mark.user-highlight').forEach(function(mark) {
            if (!mark.textContent.trim()) mark.remove();
        });
    }

    function applyHighlight() {
        if (!activeHighlightRange || !canHighlightRange(activeHighlightRange)) return;
        var range = activeHighlightRange.cloneRange();
        var root = getHighlightRootForRange(range);
        var mark = document.createElement('mark');
        mark.className = 'user-highlight';
        try {
            range.surroundContents(mark);
        } catch (err) {
            var fragment = range.extractContents();
            mark.appendChild(fragment);
            range.insertNode(mark);
        }
        normalizeHighlightMarkup(root);
        if (root === getPassageEl()) savePassageMarkup();
        var selection = window.getSelection();
        if (selection) selection.removeAllRanges();
        clearHighlightToolbar();
    }

    function clearHighlight() {
        var selection = window.getSelection();
        var mark = closestHighlight(selection && selection.anchorNode) || closestHighlight(selection && selection.focusNode);
        if (!mark) return;
        var parent = mark.parentNode;
        while (mark.firstChild) parent.insertBefore(mark.firstChild, mark);
        parent.removeChild(mark);
        var root = getPassageEl() && getPassageEl().contains(parent) ? getPassageEl() : getQuestionsEl();
        normalizeHighlightMarkup(root);
        if (root === getPassageEl()) savePassageMarkup();
        if (selection) selection.removeAllRanges();
        clearHighlightToolbar();
    }

    function handleTextSelection() {
        var selection = window.getSelection();
        if (!selection || !selection.rangeCount) {
            clearHighlightToolbar();
            return;
        }
        var range = selection.getRangeAt(0);
        if (!canHighlightRange(range)) {
            clearHighlightToolbar();
            return;
        }
        activeHighlightRange = range.cloneRange();
        positionHighlightToolbar(range);
    }

    function applySplitRatio(ratio) {
        if (!splitLayout) return;
        var clamped = Math.min(0.75, Math.max(0.25, ratio));
        var dividerSize = 14;
        if (!isHorizontalLayout()) {
            var heightAvailable = splitLayout.clientHeight - dividerSize;
            var topHeight = Math.max(170, Math.round(heightAvailable * clamped));
            splitLayout.style.gridTemplateColumns = '1fr';
            splitLayout.style.gridTemplateRows = topHeight + 'px ' + dividerSize + 'px minmax(210px, 1fr)';
            try { localStorage.setItem(getSplitStorageKey(), clamped); } catch (e) {}
            return;
        }
        var available = splitLayout.clientWidth - dividerSize;
        var leftWidth = Math.max(320, Math.round(available * clamped));
        splitLayout.style.gridTemplateColumns = leftWidth + 'px ' + dividerSize + 'px minmax(320px, 1fr)';
        splitLayout.style.gridTemplateRows = '';
        try { localStorage.setItem(getSplitStorageKey(), clamped); } catch (e) {}
    }

    function restoreSplitRatio() {
        if (!splitLayout) return;
        var saved = isHorizontalLayout() ? 0.5 : 0.45;
        try {
            var raw = parseFloat(localStorage.getItem(getSplitStorageKey()));
            if (!isNaN(raw)) saved = raw;
        } catch (e) {}
        applySplitRatio(saved);
    }

    function setupResizableSplit() {
        if (!splitDivider) return;
        splitDivider.onpointerdown = function(e) {
            e.preventDefault();
            splitLayout.classList.add('resizing');
            function onMove(ev) {
                var rect = splitLayout.getBoundingClientRect();
                var dividerSize = 14;
                var ratio = isHorizontalLayout()
                    ? (ev.clientX - rect.left) / Math.max(1, rect.width - dividerSize)
                    : (ev.clientY - rect.top) / Math.max(1, rect.height - dividerSize);
                applySplitRatio(ratio);
            }
            function onUp() {
                splitLayout.classList.remove('resizing');
                window.removeEventListener('pointermove', onMove);
                window.removeEventListener('pointerup', onUp);
            }
            window.addEventListener('pointermove', onMove);
            window.addEventListener('pointerup', onUp);
        };
    }

    function renderQuestions() {
        var container = document.getElementById('questions-container');
        container.innerHTML = '';
        allQuestions = [];
        function replaceToken(str, token, value) {
            return str.split(token).join(value);
        }

        lessonData.questions.forEach(function(qSet, setIdx) {
            var sectionDiv = document.createElement('div');
            sectionDiv.className = 'question-section';

            var label = document.createElement('div');
            label.className = 'section-label';
            label.textContent = qSet.label;
            sectionDiv.appendChild(label);

            if (qSet.instruction) {
                var instr = document.createElement('p');
                instr.className = 'section-instruction';
                instr.innerHTML = qSet.instruction;
                sectionDiv.appendChild(instr);
            }

            if (qSet.type === 'tfng' || qSet.type === 'ynng') {
                var isYnng = qSet.type === 'ynng';
                var opts = isYnng ? ['YES', 'NO', 'NOT_GIVEN'] : ['TRUE', 'FALSE', 'NOT_GIVEN'];
                var cls = isYnng ? 'ynng' : 'tfng';
                qSet.items.forEach(function(item) {
                    var qDiv = document.createElement('div');
                    qDiv.className = cls + '-question';
                    qDiv.id = 'q-' + item.id;

                    var textDiv = document.createElement('div');
                    textDiv.className = cls + '-text';
                    textDiv.textContent = item.id.replace('Q', '') + '. ' + item.text;
                    qDiv.appendChild(textDiv);

                    var optDiv = document.createElement('div');
                    optDiv.className = cls + '-options';
                    opts.forEach(function(opt) {
                        var labelEl = document.createElement('label');
                        var radio = document.createElement('input');
                        radio.type = 'radio';
                        radio.name = item.id;
                        radio.value = opt;
                        radio.setAttribute('data-question', item.id);
                        radio.required = true;
                        radio.addEventListener('change', function() {

    function questionNumber(questionId) {
        var match = String(questionId || '').match(/\d+/);
        return match ? Number(match[0]) : 0;
    }

    function passageNumberForQuestion(questionId) {
        var number = questionNumber(questionId);
        if (number >= 27) return 3;
        if (number >= 14) return 2;
        return 1;
    }

    function isQuestionAnswered(questionId) {
        var fields = document.querySelectorAll('[name="' + CSS.escape(questionId) + '"]');
        if (!fields.length) return false;
        var first = fields[0];
        if (first.type === 'radio') {
            return !!document.querySelector('[name="' + CSS.escape(questionId) + '"]:checked');
        }
        if (first.tagName === 'SELECT') return !!first.value;
        return !!String(first.value || '').trim();
    }

    function renderExamQuestionNav() {
        var nav = document.getElementById('exam-question-map');
        if (!nav) return;
        var grouped = {};
        allQuestions.forEach(function(question) {
            var passage = passageNumberForQuestion(question.id);
            if (!grouped[passage]) grouped[passage] = [];
            grouped[passage].push(question);
        });
        nav.innerHTML = Object.keys(grouped).sort(function(a, b) {
            return Number(a) - Number(b);
        }).map(function(passage) {
            return '<span class="exam-part-group"><span class="exam-part-label">Passage ' + passage + '</span>' +
                grouped[passage].map(function(question) {
                    var number = questionNumber(question.id) || question.id;
                    return '<button class="exam-q-nav" type="button" data-question-jump="' + question.id + '">' + number + '</button>';
                }).join('') +
            '</span>';
        }).join('');
        if (!activeQuestionId && allQuestions[0]) activeQuestionId = allQuestions[0].id;
        updateQuestionNav();
    }

    function setActiveQuestion(questionId) {
        if (!questionId) return;
        activeQuestionId = questionId;
        var checkbox = document.getElementById('exam-review-checkbox');
        if (checkbox) checkbox.checked = !!reviewedQuestions[questionId];
        updateQuestionNav();
    }

    function updateQuestionNav() {
        document.querySelectorAll('.exam-q-nav').forEach(function(button) {
            var questionId = button.getAttribute('data-question-jump');
            button.classList.toggle('current', questionId === activeQuestionId);
            button.classList.toggle('answered', isQuestionAnswered(questionId));
            button.classList.toggle('reviewed', !!reviewedQuestions[questionId]);
        });
    }

    function jumpToQuestion(questionId) {
        var question = allQuestions.find(function(item) { return item.id === questionId; });
        if (!question || !question.element) return;
        setActiveQuestion(questionId);
        question.element.scrollIntoView({ behavior: 'smooth', block: 'center' });
        var firstField = question.element.querySelector('[data-question="' + CSS.escape(questionId) + '"]');
        if (firstField) setTimeout(function() { firstField.focus(); }, 250);
    }

    function allAnswered() {
        var inputs = document.querySelectorAll('[data-question]');
        for (var i = 0; i < inputs.length; i++) {
            var el = inputs[i];
            if (el.type === 'radio') {
                var name = el.name;
                var checked = document.querySelector('[name="' + CSS.escape(name) + '"]:checked');
                if (!checked) return false;
            } else if (el.type === 'text') {
                if (!el.value || el.value.trim() === '') return false;
            } else if (el.tagName === 'SELECT') {
                if (!el.value) return false;
            }
        }
        return true;
    }

    function disableAllInputs() {
        document.querySelectorAll('[data-question]').forEach(function(el) { el.disabled = true; });
    }

    function collectSubmissionAnswers() {
        var answers = {};
        allQuestions.forEach(function(q) {
            var fields = document.querySelectorAll('[name="' + CSS.escape(q.id) + '"]');
            if (!fields.length) return;
            if (q.type === 'tfng' || q.type === 'ynng' || q.type === 'mcq') {
                var checked = document.querySelector('[name="' + CSS.escape(q.id) + '"]:checked');
                answers[q.id] = checked ? checked.value : '';
            } else {
                answers[q.id] = fields[0].value.trim();
            }
        });
        return answers;
    }

    function applyServerFeedback(response, answers) {
        if (response && response.attempt_id) currentArgueAttemptId = response.attempt_id;
        updateHistoryFromResponse(response);
        assignmentStatus = response.mastered ? 'mastered' : response.passed ? 'passed' : assignmentStatus;
        answerRevealAvailable = response.passed && !response.feedback_locked;
        updateHistoryToolbar();
        var resultMap = {};
        (response.question_results || []).forEach(function(item) {
            resultMap[item.question_id] = item;
        });

        allQuestions.forEach(function(q) {
            var result = resultMap[q.id];
            if (!result) return;
            var fields = document.querySelectorAll('[name="' + CSS.escape(q.id) + '"]');
            var evidence = document.getElementById('ev-' + q.id);

            if (q.type === 'tfng' || q.type === 'ynng' || q.type === 'mcq') {
                var checked = document.querySelector('[name="' + CSS.escape(q.id) + '"]:checked');
                var selectedLabel = checked ? checked.closest('label') : null;
                if (selectedLabel) selectedLabel.classList.add(result.correct ? 'correct' : 'wrong');
                if (!result.correct && result.correct_answer != null) {
                    var correctField = document.querySelector('[name="' + CSS.escape(q.id) + '"][value="' + CSS.escape(String(result.correct_answer)) + '"]');
                    if (correctField && correctField.closest('label')) correctField.closest('label').classList.add('correct');
                }
            } else if (fields.length) {
                fields[0].classList.add(result.correct ? 'correct' : 'wrong');
            }

            if (evidence && !result.correct) {
                setEvidenceAnswer(evidence, 'Correct answer: ' + answerText(result.correct_answer), result.explanation || '', result.correct_answer);
                evidence.classList.remove('show');
                evidence.removeAttribute('data-answer-visible');
                evidence.setAttribute('data-answer-reveal', '1');
                if (answerRevealAvailable) renderExplainButton(q, evidence);
                renderStudentArgueButton(q, evidence);
            }
        });

        disableAllInputs();
        var submitBtn = document.getElementById('submit-btn');
        submitBtn.disabled = true;
        submitBtn.textContent = 'Submitted';

        var scoreDisplay = document.getElementById('score-display');
        scoreDisplay.className = 'score-display show';
        var grade = response.percentage >= 90 ? 'Mastered' : response.percentage >= 50 ? 'Passed' : 'Keep trying';
        scoreDisplay.innerHTML = '<h2>Your Score</h2><div class="score-num">' +
            response.correct_count + ' / ' + response.question_count +
            '</div><div class="score-detail">' + (response.passed ? response.percentage + '% — ' : '') + grade + '</div>';
        showResultOverlay(response);
    }

    function handleSubmit(e) {
        e.preventDefault();
        var now = Date.now();
        logEvent(userId, setId, 'click', now, { action: 'submit' });

        if (!allAnswered()) {
            alert('Please answer all questions before submitting.');
            return;
        }

        var answers = collectSubmissionAnswers();
        var submitBtn = document.getElementById('submit-btn');
        submitBtn.disabled = true;
        submitBtn.textContent = 'Submitting...';

        window.MrCatCloud.callFunction('submitAttempt', {
            set_id: setId,
            assignment_id: assignmentId || null,
            mode: 'ielts_reading',
            answers: answers,
            started_at: attemptStartedAt,
            duration_seconds: Math.max(0, Math.round((Date.now() - new Date(attemptStartedAt).getTime()) / 1000))
        }).then(function(response) {
            if (!response || !response.success) {
                throw new Error(response && response.message || 'Unable to submit this attempt.');
            }
            applyServerFeedback(response, answers);
        }).catch(function(error) {
            submitBtn.disabled = false;
            submitBtn.textContent = 'Submit Answers';
            alert(error && error.message ? error.message : 'Unable to submit. Please try again.');
        });
    }

        for (var i = 0; i < students.length; i++) {

    function getStoredIdentity() {
        return localStorage.getItem('opencode_user') || (localStorage.getItem('opencode_visitor') === 'true' ? 'VISITOR' : '');
    }

    function updateDashboardCapsuleLabel(label, attempt) {
        var link = document.querySelector('.mrcat-back');
        if (!link) {
            if ((attempt || 0) < 20) {
                setTimeout(function() { updateDashboardCapsuleLabel(label, (attempt || 0) + 1); }, 25);
            }
            return;
        }
        link.textContent = label || 'Dashboard';
        link.setAttribute('aria-label', 'Back to dashboard');
        link.title = 'Back to dashboard';
    }

    function updateIdentityStatus() {
        var el = document.getElementById('identity-status');
        if (!el) return;
        var id = userId || getStoredIdentity();
        var label = id ? (id === 'VISITOR' ? 'Visitor' : getStudentLabel(id)) : 'Login';
        el.textContent = label;
        updateDashboardCapsuleLabel(label);
    }

    function loginAsUser(id) {
        userId = id;
        localStorage.setItem('opencode_user', id);
        localStorage.removeItem('opencode_visitor');
        updateIdentityStatus();
        loginOverlay.style.display = 'none';
        var url = new URL(window.location);
        url.searchParams.set('user', id);
        window.history.replaceState({}, '', url);
        initAfterLogin();
    }

    function loginAsVisitor() {
        userId = 'VISITOR';
        localStorage.removeItem('opencode_user');
        localStorage.setItem('opencode_visitor', 'true');
        updateIdentityStatus();
        loginOverlay.style.display = 'none';
        var url = new URL(window.location);
        url.searchParams.delete('user');
        window.history.replaceState({}, '', url);
        initAfterLogin();
    }

    function init() {
        if (!setId) {
            showError('No set specified. Please add <code>?set=SETID</code> to the URL, e.g. <code>?set=C7-T3-P1</code>.');
            return;
        }
        document.getElementById('exam-set-id').textContent = setId;
        startReadingTimer();

        if (!userId) userId = getStoredIdentity();
        if (params.get('user') && params.get('user') !== 'VISITOR') {
            localStorage.setItem('opencode_user', params.get('user'));
            localStorage.removeItem('opencode_visitor');
        } else if (params.get('user') === 'VISITOR') {
            localStorage.removeItem('opencode_user');
            localStorage.setItem('opencode_visitor', 'true');
        }
        updateIdentityStatus();

        if (teacherMode) {
            userId = 'TEACHER';
            initAfterLogin();
            return;
        }

        if (!userId || userId === 'VISITOR') {
            if (userId === 'VISITOR') {
                initAfterLogin();
                return;
            }
            loginOverlay.style.display = 'flex';
            loadingDisplay.style.display = 'none';
            var customInput = document.getElementById('ielts-custom-id-input');
            var customBtn = document.getElementById('ielts-custom-login-btn');
            var errorEl = document.getElementById('ielts-login-error');
            var visitorBtn = document.getElementById('ielts-visitor-btn');
            var savedBtn = document.getElementById('ielts-saved-identity-btn');

            if (customInput) customInput.value = '';
            if (errorEl) errorEl.textContent = '';
            var stored = localStorage.getItem('opencode_user') || '';
            if (savedBtn && stored) {
                savedBtn.style.display = 'block';
                savedBtn.textContent = 'Continue as ' + getStudentLabel(stored);
                savedBtn.onclick = function() { loginAsUser(stored); };
            } else if (savedBtn) {
                savedBtn.style.display = 'none';
            }

            function handleCustomLogin() {
                var id = customInput.value.trim();
                if (!id) { errorEl.textContent = 'Please enter a student ID.'; return; }
                if (validIds.indexOf(id) !== -1) {
                    errorEl.textContent = '';
                    loginAsUser(id);
                } else {
                    errorEl.textContent = 'Unknown ID: "' + id + '"';
                    if (confirm('No matching ID for "' + id + '". Continue as visitor?')) {
                        loginAsVisitor();
                    }
                }
            }

            customBtn.addEventListener('click', handleCustomLogin);
            customInput.addEventListener('keydown', function(e) {
                if (e.key === 'Enter') handleCustomLogin();
            });
            visitorBtn.addEventListener('click', loginAsVisitor);

            return;
        }

        initAfterLogin();
    }

    function initAfterLogin() {
        loadingDisplay.style.display = 'block';
        errorDisplay.style.display = 'none';

        fetch('data/' + setId + '.json?_=' + Date.now())
            .then(function(res) {
                if (!res.ok) throw new Error('HTTP ' + res.status);
                return res.json();
            })
            .then(function(data) {
                try {
                    lessonData = data;
                    loadingDisplay.style.display = 'none';
                    mainContent.style.display = 'block';

                    document.getElementById('title').textContent = lessonData.title;
                    document.getElementById('subtitle').textContent = lessonData.source || '';
                    document.getElementById('passage-title').textContent = lessonData.title || 'Reading Passage';
                    document.getElementById('passage-set-id').textContent = setId;

                    renderPassage();
                    renderQuestions();
                    renderExamQuestionNav();
                    if (teacherMode) {
                        renderTeacherAnswerToolbar();
                        document.getElementById('submit-btn').disabled = true;
                        document.getElementById('submit-btn').textContent = 'Teacher Preview';
                    } else {
                        loadSavedAnswers();
                        fetchPrefillAnswersIfNeeded();
                        renderHistoryToolbar();
                    }
                    setupControls();

                    logEvent(userId, setId, 'page_enter', Date.now(), { title: lessonData.title });
                } catch (renderErr) {
                    loadingDisplay.style.display = 'none';
                    showError('This lesson loaded, but the page hit a rendering problem. Please refresh once and try again.');
                    console.error(renderErr);
                }
            })
            .catch(function(err) {
                loadingDisplay.style.display = 'none';
                showError('Could not load lesson data for <strong>' + setId + '</strong>. Please check the set ID and try again.');
            });
    }

    function setupControls() {
        var submitBtn = document.getElementById('submit-btn');
        submitBtn.addEventListener('click', handleSubmit);
        var dashboardBtn = document.getElementById('exam-dashboard-btn');
        if (dashboardBtn) {
            dashboardBtn.onclick = function() {
                window.location.href = 'dashboard.html';
            };
        }
        var reviewCheckbox = document.getElementById('exam-review-checkbox');
        if (reviewCheckbox) {
            reviewCheckbox.onchange = function() {
                if (!activeQuestionId) return;
                if (reviewCheckbox.checked) {
                    reviewedQuestions[activeQuestionId] = true;
                } else {
                    delete reviewedQuestions[activeQuestionId];
                }
                updateQuestionNav();
            };
        }
        var questionMap = document.getElementById('exam-question-map');
        if (questionMap) {
            questionMap.onclick = function(event) {
                var button = event.target.closest('[data-question-jump]');
                if (!button) return;
                jumpToQuestion(button.getAttribute('data-question-jump'));
            };
        }

        var form = document.getElementById('main-content').querySelector('form');
        if (!form) {
            var wrap = document.createElement('form');
            wrap.id = 'quiz-form';
            wrap.style.display = 'contents';
            var parent = document.getElementById('split-layout').parentNode;
            parent.insertBefore(wrap, document.getElementById('split-layout'));
            wrap.appendChild(document.getElementById('split-layout'));
            wrap.addEventListener('submit', function(e) { e.preventDefault(); });
        }

        var fontConfigs = [
            {
                panel: document.getElementById('passage-panel'),
                target: document.getElementById('passage'),
                valEl: document.getElementById('passage-font-val'),
                key: 'ielts-font-passage'
            },
            {
                panel: document.getElementById('questions-panel'),
                target: document.getElementById('questions-container'),
                valEl: document.getElementById('questions-font-val'),
                key: 'ielts-font-questions'
            }
        ];
        fontConfigs.forEach(function(cfg) {
            if (!cfg.panel || !cfg.target) return;
            var saved = localStorage.getItem(cfg.key);
            if (saved) {
                cfg.valEl.textContent = saved;
                cfg.target.style.fontSize = saved + 'px';
            }
            var minus = cfg.panel.querySelector('.font-minus');
            var plus = cfg.panel.querySelector('.font-plus');
            if (minus) {
                minus.addEventListener('click', function() {
                    var cur = parseInt(cfg.valEl.textContent);
                    if (cur > 10) {
                        cur--;
                        cfg.valEl.textContent = cur;
                        cfg.target.style.fontSize = cur + 'px';
                        localStorage.setItem(cfg.key, cur);
                    }
                });
            }
            if (plus) {
                plus.addEventListener('click', function() {
                    var cur = parseInt(cfg.valEl.textContent);
                    if (cur < 24) {
                        cur++;
                        cfg.valEl.textContent = cur;
                        cfg.target.style.fontSize = cur + 'px';
                        localStorage.setItem(cfg.key, cur);
                    }
                });
            }
        });

        document.getElementById('highlight-add-btn').addEventListener('click', applyHighlight);
        document.getElementById('highlight-clear-btn').addEventListener('click', clearHighlight);
        document.addEventListener('change', function(event) {
            var questionId = event.target && event.target.getAttribute && event.target.getAttribute('data-question');
            if (!questionId) return;
            setActiveQuestion(questionId);
            updateQuestionNav();
        });
        document.addEventListener('input', function(event) {
            var questionId = event.target && event.target.getAttribute && event.target.getAttribute('data-question');
            if (!questionId) return;
            setActiveQuestion(questionId);
            updateQuestionNav();
        });
        document.addEventListener('focusin', function(event) {
            var questionId = event.target && event.target.getAttribute && event.target.getAttribute('data-question');
            if (questionId) setActiveQuestion(questionId);
        });
        restoreSplitRatio();
        setupResizableSplit();
        document.addEventListener('selectionchange', handleTextSelection);
        document.addEventListener('click', function(e) {
            var passageEl = getPassageEl();
            var questionsEl = getQuestionsEl();
            if (!highlightToolbar.contains(e.target) &&
                (!passageEl || !passageEl.contains(e.target)) &&
                (!questionsEl || !questionsEl.contains(e.target))) {
                clearHighlightToolbar();
            }
        });
    }

    window.addEventListener('beforeunload', function() {
        if (userId && setId) {
            logEvent(userId, setId, 'page_exit', Date.now(), {});
        }
    });

    init();
</script>
</body>
</html>
