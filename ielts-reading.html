<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IELTS Reading Practice</title>
    <style>
        :root { --primary: #2c3e50; --accent: #2563eb; --bg: #f4f7f6; --card-bg: #ffffff; --text-main: #333; --text-light: #666; --border-color: #e0e6ed; --correct-bg: #e8f8f5; --wrong-bg: #fdf2e9; }
        * { box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: var(--bg); color: var(--text-main); line-height: 1.6;
            margin: 0; padding: 40px 20px;
        }
        .container { max-width: 1200px; margin: 0 auto; background: var(--card-bg); padding: 30px 40px; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); position: relative; }
        h1 { color: var(--primary); text-align: center; border-bottom: 2px solid var(--accent); padding-bottom: 12px; margin-bottom: 6px; }
        .subtitle { text-align: center; color: var(--text-light); font-size: 0.95em; margin-bottom: 24px; }

        .error-display { text-align: center; padding: 60px 20px; color: #b91c1c; }
        .error-display h2 { color: #b91c1c; }
        .loading { text-align: center; padding: 60px 20px; color: var(--text-light); }

        .login-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5); display: flex; align-items: center; justify-content: center;
            z-index: 1000;
        }
        .login-modal {
            background: var(--card-bg); padding: 40px; border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.2); max-width: 400px; width: 90%;
            text-align: center;
        }
        .login-modal h2 { color: var(--primary); margin-top: 0; margin-bottom: 8px; }
        .login-modal p { color: var(--text-light); font-size: 0.9em; margin-bottom: 24px; }
        .identity-status {
            position: fixed;
            top: 14px;
            right: 16px;
            z-index: 900;
            padding: 8px 14px;
            border-radius: 999px;
            background: rgba(255,255,255,0.9);
            border: 1px solid rgba(255,255,255,0.92);
            color: var(--primary);
            font-size: 0.86em;
            font-weight: 700;
            box-shadow: 0 10px 24px rgba(44, 62, 80, 0.12);
            backdrop-filter: blur(14px);
        }
        .split-layout {
            --passage-width: minmax(320px, 1fr);
            display: grid;
            grid-template-columns: minmax(320px, 1fr) 12px minmax(320px, 1fr);
            gap: 0;
            margin: 20px 0;
            align-items: stretch;
        }
        @media (min-width: 769px) {
            body { padding: 0; }
            .container {
                max-width: none; width: 100%;
                background: transparent; padding: 10px 14px 8px;
                border-radius: 0; box-shadow: none;
            }
            h1 { margin: 0 0 4px; padding-bottom: 8px; font-size: 1.8em; }
            .subtitle { margin-bottom: 10px; }
            .layout-toggle { margin-bottom: 6px; }
            .split-layout { height: calc(100vh - 132px); min-height: 560px; margin: 8px 0 0; }
            .passage-panel, .questions-panel {
                overflow-y: auto; padding: 0 24px;
                border: none; border-radius: 0; background: transparent;
            }
            .passage-panel::-webkit-scrollbar, .questions-panel::-webkit-scrollbar { width: 6px; }
            .passage-panel::-webkit-scrollbar-thumb, .questions-panel::-webkit-scrollbar-thumb { background: #c1c1c1; border-radius: 3px; }
            .passage { padding: 0; background: transparent; border: none; border-radius: 0; }
            .questions-panel .question-section:first-child { margin-top: 0; }
            .submit-btn { margin-top: 20px; }
        }
        @media (max-width: 768px) {
            body { padding: 10px 5px; }
            .container { padding: 20px 12px; }
            .split-layout { grid-template-columns: 1fr; gap: 0; }
            h1 { font-size: 1.4em; }
            .passage-panel, .questions-panel { overflow-y: visible; max-height: none; padding: 0; border: none; }
        }
        .split-layout.vertical { grid-template-columns: 1fr; height: auto; min-height: 0; }
        .split-layout.vertical .passage-panel, .split-layout.vertical .questions-panel { overflow-y: visible; max-height: none; padding: 0; border: none; }
        .split-layout.vertical .split-divider { display: none; }
        .split-divider {
            position: relative;
            width: 12px;
            cursor: col-resize;
            user-select: none;
            touch-action: none;
        }
        .split-divider::before {
            content: "";
            position: absolute;
            left: 50%;
            top: 0;
            transform: translateX(-50%);
            width: 2px;
            height: 100%;
            background: linear-gradient(180deg, rgba(37,99,235,0.05), rgba(37,99,235,0.45), rgba(37,99,235,0.05));
            border-radius: 999px;
        }
        .split-divider::after {
            content: "";
            position: absolute;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            width: 8px;
            height: 64px;
            border-radius: 999px;
            background: rgba(37,99,235,0.15);
        }
        .split-layout.resizing { user-select: none; cursor: col-resize; }
        .split-layout.resizing .split-divider::after,
        .split-divider:hover::after { background: rgba(37,99,235,0.28); }
        @media (max-width: 768px) {
            .split-divider { display: none; }
        }

        .panel-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; min-height: 28px; }
        .questions-panel .panel-header { justify-content: flex-end; }
        .panel-header h2 { margin: 0; font-size: 1.1em; border-left: 3px solid var(--accent); padding-left: 10px; color: var(--primary); }

        .font-controls { display: flex; align-items: center; gap: 3px; }
        .font-btn {
            width: 24px; height: 24px; display: flex; align-items: center; justify-content: center;
            border: 1px solid var(--border-color); border-radius: 4px;
            background: var(--card-bg); color: var(--text-light); cursor: pointer;
            font-size: 1em; font-weight: bold; line-height: 1; padding: 0;
            transition: all 0.15s;
        }
        .font-btn:hover { border-color: var(--accent); color: var(--accent); background: #eff6ff; }
        .font-val { font-size: 0.75em; color: var(--text-light); min-width: 20px; text-align: center; }

        .layout-toggle {
            display: inline-flex; align-items: center; gap: 6px;
            padding: 6px 14px; font-size: 0.85em; border: 1px solid var(--border-color);
            border-radius: 20px; background: var(--card-bg); color: var(--text-light);
            cursor: pointer; transition: all 0.2s; user-select: none; margin-bottom: 12px;
        }
        .layout-toggle:hover { border-color: var(--accent); color: var(--accent); background: #eff6ff; }
        @media (max-width: 768px) { .layout-toggle { display: none; } }

        .passage { font-size: 14.5px; line-height: 1.9; padding: 16px 20px; background: #fafbfc; border-radius: 8px; border: 1px solid var(--border-color); }
        .passage p { margin-bottom: 1rem; text-indent: 0; }
        .passage mark.user-highlight,
        #questions-container mark.user-highlight {
            background: linear-gradient(180deg, rgba(255, 244, 133, 0.25), rgba(255, 232, 105, 0.95));
            color: inherit;
            padding: 0 1px;
            border-radius: 3px;
        }
        .highlight-toolbar {
            position: fixed;
            z-index: 1200;
            display: none;
            align-items: center;
            gap: 8px;
            padding: 8px 10px;
            border-radius: 999px;
            background: rgba(18, 35, 58, 0.96);
            color: #fff;
            box-shadow: 0 14px 34px rgba(15, 23, 42, 0.24);
        }
        .highlight-toolbar.show { display: inline-flex; }
        .highlight-toolbar button {
            border: none;
            border-radius: 999px;
            padding: 7px 12px;
            background: rgba(255,255,255,0.12);
            color: #fff;
            font-size: 0.82em;
            font-weight: 600;
            cursor: pointer;
        }
        .highlight-toolbar button:hover { background: rgba(255,255,255,0.22); }
        .highlight-toolbar button.primary { background: #facc15; color: #3b2f00; }
        .highlight-toolbar button.primary:hover { background: #fde047; }

        .question-section { margin-bottom: 32px; }
        .section-label {
            font-weight: 600; font-size: 1.05em; color: var(--primary);
            margin-bottom: 16px; padding: 10px 16px; background: #f1f5f9;
            border-radius: 6px; border-left: 4px solid var(--accent);
        }
        .section-instruction { font-size: 0.9em; color: var(--text-light); margin-bottom: 16px; }

        .tfng-question, .ynng-question {
            margin-bottom: 16px; padding: 14px 18px; background: #fafbfc;
            border-radius: 8px; border: 1px solid var(--border-color);
        }
        .tfng-text, .ynng-text { font-weight: 500; margin-bottom: 10px; color: var(--primary); font-size: 0.95em; }
        .tfng-options, .ynng-options { display: flex; gap: 8px; flex-wrap: wrap; }
        .tfng-options label, .ynng-options label {
            display: flex; align-items: center; gap: 5px;
            padding: 7px 16px; border-radius: 6px; border: 1px solid var(--border-color);
            cursor: pointer; transition: all 0.2s; font-size: 0.9em; font-weight: 500;
        }
        .tfng-options label:hover:not(.disabled), .ynng-options label:hover:not(.disabled) { border-color: var(--accent); background: #eff6ff; }
        .tfng-options input[type="radio"], .ynng-options input[type="radio"] { accent-color: var(--accent); }
        .tfng-options label:has(input[type="radio"]:checked), .ynng-options label:has(input[type="radio"]:checked) { border-color: var(--accent); background: #eff6ff; }
        .tfng-options label.correct, .ynng-options label.correct { border-color: #27ae60 !important; background: var(--correct-bg) !important; }
        .tfng-options label.wrong, .ynng-options label.wrong { border-color: #e67e22 !important; background: var(--wrong-bg) !important; }
        .tfng-options label:has(input[type="radio"]:disabled), .ynng-options label:has(input[type="radio"]:disabled) { cursor: not-allowed; opacity: 0.7; }
        .mcq-question {
            margin-bottom: 16px; padding: 14px 18px; background: #fafbfc;
            border-radius: 8px; border: 1px solid var(--border-color);
        }
        .mcq-text { font-weight: 500; margin-bottom: 10px; color: var(--primary); font-size: 0.95em; }
        .mcq-options { display: flex; flex-direction: column; gap: 8px; }
        .mcq-options label {
            display: flex; align-items: flex-start; gap: 8px;
            padding: 8px 12px; border-radius: 6px; border: 1px solid var(--border-color);
            cursor: pointer; transition: all 0.2s; font-size: 0.9em;
        }
        .mcq-options label:hover:not(.disabled) { border-color: var(--accent); background: #eff6ff; }
        .mcq-options input[type="radio"] { accent-color: var(--accent); margin-top: 3px; }
        .mcq-options label:has(input[type="radio"]:checked) { border-color: var(--accent); background: #eff6ff; }
        .mcq-options label.correct { border-color: #27ae60 !important; background: var(--correct-bg) !important; }
        .mcq-options label.wrong { border-color: #e67e22 !important; background: var(--wrong-bg) !important; }

        .summary-grid { display: grid; grid-template-columns: 1fr; gap: 0; }
        .summary-question {
            margin-bottom: 14px; padding: 14px 18px; background: #fafbfc;
            border-radius: 8px; border: 1px solid var(--border-color);
            display: flex; align-items: flex-start; gap: 10px;
        }
        .summary-num {
            width: 26px; height: 26px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 12px; font-weight: 600; flex-shrink: 0; margin-top: 1px;
        }
        .summary-text { flex: 1; font-size: 0.95em; line-height: 1.7; }
        .summary-text .blank-input {
            border: none; border-bottom: 2px solid var(--primary);
            background: transparent; text-align: center; color: var(--primary);
            font-size: 0.95em; font-weight: bold; width: 90px; outline: none;
            transition: border-color 0.2s, width 0.3s ease;
        }
        .summary-text .blank-input:focus { border-bottom-color: var(--accent); width: 130px; }
        .summary-text .blank-input:disabled { color: #7f8c8d; border-bottom-color: #bdc3c7; cursor: not-allowed; }
        .summary-text .blank-input.correct { border-bottom-color: #27ae60 !important; }
        .summary-text .blank-input.wrong { border-bottom-color: #e67e22 !important; }
        .summary-text .blank-select {
            min-width: 150px; border: 1px solid var(--border-color); border-radius: 6px;
            background: #fff; color: var(--primary); font-size: 0.92em; font-weight: 600;
            padding: 5px 8px; outline: none; transition: border-color 0.2s;
        }
        .summary-text .blank-select:focus { border-color: var(--accent); }
        .summary-text .blank-select:disabled { opacity: 0.65; cursor: not-allowed; }
        .summary-text .blank-select.correct { border-color: #27ae60 !important; }
        .summary-text .blank-select.wrong { border-color: #e67e22 !important; }

        .evidence-text { font-size: 0.85em; color: #b9770e; margin-top: 6px; padding: 6px 10px; background: var(--wrong-bg); border-radius: 4px; display: none; }
        .evidence-text.show { display: block; }

        .headings-section { margin-bottom: 16px; }
        .headings-list { display: grid; grid-template-columns: 1fr 1fr; gap: 4px 20px; margin-bottom: 16px; padding: 14px 18px; background: #fafbfc; border-radius: 8px; border: 1px solid var(--border-color); font-size: 0.9em; }
        .headings-list .heading-item { padding: 2px 0; color: var(--text-main); }
        .headings-list .heading-item .num { font-weight: 600; color: var(--accent); margin-right: 4px; }
        .heading-question {
            margin-bottom: 10px; padding: 10px 18px; background: #fafbfc;
            border-radius: 8px; border: 1px solid var(--border-color);
            display: flex; align-items: center; gap: 12px;
        }
        .heading-question .para-label { font-weight: 700; color: var(--accent); font-size: 1.1em; min-width: 28px; }
        .heading-question select {
            padding: 6px 10px; border: 1px solid var(--border-color); border-radius: 6px;
            font-size: 0.9em; outline: none; background: white; cursor: pointer;
            min-width: 80px; transition: border-color 0.2s;
        }
        .heading-question select:focus { border-color: var(--accent); }
        .heading-question select:disabled { cursor: not-allowed; opacity: 0.6; }
        .heading-question select.correct { border-color: #27ae60 !important; }
        .heading-question select.wrong { border-color: #e67e22 !important; }
        .heading-question.example-row { opacity: 0.7; }
        .heading-question .evidence-text { margin-top: 0; margin-left: auto; }

        .submit-btn {
            display: block; width: 100%; max-width: 400px; margin: 30px auto 20px;
            padding: 16px 20px; font-size: 1.2em; font-weight: bold; color: white;
            background: var(--accent); border: none; border-radius: 8px;
            cursor: pointer; transition: background 0.3s, transform 0.1s;
            box-shadow: 0 4px 6px rgba(37,99,235,0.2);
        }
        .submit-btn:hover:not(:disabled) { background: #1d4ed8; }
        .submit-btn:active:not(:disabled) { transform: translateY(2px); box-shadow: 0 2px 4px rgba(37,99,235,0.2); }
        .submit-btn:disabled { background: #95a5a6; cursor: not-allowed; box-shadow: none; }

        .score-display {
            text-align: center; padding: 20px; margin: 20px 0 30px;
            border-radius: 8px; display: none;
        }
        .score-display.show { display: block; }
        .score-display h2 { margin: 0 0 8px; }
        .score-display .score-num { font-size: 2em; font-weight: bold; color: var(--accent); }
        .score-display .score-detail { color: var(--text-light); font-size: 0.95em; }

        .correct-mark { color: #27ae60; font-weight: bold; margin-left: 6px; }
        .wrong-mark { color: #e67e22; font-weight: bold; margin-left: 6px; }

        @media (max-width: 480px) {
            .tfng-options, .ynng-options { flex-direction: column; gap: 6px; }
            .tfng-options label, .ynng-options label { width: 100%; justify-content: center; }
            .headings-list { grid-template-columns: 1fr; }
            .heading-question { flex-wrap: wrap; }
            .login-modal { padding: 24px 20px; }
        }
    </style>
</head>
<body>
<div class="identity-status" id="identity-status">Login</div>
<div class="container" id="app">
    <div id="login-overlay" class="login-overlay" style="display:none;">
        <div class="login-modal">
            <div class="custom-login" style="display:flex;gap:8px;margin-top:14px;">
                <input type="text" id="ielts-custom-id-input" placeholder="Enter a student ID" autocomplete="off" style="flex:1;padding:12px;border:1px solid var(--border);border-radius:8px;font-size:0.95em;outline:none;" />
                <button id="ielts-custom-login-btn" style="padding:12px 20px;background:#f97316;color:#fff;border:none;border-radius:8px;font-size:0.95em;font-weight:600;cursor:pointer;white-space:nowrap;">Login</button>
            </div>
            <button id="ielts-saved-identity-btn" style="display:none;width:100%;margin-top:12px;padding:12px;background:transparent;color:var(--text-light);border:1px solid var(--border-color);border-radius:8px;font-size:0.9em;cursor:pointer;">Continue</button>
            <div id="ielts-login-error" style="font-size:0.85em;color:var(--text-muted);margin-top:6px;min-height:1.2em;"></div>
            <div style="display:flex;align-items:center;gap:10px;margin:16px 0;color:var(--text-muted);font-size:0.85em;"><span style="flex:1;border-top:1px solid var(--border);"></span><span>or</span><span style="flex:1;border-top:1px solid var(--border);"></span></div>
            <button id="ielts-visitor-btn" style="display:block;width:100%;padding:12px;background:transparent;color:var(--text-muted);border:1px solid var(--border);border-radius:8px;font-size:0.9em;cursor:pointer;">Continue as Visitor</button>
        </div>
    </div>

    <div id="error-display" class="error-display" style="display:none;"></div>
    <div id="loading-display" class="loading" style="display:none;">Loading lesson...</div>

    <div id="main-content" style="display:none;">
        <h1 id="title"></h1>
        <p class="subtitle" id="subtitle"></p>

        <button class="layout-toggle" id="layout-toggle" type="button">⇕ Stacked</button>
        <div class="split-layout" id="split-layout">
            <div class="passage-panel" id="passage-panel">
                <div class="panel-header">
                    <h2>Reading Passage</h2>
                    <div class="font-controls">
                        <button class="font-btn font-minus" type="button" title="Decrease font size">−</button>
                        <span class="font-val" id="passage-font-val">14</span>
                        <button class="font-btn font-plus" type="button" title="Increase font size">+</button>
                    </div>
                </div>
                <div class="passage" id="passage"></div>
            </div>
            <div class="split-divider" id="split-divider" aria-hidden="true"></div>
            <div class="questions-panel" id="questions-panel">
                <div class="panel-header">
                    <div class="font-controls">
                        <button class="font-btn font-minus" type="button" title="Decrease font size">−</button>
                        <span class="font-val" id="questions-font-val">14</span>
                        <button class="font-btn font-plus" type="button" title="Increase font size">+</button>
                    </div>
                </div>
                <div id="questions-container"></div>
            </div>
        </div>

        <button class="submit-btn" id="submit-btn">Submit Answers</button>
        <div class="score-display" id="score-display"></div>
    </div>
</div>
<div class="highlight-toolbar" id="highlight-toolbar">
    <button class="primary" id="highlight-add-btn" type="button">Highlight</button>
    <button id="highlight-clear-btn" type="button">Clear</button>
</div>

<script src="https://static.cloudbase.net/cloudbase-js-sdk/2.28.6/cloudbase.full.js"></script>
<script src="assets/js/config.public.js?v=20260611-2"></script>
<script src="assets/js/cloudbase-client.js?v=20260611-2"></script>
<script src="assets/js/practice-session.js?v=20260611-2"></script>
<script>
    function logEvent(studentId, taskId, eventType, timestamp, eventData) {
        console.log(JSON.stringify({ studentId: studentId, taskId: taskId, eventType: eventType, timestamp: timestamp, eventData: eventData }));
    }

    var params = new URLSearchParams(window.location.search);
    var setId = params.get('set');
    var userId = params.get('user');
    var assignmentId = params.get('assignment') || '';
    var attemptStartedAt = new Date().toISOString();
    var lessonData = null;
    var allQuestions = [];
    var activeHighlightRange = null;
    var highlightToolbar = document.getElementById('highlight-toolbar');
    var splitLayout = document.getElementById('split-layout');
    var splitDivider = document.getElementById('split-divider');

    var loginOverlay = document.getElementById('login-overlay');
    var errorDisplay = document.getElementById('error-display');
    var loadingDisplay = document.getElementById('loading-display');
    var mainContent = document.getElementById('main-content');

    function getPassageEl() {
        return document.getElementById('passage');
    }

    function getQuestionsEl() {
        return document.getElementById('questions-container');
    }

    function getHighlightStorageKey() {
        return 'ielts-highlight-' + setId + '-' + (userId || 'VISITOR');
    }

    function getSplitStorageKey() {
        return 'ielts-split-ratio';
    }

    function isDesktopViewport() {
        return window.innerWidth >= 769;
    }

    function isHorizontalLayout() {
        return isDesktopViewport() && !splitLayout.classList.contains('vertical');
    }

    function showError(msg) {
        errorDisplay.style.display = 'block';
        errorDisplay.innerHTML = '<h2>Error</h2><p>' + msg + '</p>';
        loadingDisplay.style.display = 'none';
    }

    function storeAnswers() {
        if (!setId || !userId) return;
        var data = {};
        var inputs = document.querySelectorAll('[data-question]');
        inputs.forEach(function(el) {
            if (el.type === 'radio') {
                if (el.checked) data[el.name] = el.value;
            } else if (el.type === 'text') {
                data[el.name] = el.value;
            } else if (el.tagName === 'SELECT') {
                data[el.name] = el.value;
            }
        });
        try { localStorage.setItem('ielts-' + setId + '-' + userId, JSON.stringify(data)); } catch(e) {}
    }

    function loadSavedAnswers() {
        if (!setId || !userId) return;
        var key = 'ielts-' + setId + '-' + userId;
        if (params.get('retry') === '1') {
            localStorage.removeItem(key);
            return;
        }
        var saved;
        try { saved = JSON.parse(localStorage.getItem(key)); } catch(e) {}
        if (!saved) return;
        Object.keys(saved).forEach(function(name) {
            var val = saved[name];
            if (!val) return;
            var els = document.querySelectorAll('[name="' + CSS.escape(name) + '"]');
            els.forEach(function(el) {
                if (el.type === 'radio') {
                    if (el.value === val) el.checked = true;
                } else if (el.type === 'text') {
                    el.value = val;
                } else if (el.tagName === 'SELECT') {
                    el.value = val;
                }
            });
        });
    }

    function renderPassage() {
        var passageEl = getPassageEl();
        var saved = '';
        try { saved = localStorage.getItem(getHighlightStorageKey()) || ''; } catch (e) {}
        passageEl.innerHTML = saved || lessonData.passage;
    }

    function savePassageMarkup() {
        var passageEl = getPassageEl();
        if (!passageEl || !setId || !userId) return;
        try { localStorage.setItem(getHighlightStorageKey(), passageEl.innerHTML); } catch (e) {}
    }

    function clearHighlightToolbar() {
        activeHighlightRange = null;
        highlightToolbar.classList.remove('show');
    }

    function closestHighlight(node) {
        if (!node) return null;
        if (node.nodeType === 3) node = node.parentNode;
        return node && node.closest ? node.closest('mark.user-highlight') : null;
    }

    function getHighlightRootForRange(range) {
        var passageEl = getPassageEl();
        var questionsEl = getQuestionsEl();
        if (!range || range.collapsed) return null;
        if (passageEl && passageEl.contains(range.commonAncestorContainer)) return passageEl;
        if (questionsEl && questionsEl.contains(range.commonAncestorContainer)) return questionsEl;
        return null;
    }

    function canHighlightRange(range) {
        var root = getHighlightRootForRange(range);
        if (!root) return false;
        if (!range.toString().trim()) return false;
        var startEl = range.startContainer.nodeType === 1 ? range.startContainer : range.startContainer.parentElement;
        var endEl = range.endContainer.nodeType === 1 ? range.endContainer : range.endContainer.parentElement;
        if (!startEl || !endEl || !root.contains(startEl) || !root.contains(endEl)) return false;
        var startBlock = startEl.closest ? startEl.closest('p, li, label, .section-label, .section-instruction, .tfng-text, .ynng-text, .mcq-text, .summary-text, .heading-item') : null;
        var endBlock = endEl.closest ? endEl.closest('p, li, label, .section-label, .section-instruction, .tfng-text, .ynng-text, .mcq-text, .summary-text, .heading-item') : null;
        var fragment = range.cloneContents();
        if (fragment.querySelector && fragment.querySelector('input, select, textarea, button')) return false;
        return !!startBlock && startBlock === endBlock && root.contains(startBlock);
    }

    function positionHighlightToolbar(range) {
        var rect = range.getBoundingClientRect();
        if (!rect || (!rect.width && !rect.height)) return;
        highlightToolbar.classList.add('show');
        var toolbarRect = highlightToolbar.getBoundingClientRect();
        var left = rect.left + rect.width / 2 - toolbarRect.width / 2;
        var top = rect.top - toolbarRect.height - 10;
        left = Math.max(12, Math.min(left, window.innerWidth - toolbarRect.width - 12));
        if (top < 12) top = rect.bottom + 10;
        highlightToolbar.style.left = left + 'px';
        highlightToolbar.style.top = top + 'px';
        var clearBtn = document.getElementById('highlight-clear-btn');
        clearBtn.disabled = !closestHighlight(range.startContainer) && !closestHighlight(range.endContainer);
        clearBtn.style.opacity = clearBtn.disabled ? '0.45' : '1';
        clearBtn.style.cursor = clearBtn.disabled ? 'not-allowed' : 'pointer';
    }

    function normalizeHighlightMarkup(root) {
        if (!root) return;
        root.querySelectorAll('mark.user-highlight mark.user-highlight').forEach(function(nested) {
            var parent = nested.parentNode;
            while (nested.firstChild) parent.insertBefore(nested.firstChild, nested);
            parent.removeChild(nested);
        });
        root.querySelectorAll('mark.user-highlight').forEach(function(mark) {
            if (!mark.textContent.trim()) mark.remove();
        });
    }

    function applyHighlight() {
        if (!activeHighlightRange || !canHighlightRange(activeHighlightRange)) return;
        var range = activeHighlightRange.cloneRange();
        var root = getHighlightRootForRange(range);
        var mark = document.createElement('mark');
        mark.className = 'user-highlight';
        try {
            range.surroundContents(mark);
        } catch (err) {
            var fragment = range.extractContents();
            mark.appendChild(fragment);
            range.insertNode(mark);
        }
        normalizeHighlightMarkup(root);
        if (root === getPassageEl()) savePassageMarkup();
        var selection = window.getSelection();
        if (selection) selection.removeAllRanges();
        clearHighlightToolbar();
    }

    function clearHighlight() {
        var selection = window.getSelection();
        var mark = closestHighlight(selection && selection.anchorNode) || closestHighlight(selection && selection.focusNode);
        if (!mark) return;
        var parent = mark.parentNode;
        while (mark.firstChild) parent.insertBefore(mark.firstChild, mark);
        parent.removeChild(mark);
        var root = getPassageEl() && getPassageEl().contains(parent) ? getPassageEl() : getQuestionsEl();
        normalizeHighlightMarkup(root);
        if (root === getPassageEl()) savePassageMarkup();
        if (selection) selection.removeAllRanges();
        clearHighlightToolbar();
    }

    function handleTextSelection() {
        var selection = window.getSelection();
        if (!selection || !selection.rangeCount) {
            clearHighlightToolbar();
            return;
        }
        var range = selection.getRangeAt(0);
        if (!canHighlightRange(range)) {
            clearHighlightToolbar();
            return;
        }
        activeHighlightRange = range.cloneRange();
        positionHighlightToolbar(range);
    }

    function applySplitRatio(ratio) {
        if (!isHorizontalLayout()) {
            splitLayout.style.gridTemplateColumns = '';
            return;
        }
        var clamped = Math.min(0.75, Math.max(0.25, ratio));
        var available = splitLayout.clientWidth - 12;
        var leftWidth = Math.max(320, Math.round(available * clamped));
        splitLayout.style.gridTemplateColumns = leftWidth + 'px 12px minmax(320px, 1fr)';
        try { localStorage.setItem(getSplitStorageKey(), clamped); } catch (e) {}
    }

    function restoreSplitRatio() {
        if (!isHorizontalLayout()) {
            splitLayout.style.gridTemplateColumns = '';
            return;
        }
        var saved = 0.5;
        try {
            var raw = parseFloat(localStorage.getItem(getSplitStorageKey()));
            if (!isNaN(raw)) saved = raw;
        } catch (e) {}
        applySplitRatio(saved);
    }

    function setupResizableSplit() {
        if (!splitDivider) return;
        splitDivider.onpointerdown = function(e) {
            if (!isHorizontalLayout()) return;
            e.preventDefault();
            splitLayout.classList.add('resizing');
            function onMove(ev) {
                var rect = splitLayout.getBoundingClientRect();
                var ratio = (ev.clientX - rect.left) / rect.width;
                applySplitRatio(ratio);
            }
            function onUp() {
                splitLayout.classList.remove('resizing');
                window.removeEventListener('pointermove', onMove);
                window.removeEventListener('pointerup', onUp);
            }
            window.addEventListener('pointermove', onMove);
            window.addEventListener('pointerup', onUp);
        };
    }

    function allAnswered() {
        var inputs = document.querySelectorAll('[data-question]');
        for (var i = 0; i < inputs.length; i++) {
            var el = inputs[i];
            if (el.type === 'radio') {
                var name = el.name;
                var checked = document.querySelector('[name="' + CSS.escape(name) + '"]:checked');
                if (!checked) return false;
            } else if (el.type === 'text') {
                if (!el.value || el.value.trim() === '') return false;
            } else if (el.tagName === 'SELECT') {
                if (!el.value) return false;
            }
        }
        return true;
    }

    function disableAllInputs() {
        document.querySelectorAll('[data-question]').forEach(function(el) { el.disabled = true; });
    }

    function collectSubmissionAnswers() {
        var answers = {};
        allQuestions.forEach(function(q) {
            var fields = document.querySelectorAll('[name="' + CSS.escape(q.id) + '"]');
            if (!fields.length) return;
            if (q.type === 'tfng' || q.type === 'ynng' || q.type === 'mcq') {
                var checked = document.querySelector('[name="' + CSS.escape(q.id) + '"]:checked');
                answers[q.id] = checked ? checked.value : '';
            } else {
                answers[q.id] = fields[0].value.trim();
            }
        });
        return answers;
    }

    function applyServerFeedback(response, answers) {
        var resultMap = {};
        (response.question_results || []).forEach(function(item) {
            resultMap[item.question_id] = item;
        });

        allQuestions.forEach(function(q) {
            var result = resultMap[q.id];
            if (!result) return;
            var fields = document.querySelectorAll('[name="' + CSS.escape(q.id) + '"]');
            var evidence = document.getElementById('ev-' + q.id);

            if (q.type === 'tfng' || q.type === 'ynng' || q.type === 'mcq') {
                var checked = document.querySelector('[name="' + CSS.escape(q.id) + '"]:checked');
                var selectedLabel = checked ? checked.closest('label') : null;
                if (selectedLabel) selectedLabel.classList.add(result.correct ? 'correct' : 'wrong');
                if (!result.correct && result.correct_answer != null) {
                    var correctField = document.querySelector('[name="' + CSS.escape(q.id) + '"][value="' + CSS.escape(String(result.correct_answer)) + '"]');
                    if (correctField && correctField.closest('label')) correctField.closest('label').classList.add('correct');
                }
            } else if (fields.length) {
                fields[0].classList.add(result.correct ? 'correct' : 'wrong');
            }

            if (evidence && !result.correct) {
                evidence.textContent = 'Correct answer: ' + result.correct_answer + (result.explanation ? ' — ' + result.explanation : '');
                evidence.classList.add('show');
            }
        });

        disableAllInputs();
        var submitBtn = document.getElementById('submit-btn');
        submitBtn.disabled = true;
        submitBtn.textContent = 'Submitted';

        var scoreDisplay = document.getElementById('score-display');
        scoreDisplay.className = 'score-display show';
        var grade = response.percentage >= 80 ? 'Excellent' : response.percentage >= 60 ? 'Good' : response.percentage >= 40 ? 'Fair' : 'Needs Improvement';
        scoreDisplay.innerHTML = '<h2>Your Score</h2><div class="score-num">' +
            response.correct_count + ' / ' + response.question_count +
            '</div><div class="score-detail">' + response.percentage + '% — ' + grade + '</div>' +
            '<button class="submit-btn" id="try-again-btn" type="button" style="margin-top:16px;">Try Again</button>';
        document.getElementById('try-again-btn').addEventListener('click', function() {
            localStorage.removeItem('ielts-' + setId + '-' + userId);
            var url = new URL(window.location.href);
            url.searchParams.set('retry', '1');
            window.location.href = url.toString();
        });
    }

    function handleSubmit(e) {
        e.preventDefault();
        var now = Date.now();
        logEvent(userId, setId, 'click', now, { action: 'submit' });

        if (!allAnswered()) {
            alert('Please answer all questions before submitting.');
            return;
        }

        var answers = collectSubmissionAnswers();
        var submitBtn = document.getElementById('submit-btn');
        submitBtn.disabled = true;
        submitBtn.textContent = 'Submitting...';

        window.MrCatCloud.callFunction('submitAttempt', {
            set_id: setId,
            assignment_id: assignmentId || null,
            mode: 'ielts_reading',
            answers: answers,
            started_at: attemptStartedAt,
            duration_seconds: Math.max(0, Math.round((Date.now() - new Date(attemptStartedAt).getTime()) / 1000))
        }).then(function(response) {
            if (!response || !response.success) {
                throw new Error(response && response.message || 'Unable to submit this attempt.');
            }
            localStorage.removeItem('ielts-' + setId + '-' + userId);
            applyServerFeedback(response, answers);
        }).catch(function(error) {
            submitBtn.disabled = false;
            submitBtn.textContent = 'Submit Answers';
            alert(error && error.message ? error.message : 'Unable to submit. Please try again.');
        });
    }

        updateIdentityStatus();
        loginOverlay.style.display = 'none';
        var url = new URL(window.location);
        url.searchParams.delete('user');
        window.history.replaceState({}, '', url);
        initAfterLogin();

    function init() {
        if (!setId) {
            showError('No set specified. Please add <code>?set=SETID</code> to the URL, e.g. <code>?set=C7-T3-P1</code>.');
            return;
        }

        if (!userId) userId = getStoredIdentity();
        if (params.get('user') && params.get('user') !== 'VISITOR') {
            localStorage.setItem('opencode_user', params.get('user'));
            localStorage.removeItem('opencode_visitor');
        } else if (params.get('user') === 'VISITOR') {
            localStorage.removeItem('opencode_user');
            localStorage.setItem('opencode_visitor', 'true');
        }
        updateIdentityStatus();

        if (!userId || userId === 'VISITOR') {
            if (userId === 'VISITOR') {
                initAfterLogin();
                return;
            }
            loginOverlay.style.display = 'flex';
            loadingDisplay.style.display = 'none';
            var customInput = document.getElementById('ielts-custom-id-input');
            var customBtn = document.getElementById('ielts-custom-login-btn');
            var errorEl = document.getElementById('ielts-login-error');
            var visitorBtn = document.getElementById('ielts-visitor-btn');
            var savedBtn = document.getElementById('ielts-saved-identity-btn');

            if (customInput) customInput.value = '';
            if (errorEl) errorEl.textContent = '';
            var stored = localStorage.getItem('opencode_user') || '';
            if (savedBtn && stored) {
                savedBtn.style.display = 'block';
                savedBtn.textContent = 'Continue as ' + getStudentLabel(stored);
                savedBtn.onclick = function() { loginAsUser(stored); };
            } else if (savedBtn) {
                savedBtn.style.display = 'none';
            }

            function handleCustomLogin() {
                var id = customInput.value.trim();
                if (!id) { errorEl.textContent = 'Please enter a student ID.'; return; }
                if (validIds.indexOf(id) !== -1) {
                    errorEl.textContent = '';
                    loginAsUser(id);
                } else {
                    errorEl.textContent = 'Unknown ID: "' + id + '"';
                    if (confirm('No matching ID for "' + id + '". Continue as visitor?')) {
                        loginAsVisitor();
                    }
                }
            }

            customBtn.addEventListener('click', handleCustomLogin);
            customInput.addEventListener('keydown', function(e) {
                if (e.key === 'Enter') handleCustomLogin();
            });
            visitorBtn.addEventListener('click', loginAsVisitor);

            return;
        }

        initAfterLogin();
    }

    function initAfterLogin() {
        loadingDisplay.style.display = 'block';
        errorDisplay.style.display = 'none';

        fetch('data/' + setId + '.json?_=' + Date.now())
            .then(function(res) {
                if (!res.ok) throw new Error('HTTP ' + res.status);
                return res.json();
            })
            .then(function(data) {
                try {
                    lessonData = data;
                    loadingDisplay.style.display = 'none';
                    mainContent.style.display = 'block';

                    document.getElementById('title').textContent = lessonData.title;
                    document.getElementById('subtitle').textContent = lessonData.source;

                    renderPassage();
                    renderQuestions();
                    loadSavedAnswers();
                    setupControls();

                    logEvent(userId, setId, 'page_enter', Date.now(), { title: lessonData.title });
                } catch (renderErr) {
                    loadingDisplay.style.display = 'none';
                    showError('This lesson loaded, but the page hit a rendering problem. Please refresh once and try again.');
                    console.error(renderErr);
                }
            })
            .catch(function(err) {
                loadingDisplay.style.display = 'none';
                showError('Could not load lesson data for <strong>' + setId + '</strong>. Please check the set ID and try again.');
            });
    }

    function setupControls() {
        var submitBtn = document.getElementById('submit-btn');
        submitBtn.addEventListener('click', handleSubmit);

        var form = document.getElementById('main-content').querySelector('form');
        if (!form) {
            var wrap = document.createElement('form');
            wrap.id = 'quiz-form';
            wrap.style.display = 'contents';
            var parent = document.getElementById('split-layout').parentNode;
            parent.insertBefore(wrap, document.getElementById('split-layout'));
            wrap.appendChild(document.getElementById('split-layout'));
            wrap.appendChild(submitBtn);
            wrap.addEventListener('submit', function(e) { e.preventDefault(); });
        }

        var toggle = document.getElementById('layout-toggle');
        var split = document.getElementById('split-layout');
        if (localStorage.getItem('ieltsLayout') === 'vertical') {
            split.classList.add('vertical');
            toggle.textContent = '⇔ Side by Side';
        }
        toggle.addEventListener('click', function() {
            split.classList.toggle('vertical');
            var v = split.classList.contains('vertical');
            toggle.textContent = v ? '⇔ Side by Side' : '⇕ Stacked';
            localStorage.setItem('ieltsLayout', v ? 'vertical' : 'horizontal');
            if (v) {
                split.style.gridTemplateColumns = '';
            } else {
                restoreSplitRatio();
            }
        });
        setupResizableSplit();
        restoreSplitRatio();

        var fontConfigs = [
            {
                panel: document.getElementById('passage-panel'),
                target: document.getElementById('passage'),
                valEl: document.getElementById('passage-font-val'),
                key: 'ielts-font-passage'
            },
            {
                panel: document.getElementById('questions-panel'),
                target: document.getElementById('questions-container'),
                valEl: document.getElementById('questions-font-val'),
                key: 'ielts-font-questions'
            }
        ];
        fontConfigs.forEach(function(cfg) {
            if (!cfg.panel || !cfg.target) return;
            var saved = localStorage.getItem(cfg.key);
            if (saved) {
                cfg.valEl.textContent = saved;
                cfg.target.style.fontSize = saved + 'px';
            }
            var minus = cfg.panel.querySelector('.font-minus');
            var plus = cfg.panel.querySelector('.font-plus');
            if (minus) {
                minus.addEventListener('click', function() {
                    var cur = parseInt(cfg.valEl.textContent);
                    if (cur > 10) {
                        cur--;
                        cfg.valEl.textContent = cur;
                        cfg.target.style.fontSize = cur + 'px';
                        localStorage.setItem(cfg.key, cur);
                    }
                });
            }
            if (plus) {
                plus.addEventListener('click', function() {
                    var cur = parseInt(cfg.valEl.textContent);
                    if (cur < 24) {
                        cur++;
                        cfg.valEl.textContent = cur;
                        cfg.target.style.fontSize = cur + 'px';
                        localStorage.setItem(cfg.key, cur);
                    }
                });
            }
        });

        document.getElementById('highlight-add-btn').addEventListener('click', applyHighlight);
        document.getElementById('highlight-clear-btn').addEventListener('click', clearHighlight);
        document.addEventListener('selectionchange', handleTextSelection);
        document.addEventListener('click', function(e) {
            var passageEl = getPassageEl();
            var questionsEl = getQuestionsEl();
            if (!highlightToolbar.contains(e.target) &&
                (!passageEl || !passageEl.contains(e.target)) &&
                (!questionsEl || !questionsEl.contains(e.target))) {
                clearHighlightToolbar();
            }
        });
        window.addEventListener('resize', restoreSplitRatio);
    }

    window.addEventListener('beforeunload', function() {
        if (userId && setId) {
            logEvent(userId, setId, 'page_exit', Date.now(), {});
        }
    });

    init();
</script>
</body>
</html>
