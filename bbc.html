<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BBC 6 Minute English - Listening Practice</title>
    <style>
        :root {
            --primary: #16312f;
            --accent: #0f766e;
            --accent-bright: #14b8a6;
            --bg: #f4fbf7;
            --card-bg: rgba(255,255,255,0.78);
            --text-main: #1f2937;
            --text-light: #64748b;
            --border-color: rgba(15, 118, 110, 0.16);
            --correct-bg: #e8f8f5;
            --wrong-bg: #fdf2e9;
            --warm: #f97316;
            --warm-soft: #fff2df;
        }

        * { box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background:
                radial-gradient(circle at top left, rgba(254, 243, 199, 0.9) 0, transparent 28%),
                radial-gradient(circle at 90% 4%, rgba(209, 250, 229, 0.9) 0, transparent 24%),
                linear-gradient(180deg, #f8fafc 0%, #eef8f4 100%);
            color: var(--text-main);
            line-height: 1.6;
            margin: 0;
            padding: 28px 16px 64px;
        }

        .container {
            max-width: 980px;
            margin: 0 auto;
            background: transparent;
            padding: 0;
        }

        .lesson-hero {
            position: relative;
            overflow: hidden;
            color: #fff;
            background: linear-gradient(135deg, #123f3c 0%, #0f766e 54%, #14b8a6 100%);
            border: 1px solid rgba(255,255,255,0.22);
            border-radius: 30px;
            padding: 34px 30px 28px;
            margin-bottom: 16px;
            box-shadow: 0 24px 60px rgba(15, 118, 110, 0.22);
        }

        .lesson-hero::before,
        .lesson-hero::after {
            content: '';
            position: absolute;
            border-radius: 999px;
            pointer-events: none;
        }

        .lesson-hero::before {
            width: 260px;
            height: 260px;
            right: -64px;
            top: -78px;
            background: radial-gradient(circle, rgba(255, 237, 213, 0.6), transparent 66%);
        }

        .lesson-hero::after {
            width: 190px;
            height: 190px;
            right: 180px;
            bottom: -90px;
            background: radial-gradient(circle, rgba(204, 251, 241, 0.42), transparent 68%);
        }

        .hero-kicker {
            display: inline-flex;
            position: relative;
            z-index: 1;
            padding: 7px 12px;
            border-radius: 999px;
            background: rgba(255,255,255,0.16);
            border: 1px solid rgba(255,255,255,0.24);
            font-size: 0.82rem;
            font-weight: 800;
            letter-spacing: 0.04em;
            text-transform: uppercase;
        }

        h1 {
            color: inherit;
            text-align: center;
            border-bottom: none;
            padding-bottom: 0;
            margin: 10px 0 6px;
            font-size: clamp(2rem, 5vw, 3.5rem);
            line-height: 1.02;
            letter-spacing: -0.055em;
            position: relative;
            z-index: 1;
        }

        .hero-subtitle {
            position: relative;
            z-index: 1;
            text-align: center;
            color: rgba(255,255,255,0.72);
            font-size: 0.88rem;
            font-weight: 600;
            letter-spacing: 0.02em;
        }

        .hero-meta {
            position: relative;
            z-index: 1;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            color: rgba(255,255,255,0.82);
            font-weight: 700;
            font-size: 0.94rem;
        }

        #bbc-audio {
            display: none;
        }

        .sticky-player {
            display: grid;
            grid-template-columns: auto minmax(0, 1fr) auto;
            align-items: center;
            gap: 14px;
        }

        .player-btn {
            border: none;
            border-radius: 999px;
            cursor: pointer;
            font-weight: 900;
            transition: transform 0.15s ease, background 0.2s ease, opacity 0.2s ease;
        }

        .play-btn {
            width: 46px;
            height: 46px;
            background: #fff;
            color: var(--accent);
            font-size: 1rem;
            box-shadow: 0 12px 28px rgba(15, 23, 42, 0.18);
        }

        .player-btn:hover:not(:disabled) {
            transform: translateY(-1px);
        }

        .back-btn {
            padding: 10px 13px;
            background: rgba(255,255,255,0.16);
            color: #fff;
            border: 1px solid rgba(255,255,255,0.26);
        }

        .back-btn:disabled {
            opacity: 0.42;
            cursor: not-allowed;
        }

        .progress-wrap {
            min-width: 0;
        }

        .progress-wrap {
            cursor: pointer;
            position: relative;
            -webkit-tap-highlight-color: transparent;
        }

        .progress-track {
            width: 100%;
            height: 10px;
            border-radius: 999px;
            overflow: hidden;
            background: rgba(255,255,255,0.22);
            pointer-events: none;
        }

        .progress-fill {
            width: 0%;
            height: 100%;
            border-radius: inherit;
            background: linear-gradient(90deg, #fde68a, #fff);
            pointer-events: none;
        }

        .time-row {
            display: grid;
            grid-template-columns: 1fr auto 1fr;
            align-items: center;
            gap: 12px;
            margin-top: 8px;
            color: rgba(255,255,255,0.82);
            font-size: 0.82rem;
            font-weight: 800;
        }

        .time-row span:last-child {
            text-align: right;
        }

        .sticky-player {
            position: sticky;
            top: 0;
            z-index: 800;
            margin: 0 0 24px;
            padding: 12px 14px;
            border-radius: 18px;
            background: rgba(18, 63, 60, 0.94);
            border: 1px solid rgba(255,255,255,0.18);
            box-shadow: 0 14px 36px rgba(15, 23, 42, 0.18);
            backdrop-filter: blur(16px);
        }

        .sticky-identity {
            color: rgba(255,255,255,0.78);
            text-align: center;
            white-space: nowrap;
        }

        .sticky-player .play-btn {
            width: 38px;
            height: 38px;
        }

        .sticky-player .back-btn {
            width: 38px;
            height: 38px;
            background: #fff;
            color: var(--accent);
            font-size: 0.82rem;
            padding: 0;
            border: none;
            box-shadow: 0 12px 28px rgba(15, 23, 42, 0.18);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            line-height: 1;
        }

        h2 {
            color: var(--primary);
            font-size: 1.4em;
            margin-top: 40px;
            border-left: 4px solid var(--accent);
            padding-left: 15px;
        }

        h3 {
            color: var(--accent);
            font-size: 1.1em;
            margin-top: 25px;
            margin-bottom: 10px;
        }

        .content-card {
            background: rgba(255,255,255,0.74);
            border: 1px solid rgba(255,255,255,0.82);
            border-radius: 26px;
            padding: 26px;
            margin-top: 18px;
            box-shadow: 0 16px 38px rgba(15, 23, 42, 0.07);
            backdrop-filter: blur(18px);
        }

        .quiz-toolbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 8px;
            margin-bottom: 18px;
        }

        .quiz-toolbar h2 {
            margin: 0;
        }

        .font-size-controls {
            display: flex;
            align-items: center;
            gap: 8px;
            flex: 0 0 auto;
        }

        .font-size-btn {
            width: 34px;
            height: 34px;
            border: 1px solid rgba(15, 118, 110, 0.16);
            border-radius: 999px;
            background: rgba(255,255,255,0.82);
            color: var(--accent);
            font-size: 1.1rem;
            font-weight: 900;
            cursor: pointer;
            box-shadow: 0 8px 18px rgba(15, 23, 42, 0.05);
        }

        .font-size-btn:hover {
            background: rgba(15, 118, 110, 0.09);
        }

        ul.fill-blanks {
            list-style-type: none;
            padding-left: 0;
            margin: 0;
            color: var(--text-main);
            font-size: 1.02em;
        }

        ul.fill-blanks li {
            margin-bottom: 12px;
            line-height: 1.85;
            padding: 14px 16px;
            background: rgba(255,255,255,0.76);
            border: 1px solid rgba(15, 118, 110, 0.12);
            border-radius: 16px;
            box-shadow: 0 8px 18px rgba(15, 23, 42, 0.04);
        }
        .blank-num {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-width: 28px;
            height: 28px;
            margin-right: 8px;
            border-radius: 999px;
            font-weight: 900;
            color: #fff;
            background: var(--accent);
        }
        .blank-section-title {
            font-weight: 900;
            font-size: 1.03em;
            color: var(--accent);
            margin: 26px 0 12px;
            padding: 12px 14px;
            background: rgba(15, 118, 110, 0.08);
            border: 1px solid rgba(15, 118, 110, 0.14);
            border-left: 5px solid var(--accent);
            border-radius: 16px;
        }
        .blank-section-title:first-of-type {
            margin-top: 0;
        }

        .blank-input {
            border: none;
            border-bottom: 2px solid var(--accent);
            background: transparent;
            text-align: center;
            margin: 0 3px;
            color: var(--primary);
            font-size: 0.95em;
            font-weight: bold;
            padding: 0 4px 2px;
            width: 30px;
            min-width: 30px;
            outline: none;
            transition: border-color 0.2s, width 0.1s;
            box-sizing: content-box;
        }
        .blank-input:focus {
            border-bottom-color: #f97316;
        }

        .blank-input:focus {
            border-bottom-color: var(--accent);
        }

        .blank-input::placeholder {
            color: #ccc;
            font-weight: normal;
        }

        .blank-input:disabled {
            color: #7f8c8d;
            border-bottom-color: #bdc3c7;
            cursor: not-allowed;
        }

        .blank-input.correct {
            background: var(--correct-bg) !important;
            border-bottom-color: var(--accent) !important;
        }

        .blank-input.wrong {
            background: var(--wrong-bg) !important;
            border-bottom-color: #e74c3c !important;
        }

        .mc-question {
            margin-bottom: 35px;
            background: #fafbfc;
            padding: 20px;
            border-radius: 8px;
            border: 1px solid var(--border-color);
        }

        .mc-question.wrong {
            border-left: 4px solid #e74c3c;
        }

        .mc-question.correct {
            border-left: 4px solid var(--accent);
        }

        .mc-title {
            font-weight: 600;
            font-size: 1.1em;
            margin-bottom: 15px;
            color: var(--primary);
        }

        .mc-options {
            list-style-type: none;
            padding: 0;
            margin: 0;
        }

        .mc-options li {
            background: var(--card-bg);
            margin: 8px 0;
            border-radius: 6px;
            border: 1px solid var(--border-color);
            border-left: 4px solid var(--border-color);
            transition: all 0.2s ease;
        }

        .mc-options li:hover:not(.disabled) {
            border-left-color: var(--accent);
            background: #f0f9f4;
        }

        .mc-options li:has(input[type="radio"]:checked) {
            border-left-color: var(--accent);
            background: #e8f8f5;
            border-color: var(--accent);
        }

        .mc-options li.wrong {
            border-left-color: #e74c3c !important;
            background: #fff5f5 !important;
            border-color: #f5c6c6 !important;
        }

        .mc-options li.wrong label {
            color: #c0392b;
        }

        .mc-options li.correct {
            border-left-color: var(--accent) !important;
            background: #f0fff4 !important;
            border-color: #b8e6c8 !important;
        }

        .mc-options label {
            display: flex;
            align-items: flex-start;
            padding: 12px 18px;
            cursor: pointer;
            width: 100%;
        }

        .mc-options input[type="radio"] {
            margin-top: 4px;
            margin-right: 12px;
            transform: scale(1.2);
            accent-color: var(--accent);
            cursor: pointer;
        }

        .mc-options input[type="radio"]:disabled {
            cursor: not-allowed;
        }

        .mc-options label:has(input[type="radio"]:disabled) {
            cursor: not-allowed;
            color: #7f8c8d;
        }

        .option-label {
            font-weight: bold;
            margin-right: 8px;
            color: var(--accent);
        }

        .matching-section {
            margin-bottom: 35px;
            background: #fafbfc;
            padding: 20px;
            border-radius: 8px;
            border: 1px solid var(--border-color);
        }

        .matching-instruction {
            font-weight: 600;
            font-size: 1.1em;
            margin-bottom: 15px;
            color: var(--primary);
        }

        .matching-table {
            width: 100%;
            border-collapse: collapse;
        }

        .matching-table th {
            text-align: left;
            padding: 10px 15px;
            background: #f8f9fa;
            color: var(--primary);
            border: 1px solid var(--border-color);
            font-weight: bold;
        }

        .matching-table td {
            padding: 12px 15px;
            border: 1px solid var(--border-color);
            vertical-align: middle;
        }

        .matching-table tr:nth-child(even) td {
            background: #fcfcfc;
        }

        .matching-table select {
            padding: 8px 12px;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            font-size: 0.95em;
            background: var(--card-bg);
            color: var(--text-main);
            outline: none;
            cursor: pointer;
            min-width: 80px;
        }

        .matching-table select:focus {
            border-color: var(--accent);
        }

        .matching-table select:disabled {
            cursor: not-allowed;
            background: #f1f1f1;
        }

        .matching-table select.correct {
            border-color: var(--accent);
            background: var(--correct-bg);
        }

        .matching-table select.wrong {
            border-color: #e74c3c;
            background: var(--wrong-bg);
        }

        .right-label {
            font-weight: bold;
            color: var(--text-light);
            margin-right: 6px;
        }

        .submit-btn {
            display: block;
            width: 100%;
            max-width: 400px;
            margin: 50px auto 30px;
            padding: 16px 20px;
            font-size: 1.2em;
            font-weight: bold;
            color: white;
            background-color: var(--accent);
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.3s, transform 0.1s;
            box-shadow: 0 4px 6px rgba(39, 174, 96, 0.2);
        }

        .submit-btn:hover:not(:disabled) {
            background-color: #1e8449;
        }

        .submit-btn:active:not(:disabled) {
            transform: translateY(2px);
            box-shadow: 0 2px 4px rgba(39, 174, 96, 0.2);
        }

        .submit-btn:disabled {
            background-color: #95a5a6;
            cursor: not-allowed;
            box-shadow: none;
        }

        #score-display {
            text-align: center;
            font-size: 1.3em;
            font-weight: bold;
            padding: 15px;
            border-radius: 8px;
            margin: 20px 0;
            display: none;
        }

        #score-display.show {
            display: block;
        }

        #score-display.perfect {
            background: var(--correct-bg);
            color: #1e7e34;
            border: 1px solid #b8e6c8;
        }

        #score-display.partial {
            background: #fff8e1;
            color: #b9770e;
            border: 1px solid #f5cba7;
        }

        #score-display.zero {
            background: var(--wrong-bg);
            color: #c0392b;
            border: 1px solid #f5c6c6;
        }

        .feedback-bar {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-top: 10px;
        }

        .answer-toggle-btn {
            border: 1px solid rgba(15, 118, 110, 0.2);
            border-radius: 999px;
            padding: 6px 14px;
            background: rgba(255,255,255,0.9);
            color: var(--accent);
            font-size: 0.8rem;
            font-weight: 800;
            cursor: pointer;
        }

        .answer-toggle-btn:hover {
            background: var(--accent);
            color: #fff;
        }

        .argue-btn {
            border: 1px solid #e2c8b0;
            border-radius: 999px;
            padding: 6px 14px;
            background: #fff6ed;
            color: #9a5a2a;
            font-size: 0.8rem;
            font-weight: 800;
            cursor: pointer;
        }

        .argue-btn:hover {
            background: #fde8d0;
            color: #7a431a;
        }

        .inline-explanation {
            margin-top: 10px;
            padding: 10px 14px;
            border-radius: 6px;
            font-size: 0.92em;
            line-height: 1.7;
            animation: fadeIn 0.4s ease-in-out;
            display: none;
        }

        .inline-explanation.show {
            display: block;
        }

        .inline-explanation.wrong {
            background: #fff5f5;
            border: 1px solid #f5c6c6;
            border-left: 4px solid #e74c3c;
            color: #c0392b;
        }

        .inline-explanation.correct {
            background: #f0fff4;
            border: 1px solid #b8e6c8;
            border-left: 4px solid var(--accent);
            color: #1e7e34;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.4);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .modal-overlay.show {
            display: flex;
        }

        .modal-box {
            background: #fff;
            border-radius: 12px;
            padding: 32px;
            max-width: 420px;
            width: 90%;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0,0,0,0.15);
        }

        .modal-box h2 {
            border-left: none;
            margin-top: 0;
            text-align: center;
        }

        .modal-box p {
            margin: 0 0 24px;
            font-size: 1.05em;
            line-height: 1.6;
            color: #333;
        }

        .modal-actions {
            display: flex;
            gap: 12px;
            justify-content: center;
        }

        .modal-btn {
            padding: 10px 28px;
            border: none;
            border-radius: 8px;
            font-size: 1em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .modal-btn.primary {
            background: var(--accent);
            color: #fff;
        }

        .modal-btn.primary:hover {
            background: #1e8449;
        }

        .modal-btn.danger {
            background: #e74c3c;
            color: #fff;
        }

        .modal-btn.danger:hover {
            background: #c0392b;
        }

        .argue-inline {
            margin-top: 8px;
            padding: 10px 12px;
            border: 1px solid #e2c8b0;
            border-radius: 12px;
            background: #fffaf5;
        }

        .argue-inline textarea {
            width: 100%;
            min-height: 52px;
            padding: 8px 10px;
            border: 1px solid #dce8e3;
            border-radius: 8px;
            font-family: inherit;
            font-size: 0.85rem;
            resize: vertical;
            outline: none;
            box-sizing: border-box;
        }

        .argue-inline textarea:focus {
            border-color: var(--accent);
        }

        .argue-inline-actions {
            display: flex;
            gap: 8px;
            margin-top: 8px;
        }

        .argue-inline-actions button {
            min-height: 32px;
            padding: 0 14px;
            border-radius: 8px;
            font-size: 0.8rem;
            font-weight: 800;
            cursor: pointer;
        }

        .argue-inline-submit {
            border: 0;
            color: #fff;
            background: var(--accent);
        }

        .argue-inline-submit:hover {
            background: var(--accent-dark);
        }

        .argue-inline-cancel {
            border: 1px solid var(--line);
            color: var(--ink);
            background: #fff;
        }

        .argue-inline-cancel:hover {
            background: #f4f8f5;
        }

        .argue-inline-done {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.85rem;
            font-weight: 700;
            color: #237a52;
        }

        .argue-inline-close {
            margin-left: auto;
            border: 1px solid #dce8e3;
            border-radius: 8px;
            padding: 4px 12px;
            background: #fff;
            color: var(--muted);
            font-size: 0.75rem;
            font-weight: 800;
            cursor: pointer;
        }

        .argue-inline-close:hover {
            background: #f4f8f5;
        }

        #error-message {
            text-align: center;
            padding: 60px 20px;
            font-size: 1.2em;
            color: #e74c3c;
        }

        #error-message .error-icon {
            font-size: 3em;
            margin-bottom: 20px;
        }

        #error-message h2 {
            border-left: none;
            text-align: center;
            color: #e74c3c;
        }

        #error-message p {
            color: var(--text-light);
        }

        #loading-message {
            text-align: center;
            padding: 60px 20px;
            font-size: 1.2em;
            color: var(--text-light);
        }

        .error-container {
            display: none;
        }

        .login-container {
            display: none;
        }

        .content-container {
            display: none;
        }

        @media screen and (max-width: 768px) {
            body { padding: 10px 5px; }
            .container { padding: 25px 15px; }
            h1 { font-size: 1.5em; }
            .mc-question { padding: 15px 12px; }
            .matching-section { padding: 15px 12px; }
            .matching-table th, .matching-table td { padding: 8px 10px; }
            .modal-box { padding: 24px 20px; }
        }
    </style>
</head>
<body>
<div class="container" id="app">
    <div id="loading-message">Loading lesson data...</div>

    <div id="error-message" class="error-container">
        <div class="error-icon">&#9888;</div>
        <h2>Error</h2>
        <p id="error-text"></p>
    </div>

    <div id="login-modal" class="modal-overlay">
        <div class="modal-box">
            <div style="display:flex;gap:8px;margin-top:14px;">
                <input type="text" id="bbc-custom-id-input" placeholder="Enter a student ID" autocomplete="off" style="flex:1;padding:12px;border:1px solid var(--border);border-radius:8px;font-size:0.95em;outline:none;background:var(--bg-page);color:var(--text-primary);" />

                <p id="incomplete-message">Please answer all questions before submitting.</p>

<script src="https://static.cloudbase.net/cloudbase-js-sdk/2.28.6/cloudbase.full.js"></script>
<script src="assets/js/config.public.js?v=20260611-2"></script>
<script src="assets/js/cloudbase-client.js?v=20260611-2"></script>
<script src="assets/js/practice-session.js?v=20260611-2"></script>
<script>
(function() {
    'use strict';

    var lessonData = null;
    var studentId = '';
    var setId = '';
    var submitted = false;
    var blankCount = 0;
    var mcCount = 0;
    var matchCount = 0;
    var quizFontScale = 1;
    var assignmentId = '';
    var attemptStartedAt = new Date().toISOString();
    var currentArgueAttemptId = null;
    var isDragging = false;

    var students = [
        { id: 'EI6688', label: '甘昕雨Eilene' },
        { id: 'EV3389', label: '刘榆雯Eva' },
        { id: 'LEO6666', label: 'jxbleo' }
    ];

    var validIds = ['EI6688', 'EV3389', 'LEO6666'];

    function getStudentLabel(id) {
        for (var i = 0; i < students.length; i++) {
            if (students[i].id === id) return students[i].label;
        }
        return id;
    }

    function getStoredIdentity() {
        return localStorage.getItem('opencode_user') || (localStorage.getItem('opencode_visitor') === 'true' ? 'VISITOR' : '');
    }

    function updateIdentityStatus() {
        var el = document.getElementById('identity-status');
        if (!el) return;
        var id = studentId || getStoredIdentity();
        el.textContent = id ? (id === 'VISITOR' ? 'Visitor' : getStudentLabel(id)) : 'Login';
    }

    function getParams() {
        var q = window.location.search.substring(1);
        var p = q.split('&');
        var params = {};
        for (var i = 0; i < p.length; i++) {
            var kv = p[i].split('=');
            if (kv[0]) params[decodeURIComponent(kv[0])] = decodeURIComponent(kv.slice(1).join('=') || '');
        }
        return params;
    }

    function logEvent(eventType, eventData) {
        var entry = {
            studentId: studentId,
            taskId: setId,
            eventType: eventType,
            timestamp: new Date().toISOString(),
            eventData: eventData || null
        };
        console.log(JSON.stringify(entry));
    }

    function formatAudioTime(seconds) {
        if (!isFinite(seconds) || seconds < 0) seconds = 0;
        var min = Math.floor(seconds / 60);
        var sec = Math.floor(seconds % 60);
        return min + ':' + String(sec).padStart(2, '0');
    }

    function getAudio() {
        return document.getElementById('bbc-audio');
    }

    function setText(id, value) {
        var el = document.getElementById(id);
        if (el) el.textContent = value;
    }

    function setProgress(id, pct) {
        var el = document.getElementById(id);
        if (el) el.style.width = pct + '%';
    }

    function updateAudioUi() {
        var audio = getAudio();
        if (!audio) return;
        var duration = audio.duration || 0;
        var current = audio.currentTime || 0;
        var pct = duration ? Math.min(100, Math.max(0, current / duration * 100)) : 0;
        var playText = audio.paused ? '▶' : 'Ⅱ';
        setText('sticky-play-btn', playText);
        setText('sticky-current-time', formatAudioTime(current));
        setText('sticky-duration', formatAudioTime(duration));
        if (!isDragging) setProgress('sticky-progress-fill', pct);
    }

    function toggleAudioPlayback() {
        var audio = getAudio();
        if (!audio) return;
        if (audio.paused) {
            var playPromise = audio.play();
            if (playPromise && playPromise.catch) {
                playPromise.catch(function() {
                    updateAudioUi();
                });
            }
        } else {
            audio.pause();
        }
        updateAudioUi();
    }

    function backFiveSeconds() {
        var audio = getAudio();
        if (!audio) return;
        audio.currentTime = Math.max(0, (audio.currentTime || 0) - 5);
        updateAudioUi();
    }

    function setupAudioPlayer() {
        var audio = getAudio();
        if (!audio) return;
        if (audio.dataset.ready !== 'true') {
            audio.dataset.ready = 'true';
            var playButtons = [document.getElementById('sticky-play-btn')];
            var backButtons = [document.getElementById('sticky-back-btn')];
            for (var i = 0; i < playButtons.length; i++) {
                if (playButtons[i]) playButtons[i].addEventListener('click', toggleAudioPlayback);
            }
            for (var j = 0; j < backButtons.length; j++) {
                if (backButtons[j]) backButtons[j].addEventListener('click', backFiveSeconds);
            }
            audio.addEventListener('loadedmetadata', updateAudioUi);
            audio.addEventListener('timeupdate', updateAudioUi);
            audio.addEventListener('play', updateAudioUi);
            audio.addEventListener('pause', updateAudioUi);
            audio.addEventListener('ended', updateAudioUi);

            var progressWrap = document.getElementById('sticky-player').querySelector('.progress-wrap');
            var progressFill = document.getElementById('sticky-progress-fill');

            function seekFromEvent(clientX) {
                var rect = progressWrap.getBoundingClientRect();
                var pct = Math.max(0, Math.min(1, (clientX - rect.left) / rect.width));
                if (progressFill) progressFill.style.width = (pct * 100) + '%';
                if (audio.duration) audio.currentTime = pct * audio.duration;
                if (!audio.paused) {
                    var playPromise = audio.play();
                    if (playPromise && playPromise.catch) playPromise.catch(function() {});
                }
            }

            function onPointerDown(e) {
                isDragging = true;
                seekFromEvent(e.clientX);
                e.preventDefault();
            }

            function onPointerMove(e) {
                if (!isDragging) return;
                seekFromEvent(e.clientX);
                e.preventDefault();
            }

            function onPointerUp() {
                isDragging = false;
            }

            if (progressWrap) {
                progressWrap.addEventListener('mousedown', onPointerDown);
                progressWrap.addEventListener('touchstart', function(e) {
                    onPointerDown(e.touches[0]);
                }, { passive: false });
            }
            document.addEventListener('mousemove', onPointerMove);
            document.addEventListener('mouseup', onPointerUp);
            document.addEventListener('touchmove', function(e) {
                if (isDragging) {
                    onPointerMove(e.touches[0]);
                    e.preventDefault();
                }
            }, { passive: false });
            document.addEventListener('touchend', onPointerUp);
        }
        updateAudioUi();
    }

    function updateQuizFontSize(delta) {
        quizFontScale = Math.min(1.3, Math.max(0.9, quizFontScale + delta));
        var form = document.getElementById('quiz-form');
        if (form) form.style.fontSize = quizFontScale.toFixed(2) + 'em';
    }

    function showIncompleteModal(missingCount) {
        var modal = document.getElementById('incomplete-modal');
        var message = document.getElementById('incomplete-message');
        if (message) {
            message.textContent = 'Please answer all questions before submitting. ' + missingCount + ' question' + (missingCount === 1 ? ' is' : 's are') + ' still waiting for you.';
        }
        if (modal) modal.classList.add('show');
    }

    function renderBlanks(blanks) {
        var container = document.getElementById('blanks-container');
        if (!blanks || !blanks.length) {
            container.innerHTML = '<li>No fill-in-the-blank exercises available.</li>';
            return;
        }
        blankCount = blanks.length;
        var html = '';
        var currentSection = '';
        for (var i = 0; i < blanks.length; i++) {
            var b = blanks[i];
            var num = i + 1;
            if (b.section && b.section !== currentSection) {
                currentSection = b.section;
                html += '<div class="blank-section-title">' + currentSection + '</div>';
            }
            var sentence = b.sentence;
            var inputHtml = ' <input type="text" name="' + b.id + '" class="blank-input" placeholder="' + num + '" autocomplete="off">';
            sentence = sentence.replace('_____', inputHtml);
            html += '<li><span class="blank-num">' + num + '</span>' + sentence + '</li>';
        }
        container.innerHTML = html;

        var inputs = container.querySelectorAll('.blank-input');
        for (var j = 0; j < inputs.length; j++) {
            inputs[j].addEventListener('input', function() {
                var len = this.value.length || this.placeholder.length;
                this.style.width = Math.max(30, len * 8 + 10) + 'px';
            });
        }
    }

    function renderMC(mcItems) {
        var container = document.getElementById('mc-container');
        if (!mcItems || !mcItems.length) {
            container.innerHTML = '<p>No multiple choice questions available.</p>';
            mcCount = 0;
            return;
        }
        mcCount = mcItems.length;
        var labels = ['A', 'B', 'C', 'D'];
        var html = '';
        for (var i = 0; i < mcItems.length; i++) {
            var m = mcItems[i];
            var qNum = i + 1;
            html += '<div class="mc-question" data-id="' + m.id + '">';
            html += '<div class="mc-title">' + qNum + '. ' + m.question + '</div>';
            html += '<ul class="mc-options">';
            for (var o = 0; o < m.options.length; o++) {
                var opt = m.options[o];
                var letter = labels[o] || '';
                var displayOpt = opt;
                if (displayOpt.indexOf(letter + '. ') !== 0) {
                    displayOpt = letter + '. ' + displayOpt;
                }
                html += '<li>';
                html += '<label>';
                html += '<input type="radio" name="' + m.id + '" value="' + letter + '">';
                html += '<span><span class="option-label">' + letter + '.</span> ' + displayOpt.substring(letter.length + 2) + '</span>';
                html += '</label>';
                html += '</li>';
            }
            html += '</ul></div>';
        }
        container.innerHTML = html;
    }

    function renderMatching(matching) {
        var divider = document.getElementById('matching-divider');
        var heading = document.getElementById('matching-heading');
        var container = document.getElementById('matching-container');

        if (!matching || !matching.length) {
            divider.style.display = 'none';
            heading.style.display = 'none';
            matchCount = 0;
            return;
        }
        divider.style.display = '';
        heading.style.display = '';
        matchCount = matching.length;

        var labels = ['A', 'B', 'C', 'D', 'E', 'F', 'G', 'H', 'I', 'J'];

        var html = '';
        for (var i = 0; i < matching.length; i++) {
            var m = matching[i];
            var pairs = m.pairs;
            html += '<div class="matching-section" data-id="' + m.id + '">';
            html += '<div class="matching-instruction">' + (i + 1) + '. ' + m.instruction + '</div>';
            html += '<table class="matching-table">';
            html += '<thead><tr><th>Item</th><th>Your Match</th></tr></thead>';
            html += '<tbody>';

            var rightItems = [];
            for (var p = 0; p < pairs.length; p++) {
                rightItems.push(pairs[p].right);
            }

            for (var r = 0; r < pairs.length; r++) {
                var pair = pairs[r];
                html += '<tr>';
                html += '<td>' + pair.left + '</td>';
                html += '<td>';
                html += '<select name="' + m.id + '-' + r + '">';
                html += '<option value="">-- Select --</option>';
                for (var o = 0; o < rightItems.length; o++) {
                    html += '<option value="' + labels[o] + '">' + labels[o] + '. ' + rightItems[o] + '</option>';
                }
                html += '</select>';
                html += '</td>';
                html += '</tr>';
            }

            html += '</tbody></table></div>';
        }
        container.innerHTML = html;
    }

    function formatEpisodeDate(setId) {
        var match = String(setId || '').match(/BBC-(\d{2})(\d{2})(\d{2})/);
        if (!match) return '';
        return '20' + match[1] + '-' + match[2] + '-' + match[3];
    }

    function renderLesson(data) {
        lessonData = data;

        var titleEl = document.getElementById('title-area');
        titleEl.innerHTML = '<h1>' + data.title + '</h1>' +
            '<div class="hero-subtitle">BBC Six Minute English, ' + formatEpisodeDate(setId || data.id) + '</div>';
        document.getElementById('hero-meta').innerHTML = '';

        var audioSrc = document.getElementById('audio-source');
        audioSrc.src = data.audioSrc;
        var audio = document.getElementById('bbc-audio');
        audio.load();
        setupAudioPlayer();

        renderBlanks(data.blanks);
        renderMC(data.multipleChoice);
        renderMatching(data.matching);

        document.getElementById('content').style.display = 'block';
        document.getElementById('loading-message').style.display = 'none';
    }

    function showError(msg) {
        document.getElementById('loading-message').style.display = 'none';
        var errEl = document.getElementById('error-message');
        document.getElementById('error-text').textContent = msg;
        errEl.style.display = 'block';
    }

    function showLoginPrompt() {
        document.getElementById('loading-message').style.display = 'none';
        var modal = document.getElementById('login-modal');
        var customInput = document.getElementById('bbc-custom-id-input');
        var customBtn = document.getElementById('bbc-custom-login-btn');
        var errorEl = document.getElementById('bbc-login-error');
        var visitorBtn = document.getElementById('bbc-visitor-btn');
        var savedBtn = document.getElementById('bbc-saved-identity-btn');
        if (customInput) customInput.value = '';
        if (errorEl) errorEl.textContent = '';
        var stored = localStorage.getItem('opencode_user') || '';
        if (savedBtn && stored) {
            savedBtn.style.display = 'block';
            savedBtn.textContent = 'Continue as ' + getStudentLabel(stored);
            savedBtn.onclick = function() { selectStudent(stored); };
        } else if (savedBtn) {
            savedBtn.style.display = 'none';
        }

        function handleCustomLogin() {
            var id = customInput.value.trim();
            if (!id) { errorEl.textContent = 'Please enter a student ID.'; return; }
            if (validIds.indexOf(id) !== -1) {
                errorEl.textContent = '';
                selectStudent(id);
            } else {
                errorEl.textContent = 'Unknown ID: "' + id + '"';
                if (confirm('No matching ID for "' + id + '". Continue as visitor?')) {
                    selectVisitor();
                }
            }
        }

        function selectVisitor() {
            studentId = 'VISITOR';
            localStorage.removeItem('opencode_user');
            localStorage.setItem('opencode_visitor', 'true');
            updateIdentityStatus();
            logEvent('login', { studentId: 'VISITOR' });
            modal.classList.remove('show');
            fetchLesson();
        }

        if (customBtn) customBtn.addEventListener('click', handleCustomLogin);
        if (customInput) customInput.addEventListener('keydown', function(e) {
            if (e.key === 'Enter') handleCustomLogin();
        });
        if (visitorBtn) visitorBtn.addEventListener('click', selectVisitor);

        modal.classList.add('show');
    }

    function selectStudent(id) {
        studentId = id;
        localStorage.setItem('opencode_user', id);
        localStorage.removeItem('opencode_visitor');
        updateIdentityStatus();
        var url = new URL(window.location.href);
        url.searchParams.set('user', studentId);
        window.history.replaceState({}, '', url);
        logEvent('login', { studentId: studentId });
        document.getElementById('login-modal').classList.remove('show');
        fetchLesson();
    }

    function init() {
        var params = getParams();
        setId = params.set || '';
        assignmentId = params.assignment || '';
        studentId = params.user || getStoredIdentity();
        if (params.user && params.user !== 'VISITOR') {
            localStorage.setItem('opencode_user', params.user);
            localStorage.removeItem('opencode_visitor');
        } else if (params.user === 'VISITOR') {
            localStorage.removeItem('opencode_user');
            localStorage.setItem('opencode_visitor', 'true');
        }
        updateIdentityStatus();

        logEvent('page_enter', { set: setId, user: studentId });

        if (!setId) {
            showError('No lesson set specified. Please add a <code>?set=BBC-XXXXXX</code> parameter to the URL.');
            return;
        }

        if (!studentId || studentId === 'VISITOR') {
            if (studentId === 'VISITOR') {
                fetchLesson();
                return;
            }
            showLoginPrompt();
            return;
        }

        fetchLesson();
    }

    function fetchLesson() {
        var url = 'data/' + setId + '.json?_=' + Date.now();
        fetch(url)
            .then(function(response) {
                if (!response.ok) {
                    throw new Error('Failed to load lesson data (HTTP ' + response.status + '). Please check that the set ID "' + setId + '" is correct.');
                }
                return response.json();
            })
            .then(function(data) {
                renderLesson(data);
            })
            .catch(function(err) {
                showError(err.message || 'An error occurred while loading the lesson.');
            });
    }

    function collectAnswers() {
        var answers = {};
        var form = document.getElementById('quiz-form');
        var els = form.elements;
        for (var i = 0; i < els.length; i++) {
            var el = els[i];
            if (el.type === 'radio') {
                if (el.checked) answers[el.name] = el.value;
            } else if (el.type === 'text') {
                answers[el.name] = el.value.trim();
            } else if (el.tagName === 'SELECT') {
                answers[el.name] = el.value;
            }
        }
        return answers;
    }

    function checkAllAnswered(userAnswers) {
        var form = document.getElementById('quiz-form');
        var missing = [];
        var required = form.querySelectorAll('input[type="text"], input[type="radio"], select');
        var radioGroups = {};

        for (var i = 0; i < required.length; i++) {
            var el = required[i];
            if (el.type === 'radio') {
                if (!radioGroups[el.name]) radioGroups[el.name] = false;
                if (el.checked) radioGroups[el.name] = true;
            } else if (el.type === 'text') {
                if (!el.value || el.value.trim() === '') {
                    missing.push(el.name);
                }
            } else if (el.tagName === 'SELECT') {
                if (!el.value) {
                    missing.push(el.name);
                }
            }
        }

        for (var name in radioGroups) {
            if (!radioGroups[name]) missing.push(name);
        }

        return missing;
    }

    function showScore(score) {
        var el = document.getElementById('score-display');
        el.textContent = score.correct + ' / ' + score.total + ' correct';
        el.className = 'show';
        if (score.total === 0) {
            el.className += ' zero';
        } else if (score.correct === score.total) {
            el.className += ' perfect';
        } else if (score.correct === 0) {
            el.className += ' zero';
        } else {
            el.className += ' partial';
        }
    }

    function applyFeedback(results) {
        for (var i = 0; i < results.length; i++) {
            var r = results[i];
            if (r.type === 'blank') {
                var input = document.querySelector('[name="' + r.id + '"]');
                if (!input) continue;
                input.classList.add(r.isCorrect ? 'correct' : 'wrong');
                var li = input.closest('li');
                if (li) {
                    var exp = document.createElement('div');
                    exp.className = 'inline-explanation' + (r.isCorrect ? ' correct' : ' wrong');
                    var prefix = r.isCorrect ? '&#10004;' : '&#10060;';
                    exp.innerHTML = prefix + ' <strong>Correct answer:</strong> ' + r.correctAnswer + (r.evidence ? '<br><strong>Evidence:</strong> ' + r.evidence : '');
                    li.parentNode.insertBefore(exp, li.nextSibling);
                    var bar = document.createElement('div');
                    bar.className = 'feedback-bar';
                    var toggleBtn = document.createElement('button');
                    toggleBtn.className = 'answer-toggle-btn';
                    toggleBtn.textContent = 'Show Answer';
                    toggleBtn.addEventListener('click', function(expEl) {
                        return function() {
                            expEl.classList.toggle('show');
                            this.textContent = expEl.classList.contains('show') ? 'Hide Answer' : 'Show Answer';
                        };
                    }(exp));
                    bar.appendChild(toggleBtn);
                    var argueBtn = document.createElement('button');
                    argueBtn.className = 'argue-btn';
                    argueBtn.textContent = 'Argue';
                    argueBtn.addEventListener('click', function(qId, barEl) {
                        return function() { openArgueInline(qId, barEl.parentNode); };
                    }(r.id, bar));
                    bar.appendChild(argueBtn);
                    li.parentNode.insertBefore(bar, exp.nextSibling);
                }
            } else if (r.type === 'mc') {
                var mcDiv = document.querySelector('[data-id="' + r.id + '"]');
                if (!mcDiv) continue;
                mcDiv.classList.add(r.isCorrect ? 'correct' : 'wrong');
                var correctRadio = mcDiv.querySelector('input[value="' + r.correctAnswer + '"]');
                if (correctRadio) {
                    correctRadio.closest('li').classList.add('correct');
                }
                if (!r.isCorrect && r.userAnswer) {
                    var wrongRadio = mcDiv.querySelector('input[value="' + r.userAnswer + '"]');
                    if (wrongRadio) {
                        wrongRadio.closest('li').classList.add('wrong');
                    }
                }
                var exp = document.createElement('div');
                exp.className = 'inline-explanation' + (r.isCorrect ? ' correct' : ' wrong');
                var prefix = r.isCorrect ? '&#10004;' : '&#10060;';
                exp.innerHTML = prefix + ' <strong>Correct answer:</strong> ' + r.correctAnswer + (r.evidence ? '<br><strong>Evidence:</strong> ' + r.evidence : '');
                mcDiv.appendChild(exp);
                var bar = document.createElement('div');
                bar.className = 'feedback-bar';
                var toggleBtn = document.createElement('button');
                toggleBtn.className = 'answer-toggle-btn';
                toggleBtn.textContent = 'Show Answer';
                toggleBtn.addEventListener('click', function(expEl) {
                    return function() {
                        expEl.classList.toggle('show');
                        this.textContent = expEl.classList.contains('show') ? 'Hide Answer' : 'Show Answer';
                    };
                }(exp));
                bar.appendChild(toggleBtn);
                var argueBtn = document.createElement('button');
                argueBtn.className = 'argue-btn';
                argueBtn.textContent = 'Argue';
                argueBtn.addEventListener('click', function(qId, barEl) {
                    return function() { openArgueInline(qId, barEl.parentNode); };
                }(r.id, bar));
                bar.appendChild(argueBtn);
                mcDiv.appendChild(bar);
            } else if (r.type === 'match') {
                var select = document.querySelector('[name="' + r.id + '"]');
                if (!select) continue;
                select.classList.add(r.isCorrect ? 'correct' : 'wrong');
                var tr = select.closest('tr');
                if (tr) {
                    var exp = document.createElement('div');
                    exp.className = 'inline-explanation wrong';
                    exp.innerHTML = '&#10060; <strong>Correct match:</strong> ' + r.correctAnswer;
                    var td = tr.querySelector('td:last-child');
                    td.appendChild(exp);
                    var bar = document.createElement('div');
                    bar.className = 'feedback-bar';
                    var toggleBtn = document.createElement('button');
                    toggleBtn.className = 'answer-toggle-btn';
                    toggleBtn.textContent = 'Show Answer';
                    toggleBtn.addEventListener('click', function(expEl) {
                        return function() {
                            expEl.classList.toggle('show');
                            this.textContent = expEl.classList.contains('show') ? 'Hide Answer' : 'Show Answer';
                        };
                    }(exp));
                    bar.appendChild(toggleBtn);
                    var argueBtn = document.createElement('button');
                    argueBtn.className = 'argue-btn';
                    argueBtn.textContent = 'Argue';
                    argueBtn.addEventListener('click', function(qId, barEl) {
                        return function() { openArgueInline(qId, barEl.parentNode); };
                    }(r.id, bar));
                    bar.appendChild(argueBtn);
                    td.appendChild(bar);
                }
            }
        }
    }

    function openArgueInline(questionId, containerEl) {
        var existing = containerEl.querySelector('.argue-inline');
        if (existing) return;
        var panel = document.createElement('div');
        panel.className = 'argue-inline';
        panel.innerHTML =
            '<textarea placeholder="Why should this answer be reviewed? (optional)"></textarea>' +
            '<div class="argue-inline-actions">' +
                '<button class="argue-inline-submit" type="button">Submit</button>' +
                '<button class="argue-inline-cancel" type="button">Cancel</button>' +
            '</div>';
        containerEl.appendChild(panel);

        panel.querySelector('.argue-inline-submit').addEventListener('click', function() {
            submitArgueInline(questionId, panel);
        });
        panel.querySelector('.argue-inline-cancel').addEventListener('click', function() {
            panel.remove();
        });
    }

    function submitArgueInline(questionId, panel) {
        var reason = panel.querySelector('textarea').value.trim();
        var submitBtn = panel.querySelector('.argue-inline-submit');
        submitBtn.disabled = true;
        submitBtn.textContent = 'Sending...';
        window.MrCatCloud.callFunction('getDashboard', {
            action: 'submitDispute',
            attempt_id: currentArgueAttemptId || '',
            question_id: questionId,
            reason: reason
        }).then(function(result) {
            if (!result || !result.success) {
                throw new Error(result && result.message || result && result.code || 'Unable to submit Argue.');
            }
            panel.innerHTML =
                '<div class="argue-inline-done">' +
                    'Sent to teacher. Thank you!' +
                    '<button class="argue-inline-close" type="button">Close</button>' +
                '</div>';
            panel.querySelector('.argue-inline-close').addEventListener('click', function() {
                panel.remove();
            });
        }).catch(function(error) {
            submitBtn.disabled = false;
            submitBtn.textContent = 'Submit';
            var msg = error.message === 'DISPUTE_ALREADY_EXISTS' ? 'Already sent' : (error.message || 'Try again');
            var msgEl = document.createElement('p');
            msgEl.style.cssText = 'margin:6px 0 0;font-size:0.82rem;color:#b54747;';
            msgEl.textContent = msg;
            panel.querySelector('.argue-inline-actions').after(msgEl);
        });
    }

    function disableAllInputs() {
        var form = document.getElementById('quiz-form');
        var els = form.elements;
        for (var i = 0; i < els.length; i++) {
            els[i].disabled = true;
        }
        var lis = form.querySelectorAll('.mc-options li');
        for (var j = 0; j < lis.length; j++) {
            lis[j].classList.add('disabled');
        }
    }

    function handleSubmit(e) {
        e.preventDefault();

        if (submitted) return;

        logEvent('click', { element: 'submit-btn', action: 'submit' });

        var userAnswers = collectAnswers();
        var missing = checkAllAnswered(userAnswers);

        if (missing.length > 0) {
            showIncompleteModal(missing.length);
            return;
        }

        var confirmModal = document.getElementById('confirm-modal');
        confirmModal.classList.add('show');
    }

    function doSubmit() {
        document.getElementById('confirm-modal').classList.remove('show');

        var userAnswers = collectAnswers();
        var btn = document.getElementById('submit-btn');
        btn.disabled = true;
        btn.textContent = 'Submitting...';

        window.MrCatCloud.callFunction('submitAttempt', {
            set_id: setId,
            assignment_id: assignmentId || null,
            mode: 'bbc',
            answers: userAnswers,
            started_at: attemptStartedAt,
            duration_seconds: Math.max(0, Math.round((Date.now() - new Date(attemptStartedAt).getTime()) / 1000))
        }).then(function(response) {
            if (!response || !response.success) {
                throw new Error(response && response.message || 'Unable to save this attempt.');
            }

            submitted = true;
            btn.textContent = 'Submitted';
            currentArgueAttemptId = response.attempt_id;

            var feedback = (response.question_results || []).map(function(item) {
                var source = null;
                var type = 'blank';
                if (lessonData.blanks) {
                    source = lessonData.blanks.find(function(entry) { return entry.id === item.question_id; });
                }
                if (!source && lessonData.multipleChoice) {
                    source = lessonData.multipleChoice.find(function(entry) { return entry.id === item.question_id; });
                    if (source) type = 'mc';
                }
                if (!source && item.question_id.indexOf('-') !== -1) type = 'match';
                return {
                    type: type,
                    id: item.question_id,
                    userAnswer: item.submitted_answer || userAnswers[item.question_id] || '',
                    correctAnswer: item.correct_answer,
                    isCorrect: item.correct === true,
                    evidence: item.explanation || '',
                    question: source && source.question || ''
                };
            });

            showScore({
                correct: response.correct_count,
                total: response.question_count
            });
            disableAllInputs();
            if (!response.feedback_locked) applyFeedback(feedback);
            logEvent('submit', {
                attemptId: response.attempt_id,
                percentage: response.percentage,
                passed: response.passed
            });
        }).catch(function(error) {
            btn.disabled = false;
            btn.textContent = 'Submit Answers';
            alert(error && error.message ? error.message : 'Unable to submit. Please try again.');
        });
    }

    function attachListeners() {
        var form = document.getElementById('quiz-form');

        form.addEventListener('submit', handleSubmit);

        form.addEventListener('change', function(e) {
            var target = e.target;
            if (target.type === 'radio' || target.tagName === 'SELECT') {
                logEvent('answer_change', { name: target.name, value: target.value, type: target.type || 'select' });
            }
        });

        form.addEventListener('input', function(e) {
            if (e.target.type === 'text') {
                logEvent('answer_change', { name: e.target.name, value: e.target.value, type: 'text' });
            }
        });

        document.getElementById('modal-confirm').addEventListener('click', doSubmit);
        document.getElementById('modal-cancel').addEventListener('click', function() {
            document.getElementById('confirm-modal').classList.remove('show');
        });

        document.getElementById('incomplete-close').addEventListener('click', function() {
            document.getElementById('incomplete-modal').classList.remove('show');
        });

        document.getElementById('font-size-down').addEventListener('click', function() {
            updateQuizFontSize(-0.05);
        });

        document.getElementById('font-size-up').addEventListener('click', function() {
            updateQuizFontSize(0.05);
        });

        window.addEventListener('beforeunload', function() {
            logEvent('page_exit', {});
        });
    }

    document.addEventListener('DOMContentLoaded', function() {
        init();
        attachListeners();
    });
})();
</script>
</body>
</html>
