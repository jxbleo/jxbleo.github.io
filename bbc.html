<script>
(function() {
    'use strict';

    var lessonData = null;
    var studentId = '';
    var setId = '';
    var submitted = false;
    var blankCount = 0;
    var mcCount = 0;
    var matchCount = 0;
    var quizFontScale = 1;
    var assignmentId = '';
    var attemptStartedAt = new Date().toISOString();
    var currentArgueAttemptId = null;
    var prefillAttemptId = '';
    var historyAttemptId = '';
    var historyBestPercentage = null;
    var assignmentStatus = '';
    var answerRevealAvailable = false;
    var teacherMode = false;
    var teacherAnswerKey = null;
    var teacherAnswersVisible = false;
    var isDragging = false;
    var resultAudioCtx = null;
    var lastEncouragementIndex = -1;

    var resultEncouragements = [
        'Small steps, sharp ears, real progress.',
        'You stayed with the details and it shows.',
        'Good listening is built one careful answer at a time.',
        'You caught more than words; you caught meaning.',
        'That focus is becoming a habit.',
        'Keep this rhythm. Your ear is getting stronger.',
        'You are training attention, not just memory.',
        'Every careful retry makes the next one easier.',
        'You listened with purpose today.',
        'This is how fluency starts to feel natural.',
        'A strong result from steady concentration.',
        'You are building the skill behind the score.',
        'Clear effort, clear progress.',
        'Your listening muscles are waking up.',
        'The details are starting to stick.',
        'You handled the challenge with patience.',
        'Nice work. Now review the clues you used.',
        'A better ear comes from moments like this.',
        'You are closer to automatic understanding.',
        'That was focused, useful practice.',
        'Good answers begin with calm attention.',
        'You are learning to hear the structure.',
        'Progress is quiet, then suddenly obvious.',
        'This result is one step in a bigger climb.',
        'You gave your brain a real workout.',
        'Strong listening starts with strong noticing.',
        'The next task will meet a sharper version of you.',
        'You are turning practice into instinct.',
        'Well done. Let the review make the score useful.',
        'Keep going. Your English ear is getting cleaner.'
    ];

    var students = [
        { id: 'EI6688', label: '甘昕雨Eilene' },
        { id: 'EV3389', label: '刘榆雯Eva' },
        { id: 'LEO6666', label: 'jxbleo' }
    ];

    var validIds = ['EI6688', 'EV3389', 'LEO6666'];

    function getStudentLabel(id) {
        for (var i = 0; i < students.length; i++) {
            if (students[i].id === id) return students[i].label;
        }
        return id;
    }

    function escapeHtml(value) {
        return String(value == null ? '' : value)
            .replace(/&/g, '&amp;')
            .replace(/</g, '&lt;')
            .replace(/>/g, '&gt;')
            .replace(/"/g, '&quot;')
            .replace(/'/g, '&#39;');
    }

    function getStoredIdentity() {
        return localStorage.getItem('opencode_user') || (localStorage.getItem('opencode_visitor') === 'true' ? 'VISITOR' : '');
    }

    function updateIdentityStatus() {
        var el = document.getElementById('identity-status');
        if (!el) return;
        var id = studentId || getStoredIdentity();
        el.textContent = id ? (id === 'VISITOR' ? 'Visitor' : getStudentLabel(id)) : 'Login';
    }

    function getParams() {
        var q = window.location.search.substring(1);
        var p = q.split('&');
        var params = {};
        for (var i = 0; i < p.length; i++) {
            var kv = p[i].split('=');
            if (kv[0]) params[decodeURIComponent(kv[0])] = decodeURIComponent(kv.slice(1).join('=') || '');
        }
        return params;
    }

    function logEvent(eventType, eventData) {
        var entry = {
            studentId: studentId,
            taskId: setId,
            eventType: eventType,
            timestamp: new Date().toISOString(),
            eventData: eventData || null
        };
        console.log(JSON.stringify(entry));
    }

    function formatAudioTime(seconds) {
        if (!isFinite(seconds) || seconds < 0) seconds = 0;
        var min = Math.floor(seconds / 60);
        var sec = Math.floor(seconds % 60);
        return min + ':' + String(sec).padStart(2, '0');
    }

    function getAudio() {
        return document.getElementById('bbc-audio');
    }

    function setText(id, value) {
        var el = document.getElementById(id);
        if (el) el.textContent = value;
    }

    function setProgress(id, pct) {
        var el = document.getElementById(id);
        if (el) el.style.width = pct + '%';
    }

    function updateAudioUi() {
        var audio = getAudio();
        if (!audio) return;
        var duration = audio.duration || 0;
        var current = audio.currentTime || 0;
        var pct = duration ? Math.min(100, Math.max(0, current / duration * 100)) : 0;
        var playText = audio.paused ? '▶' : 'Ⅱ';
        setText('sticky-play-btn', playText);
        setText('sticky-current-time', formatAudioTime(current));
        setText('sticky-duration', formatAudioTime(duration));
        if (!isDragging) setProgress('sticky-progress-fill', pct);
    }

    function toggleAudioPlayback() {
        var audio = getAudio();
        if (!audio) return;
        if (audio.paused) {
            var playPromise = audio.play();
            if (playPromise && playPromise.catch) {
                playPromise.catch(function() {
                    updateAudioUi();
                });
            }
        } else {
            audio.pause();
        }
        updateAudioUi();
    }

    function backFiveSeconds() {
        var audio = getAudio();
        if (!audio) return;
        audio.currentTime = Math.max(0, (audio.currentTime || 0) - 5);
        updateAudioUi();
    }

    function setupAudioPlayer() {
        var audio = getAudio();
        if (!audio) return;
        if (audio.dataset.ready !== 'true') {
            audio.dataset.ready = 'true';
            var playButtons = [document.getElementById('sticky-play-btn')];
            var backButtons = [document.getElementById('sticky-back-btn')];
            for (var i = 0; i < playButtons.length; i++) {
                if (playButtons[i]) playButtons[i].addEventListener('click', toggleAudioPlayback);
            }
            for (var j = 0; j < backButtons.length; j++) {
                if (backButtons[j]) backButtons[j].addEventListener('click', backFiveSeconds);
            }
            audio.addEventListener('loadedmetadata', updateAudioUi);
            audio.addEventListener('timeupdate', updateAudioUi);
            audio.addEventListener('play', updateAudioUi);
            audio.addEventListener('pause', updateAudioUi);
            audio.addEventListener('ended', updateAudioUi);

            var progressWrap = document.getElementById('sticky-player').querySelector('.progress-wrap');
            var progressFill = document.getElementById('sticky-progress-fill');

            function seekFromEvent(clientX) {
                var rect = progressWrap.getBoundingClientRect();
                var pct = Math.max(0, Math.min(1, (clientX - rect.left) / rect.width));
                if (progressFill) progressFill.style.width = (pct * 100) + '%';
                if (audio.duration) audio.currentTime = pct * audio.duration;
                if (!audio.paused) {
                    var playPromise = audio.play();
                    if (playPromise && playPromise.catch) playPromise.catch(function() {});
                }
            }

            function onPointerDown(e) {
                isDragging = true;
                seekFromEvent(e.clientX);
                e.preventDefault();
            }

            function onPointerMove(e) {
                if (!isDragging) return;
                seekFromEvent(e.clientX);
                e.preventDefault();
            }

            function onPointerUp() {
                isDragging = false;
            }

            if (progressWrap) {
                progressWrap.addEventListener('mousedown', onPointerDown);
                progressWrap.addEventListener('touchstart', function(e) {
                    onPointerDown(e.touches[0]);
                }, { passive: false });
            }
            document.addEventListener('mousemove', onPointerMove);
            document.addEventListener('mouseup', onPointerUp);
            document.addEventListener('touchmove', function(e) {
                if (isDragging) {
                    onPointerMove(e.touches[0]);
                    e.preventDefault();
                }
            }, { passive: false });
            document.addEventListener('touchend', onPointerUp);
        }
        updateAudioUi();
    }

    function updateQuizFontSize(delta) {
        quizFontScale = Math.min(1.3, Math.max(0.9, quizFontScale + delta));
        var form = document.getElementById('quiz-form');
        if (form) form.style.fontSize = quizFontScale.toFixed(2) + 'em';
    }

    function showIncompleteModal(missingCount) {
        var modal = document.getElementById('incomplete-modal');
        var message = document.getElementById('incomplete-message');
        if (message) {
            message.textContent = 'Please answer all questions before submitting. ' + missingCount + ' question' + (missingCount === 1 ? ' is' : 's are') + ' still waiting for you.';
        }
        if (modal) modal.classList.add('show');
    }

    function renderBlanks(blanks) {
        var container = document.getElementById('blanks-container');
        if (!blanks || !blanks.length) {
            container.innerHTML = '<li>No fill-in-the-blank exercises available.</li>';
            return;
        }
        blankCount = blanks.length;
        var html = '';
        var currentSection = '';
        for (var i = 0; i < blanks.length; i++) {
            var b = blanks[i];
            var num = i + 1;
            if (b.section && b.section !== currentSection) {
                currentSection = b.section;
                html += '<div class="blank-section-title">' + currentSection + '</div>';
            }
            var sentence = b.sentence;
            var inputHtml = ' <input type="text" name="' + b.id + '" class="blank-input" placeholder="' + num + '" autocomplete="off" autocapitalize="off" autocorrect="off" spellcheck="false">';
            sentence = sentence.replace('_____', inputHtml);
            html += '<li><span class="blank-num">' + num + '</span>' + sentence + '</li>';
        }
        container.innerHTML = html;

        var inputs = container.querySelectorAll('.blank-input');
        for (var j = 0; j < inputs.length; j++) {
            inputs[j].addEventListener('input', function() {
                var len = this.value.length || this.placeholder.length;
                this.style.width = Math.max(30, len * 8 + 10) + 'px';
            });
        }
    }

    function renderMC(mcItems) {
        var container = document.getElementById('mc-container');
        if (!mcItems || !mcItems.length) {
            container.innerHTML = '<p>No multiple choice questions available.</p>';
            mcCount = 0;
            return;
        }
        mcCount = mcItems.length;
        var labels = ['A', 'B', 'C', 'D'];
        var html = '';
        for (var i = 0; i < mcItems.length; i++) {
            var m = mcItems[i];
            var qNum = i + 1;
            html += '<div class="mc-question" data-id="' + m.id + '">';
            html += '<div class="mc-title">' + qNum + '. ' + m.question + '</div>';
            html += '<ul class="mc-options">';
            for (var o = 0; o < m.options.length; o++) {
                var opt = m.options[o];
                var letter = labels[o] || '';
                var displayOpt = opt;
                if (displayOpt.indexOf(letter + '. ') !== 0) {
                    displayOpt = letter + '. ' + displayOpt;
                }
                html += '<li>';
                html += '<label>';
                html += '<input type="radio" name="' + m.id + '" value="' + letter + '">';
                html += '<span><span class="option-label">' + letter + '.</span> ' + displayOpt.substring(letter.length + 2) + '</span>';
                html += '</label>';
                html += '</li>';
            }
            html += '</ul></div>';
        }
        container.innerHTML = html;
    }

    function renderMatching(matching) {
        var divider = document.getElementById('matching-divider');
        var heading = document.getElementById('matching-heading');
        var container = document.getElementById('matching-container');

        if (!matching || !matching.length) {
            divider.style.display = 'none';
            heading.style.display = 'none';
            matchCount = 0;
            return;
        }
        divider.style.display = '';
        heading.style.display = '';
        matchCount = matching.length;

        var labels = ['A', 'B', 'C', 'D', 'E', 'F', 'G', 'H', 'I', 'J'];

        var html = '';
        for (var i = 0; i < matching.length; i++) {
            var m = matching[i];
            var pairs = m.pairs;
            html += '<div class="matching-section" data-id="' + m.id + '">';
            html += '<div class="matching-instruction">' + (i + 1) + '. ' + m.instruction + '</div>';
            html += '<table class="matching-table">';
            html += '<thead><tr><th>Item</th><th>Your Match</th></tr></thead>';
            html += '<tbody>';

            var rightItems = [];
            for (var p = 0; p < pairs.length; p++) {
                rightItems.push(pairs[p].right);
            }

            for (var r = 0; r < pairs.length; r++) {
                var pair = pairs[r];
                html += '<tr>';
                html += '<td>' + pair.left + '</td>';
                html += '<td>';
                html += '<select name="' + m.id + '-' + r + '">';
                html += '<option value="">-- Select --</option>';
                for (var o = 0; o < rightItems.length; o++) {
                    html += '<option value="' + labels[o] + '">' + labels[o] + '. ' + rightItems[o] + '</option>';
                }
                html += '</select>';
                html += '</td>';
                html += '</tr>';
            }

            html += '</tbody></table></div>';
        }
        container.innerHTML = html;
    }

    function formatEpisodeDate(setId) {
        var match = String(setId || '').match(/BBC-(\d{2})(\d{2})(\d{2})/);
        if (!match) return '';
        return '20' + match[1] + '-' + match[2] + '-' + match[3];
    }

    function renderLesson(data) {
        lessonData = data;

        var titleEl = document.getElementById('title-area');
        titleEl.innerHTML = '<h1>' + data.title + '</h1>' +
            '<div class="hero-subtitle">BBC Six Minute English, ' + formatEpisodeDate(setId || data.id) + '</div>';
        document.getElementById('hero-meta').innerHTML = '';

        var audioSrc = document.getElementById('audio-source');
        audioSrc.src = data.audioSrc;
        var audio = document.getElementById('bbc-audio');
        audio.load();
        setupAudioPlayer();

        renderBlanks(data.blanks);
        renderMC(data.multipleChoice);
        renderMatching(data.matching);

        document.getElementById('content').style.display = 'block';
        document.getElementById('loading-message').style.display = 'none';
        if (teacherMode) {
            renderTeacherAnswerToolbar();
        } else {
            restoreSavedOrPrefillAnswers();
            renderHistoryToolbar();
        }
    }

    function showError(msg) {
        document.getElementById('loading-message').style.display = 'none';
        var errEl = document.getElementById('error-message');
        document.getElementById('error-text').textContent = msg;
        errEl.style.display = 'block';
    }

    function showLoginPrompt() {
        document.getElementById('loading-message').style.display = 'none';
        var modal = document.getElementById('login-modal');
        var customInput = document.getElementById('bbc-custom-id-input');
        var customBtn = document.getElementById('bbc-custom-login-btn');
        var errorEl = document.getElementById('bbc-login-error');
        var visitorBtn = document.getElementById('bbc-visitor-btn');
        var savedBtn = document.getElementById('bbc-saved-identity-btn');
        if (customInput) customInput.value = '';
        if (errorEl) errorEl.textContent = '';
        var stored = localStorage.getItem('opencode_user') || '';
        if (savedBtn && stored) {
            savedBtn.style.display = 'block';
            savedBtn.textContent = 'Continue as ' + getStudentLabel(stored);
            savedBtn.onclick = function() { selectStudent(stored); };
        } else if (savedBtn) {
            savedBtn.style.display = 'none';
        }

        function handleCustomLogin() {
            var id = customInput.value.trim();
            if (!id) { errorEl.textContent = 'Please enter a student ID.'; return; }
            if (validIds.indexOf(id) !== -1) {
                errorEl.textContent = '';
                selectStudent(id);
            } else {
                errorEl.textContent = 'Unknown ID: "' + id + '"';
                if (confirm('No matching ID for "' + id + '". Continue as visitor?')) {
                    selectVisitor();
                }
            }
        }

        function selectVisitor() {
            studentId = 'VISITOR';
            localStorage.removeItem('opencode_user');
            localStorage.setItem('opencode_visitor', 'true');
            updateIdentityStatus();
            logEvent('login', { studentId: 'VISITOR' });
            modal.classList.remove('show');
            fetchLesson();
        }

        if (customBtn) customBtn.addEventListener('click', handleCustomLogin);
        if (customInput) customInput.addEventListener('keydown', function(e) {
            if (e.key === 'Enter') handleCustomLogin();
        });
        if (visitorBtn) visitorBtn.addEventListener('click', selectVisitor);

        modal.classList.add('show');
    }

    function selectStudent(id) {
        studentId = id;
        localStorage.setItem('opencode_user', id);
        localStorage.removeItem('opencode_visitor');
        updateIdentityStatus();
        var url = new URL(window.location.href);
        url.searchParams.set('user', studentId);
        window.history.replaceState({}, '', url);
        logEvent('login', { studentId: studentId });
        document.getElementById('login-modal').classList.remove('show');
        fetchLesson();
    }

    function init() {
        var params = getParams();
        setId = params.set || '';
        assignmentId = params.assignment || '';
        prefillAttemptId = params.prefill || '';
        historyAttemptId = params.history || prefillAttemptId;
        historyBestPercentage = params.history_score === undefined ? null : Number(params.history_score);
        if (isNaN(historyBestPercentage)) historyBestPercentage = null;
        assignmentStatus = params.status || '';
        teacherMode = params.teacher === '1';
        studentId = params.user || getStoredIdentity();
        if (params.user && params.user !== 'VISITOR') {
            localStorage.setItem('opencode_user', params.user);
            localStorage.removeItem('opencode_visitor');
        } else if (params.user === 'VISITOR') {
            localStorage.removeItem('opencode_user');
            localStorage.setItem('opencode_visitor', 'true');
        }
        updateIdentityStatus();

        logEvent('page_enter', { set: setId, user: studentId });

        if (!setId) {
            showError('No lesson set specified. Please add a <code>?set=BBC-XXXXXX</code> parameter to the URL.');
            return;
        }

        if (teacherMode) {
            studentId = 'TEACHER';
            fetchLesson();
            return;
        }

        if (!studentId || studentId === 'VISITOR') {
            if (studentId === 'VISITOR') {
                fetchLesson();
                return;
            }
            showLoginPrompt();
            return;
        }

        fetchLesson();
    }

    function fetchLesson() {
        var url = 'data/' + setId + '.json?_=' + Date.now();
        fetch(url)
            .then(function(response) {
                if (!response.ok) {
                    throw new Error('Failed to load lesson data (HTTP ' + response.status + '). Please check that the set ID "' + setId + '" is correct.');
                }
                return response.json();
            })
            .then(function(data) {
                renderLesson(data);
            })
            .catch(function(err) {
                showError(err.message || 'An error occurred while loading the lesson.');
            });
    }

    function collectAnswers() {
        var answers = {};
        var form = document.getElementById('quiz-form');
        var els = form.elements;
        for (var i = 0; i < els.length; i++) {
            var el = els[i];
            if (el.type === 'radio') {
                if (el.checked) answers[el.name] = el.value;
            } else if (el.type === 'text') {
                answers[el.name] = el.value.trim();
            } else if (el.tagName === 'SELECT') {
                answers[el.name] = el.value;
            }
        }
        return answers;
    }

    function answerStorageKey() {
        return 'bbc-answers-' + setId + '-' + (assignmentId || studentId || 'visitor');
    }

    function applyAnswers(answers) {
        if (!answers) return;
        Object.keys(answers).forEach(function(name) {
            var value = answers[name];
            var fields = document.querySelectorAll('[name="' + CSS.escape(name) + '"]');
            fields.forEach(function(el) {
                if (el.type === 'radio') {
                    el.checked = el.value === value;
                } else if (el.tagName === 'SELECT') {
                    el.value = value;
                } else if (el.type === 'text') {
                    el.value = value;
                    el.dispatchEvent(new Event('input', { bubbles: true }));
                }
            });
        });
    }

    function saveDraftAnswers() {
        if (!setId || !studentId || studentId === 'VISITOR') return;
        try { localStorage.setItem(answerStorageKey(), JSON.stringify(collectAnswers())); } catch (e) {}
    }

    function clearAllAnswers() {
        answerRevealAvailable = false;
        updateHistoryToolbar();
        var form = document.getElementById('quiz-form');
        form.querySelectorAll('input[type="text"]').forEach(function(input) {
            input.value = '';
            input.dispatchEvent(new Event('input', { bubbles: true }));
        });
        form.querySelectorAll('input[type="radio"]').forEach(function(input) { input.checked = false; });
        form.querySelectorAll('select').forEach(function(select) { select.value = ''; });
        form.querySelectorAll('.correct,.wrong,.disabled').forEach(function(el) {
            el.classList.remove('correct', 'wrong', 'disabled');
        });
        form.querySelectorAll('.inline-explanation,.feedback-bar').forEach(function(el) { el.remove(); });
        saveDraftAnswers();
    }

    function enableRetry() {
        submitted = false;
        document.querySelectorAll('#quiz-form input, #quiz-form select').forEach(function(el) {
            el.disabled = false;
        });
        var btn = document.getElementById('submit-btn');
        btn.disabled = false;
        btn.textContent = 'Submit Answers';
        document.querySelectorAll('.inline-explanation,.feedback-bar').forEach(function(el) { el.remove(); });
        document.querySelectorAll('.correct,.wrong,.disabled').forEach(function(el) {
            el.classList.remove('correct', 'wrong', 'disabled');
        });
    }

    function restoreSavedOrPrefillAnswers() {
        if (getParams().retry === '1') {
            try { localStorage.removeItem(answerStorageKey()); } catch (e) {}
            return;
        }
        var saved = null;
        try { saved = JSON.parse(localStorage.getItem(answerStorageKey()) || 'null'); } catch (e) {}
        if (saved && Object.keys(saved).length) {
            applyAnswers(saved);
            return;
        }
        if (!prefillAttemptId || !window.MrCatCloud) return;
        window.MrCatCloud.callFunction('getDashboard', {
            action: 'getAttemptForRetry',
            attempt_id: prefillAttemptId
        }).then(function(result) {
            if (result && result.success && result.attempt && result.attempt.answers) {
                applyAnswers(result.attempt.answers);
                saveDraftAnswers();
            }
        }).catch(function() {});
    }

    function showHistoryAnswers() {
        if (!historyAttemptId || !window.MrCatCloud) return;
        window.MrCatCloud.callFunction('getDashboard', {
            action: 'getAttemptForRetry',
            attempt_id: historyAttemptId
        }).then(function(result) {
            if (result && result.success && result.attempt && result.attempt.answers) {
                clearAllAnswers();
                applyAnswers(result.attempt.answers);
                saveDraftAnswers();
            }
        }).catch(function() {});
    }

    function updateHistoryFromResponse(response) {
        if (!response || !response.attempt_id) return;
        var value = response.display_percentage == null ? response.percentage : response.display_percentage;
        var percentage = value == null ? null : Number(value);
        if (percentage != null && isNaN(percentage)) percentage = null;
        if (!historyAttemptId || historyBestPercentage == null || percentage == null || percentage >= historyBestPercentage) {
            historyAttemptId = response.attempt_id;
            if (percentage != null) historyBestPercentage = percentage;
        }
    }

    function teacherCall(action, data) {
        return window.MrCatCloud.callFunction('teacherAdmin', Object.assign({ action: action }, data || {}))
            .then(function(result) {
                if (!result || !result.success) throw new Error(result && result.message || 'Teacher action failed.');
                return result;
            });
    }

    function answerText(value) {
        return Array.isArray(value) ? value.join(' / ') : String(value == null ? '' : value);
    }

    function normalizeAnswer(value) {
        return String(value == null ? '' : value).trim().toLowerCase().replace(/\s+/g, ' ');
    }

    function answerMatches(submitted, expected) {
        var accepted = Array.isArray(expected) ? expected : [expected];
        return accepted.some(function(answer) {
            return normalizeAnswer(answer) === normalizeAnswer(submitted);
        });
    }

    function questionTextForId(questionId) {
        var blank = (lessonData.blanks || []).find(function(item) { return item.id === questionId; });
        if (blank) return blank.prompt || blank.sentence || '';
        var mc = (lessonData.multipleChoice || []).find(function(item) { return item.id === questionId; });
        if (mc) return mc.question || '';
        return '';
    }

    function clearTeacherAnswerDisplay() {
        document.querySelectorAll('[data-teacher-answer="1"]').forEach(function(el) {
            el.remove();
        });
        document.querySelectorAll('[data-teacher-mark="1"]').forEach(function(el) {
            el.classList.remove('correct', 'wrong');
            el.removeAttribute('data-teacher-mark');
        });
    }

    function teacherAnswerBlock(questionId, answer, explanation) {
        var div = document.createElement('div');
        div.className = 'inline-explanation correct teacher-answer show';
        div.setAttribute('data-teacher-answer', '1');
        div.setAttribute('data-question-id', questionId);
        div.innerHTML = '&#10004; <strong>Answer:</strong> ' + escapeHtml(answerText(answer)) +
            (explanation ? '<br><strong>Explanation:</strong> ' + escapeHtml(explanation) : '');
        return div;
    }

    function markTeacherAnswer(questionId, answer, submittedAnswer) {
        if (!normalizeAnswer(submittedAnswer)) return;
        var matched = answerMatches(submittedAnswer, answer);
        var input = document.querySelector('[name="' + CSS.escape(questionId) + '"]');
        var mcDiv = document.querySelector('[data-id="' + CSS.escape(questionId) + '"]');
        var markClass = matched ? 'correct' : 'wrong';

        if (mcDiv) {
            mcDiv.classList.add(markClass);
            mcDiv.setAttribute('data-teacher-mark', '1');
            var selected = mcDiv.querySelector('input:checked');
            if (selected && selected.closest('li')) {
                selected.closest('li').classList.add(markClass);
                selected.closest('li').setAttribute('data-teacher-mark', '1');
            }
            return;
        }

        if (input) {
            input.classList.add(markClass);
            input.setAttribute('data-teacher-mark', '1');
        }
    }

    function teacherArgueBar(questionId) {
        var bar = document.createElement('div');
        bar.className = 'feedback-bar teacher-argue-bar';
        bar.setAttribute('data-teacher-answer', '1');
        var argueBtn = document.createElement('button');
        argueBtn.className = 'argue-btn';
        argueBtn.type = 'button';
        argueBtn.textContent = 'Argue';
        argueBtn.addEventListener('click', function() {
            openArgueInline(questionId, bar.parentNode);
        });
        bar.appendChild(argueBtn);
        return bar;
    }

    function renderTeacherAnswers(answerKey) {
        clearTeacherAnswerDisplay();
        var answers = answerKey.answers || {};
        var explanations = answerKey.explanations || {};
        var submittedAnswers = collectAnswers();
        Object.keys(answers).forEach(function(questionId) {
            var block = teacherAnswerBlock(questionId, answers[questionId], explanations[questionId] || '');
            var bar = teacherArgueBar(questionId);
            var input = document.querySelector('[name="' + CSS.escape(questionId) + '"]');
            var mcDiv = document.querySelector('[data-id="' + CSS.escape(questionId) + '"]');
            markTeacherAnswer(questionId, answers[questionId], submittedAnswers[questionId]);

            if (mcDiv) {
                mcDiv.appendChild(block);
                mcDiv.appendChild(bar);
                return;
            }

            if (input && input.tagName === 'SELECT') {
                var tr = input.closest('tr');
                var td = tr && tr.querySelector('td:last-child');
                if (td) {
                    td.appendChild(block);
                    td.appendChild(bar);
                }
                return;
            }

            if (input) {
                var li = input.closest('li');
                if (li && li.parentNode) {
                    li.parentNode.insertBefore(block, li.nextSibling);
                    li.parentNode.insertBefore(bar, block.nextSibling);
                }
            }
        });
        teacherAnswersVisible = true;
    }

    function setTeacherButtonState(button, visible) {
        button.disabled = false;
        button.textContent = visible ? 'Hide Answers' : 'Show Answers';
    }

    function toggleTeacherAnswers(button) {
        if (teacherAnswersVisible) {
            clearTeacherAnswerDisplay();
            teacherAnswersVisible = false;
            setTeacherButtonState(button, false);
            return;
        }

        if (teacherAnswerKey) {
            renderTeacherAnswers(teacherAnswerKey);
            setTeacherButtonState(button, true);
            return;
        }

        button.disabled = true;
        button.textContent = 'Loading...';
        teacherCall('getAnswerKeyForSet', { set_id: setId }).then(function(result) {
            teacherAnswerKey = result;
            renderTeacherAnswers(teacherAnswerKey);
            setTeacherButtonState(button, true);
        }).catch(function(error) {
            setTeacherButtonState(button, false);
            alert(error.message || 'Unable to load answers.');
        });
    }

    function renderTeacherAnswerToolbar() {
        if (document.getElementById('history-toolbar')) return;
        var toolbar = document.createElement('div');
        toolbar.className = 'history-toolbar';
        toolbar.id = 'history-toolbar';
        toolbar.innerHTML = '<button type="button" id="teacher-show-answers-btn">Show Answers</button>';
        document.body.appendChild(toolbar);
        document.getElementById('teacher-show-answers-btn').addEventListener('click', function() {
            toggleTeacherAnswers(this);
        });
    }

    function renderHistoryToolbar() {
        if (document.getElementById('history-toolbar')) return;
        var toolbar = document.createElement('div');
        toolbar.className = 'history-toolbar';
        toolbar.id = 'history-toolbar';
        toolbar.innerHTML =
            '<button type="button" id="show-history-btn">Show History</button>' +
            '<button type="button" id="clear-all-btn">Clear All</button>';
        document.body.appendChild(toolbar);
        document.getElementById('show-history-btn').addEventListener('click', function() {
            if (answerRevealAvailable) {
                revealAllAnswers();
                return;
            }
            if (!historyAttemptId) {
                alert('No history is available for this task yet.');
                return;
            }
            if (!confirm('Replace all current answers with your best historical attempt?')) return;
            showHistoryAnswers();
        });
        document.getElementById('clear-all-btn').addEventListener('click', function() {
            if (!confirm('Clear all answers on this page?')) return;
            clearAllAnswers();
        });
        updateHistoryToolbar();
    }

    function updateHistoryToolbar() {
        var btn = document.getElementById('show-history-btn');
        if (!btn) return;
        btn.textContent = answerRevealAvailable ? 'Show Answers' : 'Show History';
    }

    function revealAllAnswers() {
        if (!confirmAnswerReveal()) return;
        document.querySelectorAll('.inline-explanation').forEach(function(el) { el.classList.add('show'); });
        document.querySelectorAll('.answer-toggle-btn').forEach(function(btn) {
            if (btn.textContent === 'Show Answer') btn.textContent = 'Hide Answer';
        });
    }

    function pickResultEncouragement() {
        var next = Math.floor(Math.random() * resultEncouragements.length);
        if (resultEncouragements.length > 1 && next === lastEncouragementIndex) {
            next = (next + 1) % resultEncouragements.length;
        }
        lastEncouragementIndex = next;
        return resultEncouragements[next];
    }

    function getResultAudioContext() {
        var AudioContextClass = window.AudioContext || window.webkitAudioContext;
        if (!AudioContextClass) return null;
        if (!resultAudioCtx) resultAudioCtx = new AudioContextClass();
        return resultAudioCtx;
    }

    function unlockResultAudio() {
        try {
            var ctx = getResultAudioContext();
            if (ctx && ctx.state === 'suspended') ctx.resume();
        } catch (e) {}
    }

    function playResultTone(freq, start, duration, options) {
        var ctx = getResultAudioContext();
        if (!ctx) return;
        options = options || {};
        var osc = ctx.createOscillator();
        var gain = ctx.createGain();
        var filter = ctx.createBiquadFilter();
        var now = ctx.currentTime;
        osc.type = options.type || 'sine';
        osc.frequency.setValueAtTime(freq, now + start);
        if (options.to) osc.frequency.exponentialRampToValueAtTime(options.to, now + start + duration);
        filter.type = options.filter || 'lowpass';
        filter.frequency.setValueAtTime(options.filterFreq || 9000, now + start);
        gain.gain.setValueAtTime(0.0001, now + start);
        gain.gain.exponentialRampToValueAtTime(options.volume || 0.14, now + start + 0.018);
        gain.gain.exponentialRampToValueAtTime(0.0001, now + start + duration);
        osc.connect(filter);
        filter.connect(gain);
        gain.connect(ctx.destination);
        osc.start(now + start);
        osc.stop(now + start + duration + 0.02);
    }

    function playResultNoise(start, duration, options) {
        var ctx = getResultAudioContext();
        if (!ctx) return;
        options = options || {};
        var buffer = ctx.createBuffer(1, Math.max(1, Math.floor(ctx.sampleRate * duration)), ctx.sampleRate);
        var data = buffer.getChannelData(0);
        var decay = options.decay || 2;
        var last = 0;
        for (var i = 0; i < data.length; i++) {
            var t = i / Math.max(1, data.length);
            var raw = Math.random() * 2 - 1;
            last = last * 0.82 + raw * 0.18;
            data[i] = last * Math.pow(1 - t, decay);
        }
        var source = ctx.createBufferSource();
        var gain = ctx.createGain();
        var filter = ctx.createBiquadFilter();
        var now = ctx.currentTime;
        source.buffer = buffer;
        filter.type = options.filter || 'lowpass';
        filter.frequency.setValueAtTime(options.filterFreq || 1200, now + start);
        gain.gain.setValueAtTime(options.volume || 0.08, now + start);
        gain.gain.exponentialRampToValueAtTime(0.0001, now + start + duration);
        source.connect(filter);
        filter.connect(gain);
        gain.connect(ctx.destination);
        source.start(now + start);
    }

    function playResultSound(state) {
        try {
            unlockResultAudio();
            if (state === 'passed') {
                playResultTone(392, 0, .13, { volume: .11 });
                playResultTone(523.25, .11, .14, { volume: .13 });
                playResultTone(783.99, .24, .28, { volume: .16 });
            } else if (state === 'mastered') {
                playResultTone(523.25, 0, .13, { volume: .12, type: 'triangle' });
                playResultTone(659.25, .12, .13, { volume: .12, type: 'triangle' });
                playResultTone(783.99, .24, .15, { volume: .135, type: 'triangle' });
                playResultTone(1046.5, .39, .34, { volume: .16, type: 'triangle' });
                playResultTone(1318.51, .54, .22, { volume: .065 });
            } else {
                playResultTone(392, 0, .16, { volume: .08, to: 329.63, type: 'triangle' });
                playResultTone(440, .2, .18, { volume: .075, type: 'triangle' });
            }
        } catch (e) {}
    }

    function animateResultScore(card, target, state) {
        var scoreNumber = card.querySelector('.result-score-number');
        var scoreBox = card.querySelector('.result-score');
        var stamp = card.querySelector('.result-stamp');
        if (!scoreNumber || !stamp) return;
        if (state === 'failed') {
            scoreNumber.textContent = target;
            playResultSound(state);
            return;
        }
        var current = Math.min(1, target);
        scoreNumber.textContent = current;
        if (target <= 1) {
            window.setTimeout(function() {
                stamp.classList.add('show');
                card.classList.add('celebrate');
                playResultSound(state);
            }, 260);
            return;
        }
        var timer = window.setInterval(function() {
            current += 1;
            scoreNumber.textContent = current;
            if (scoreBox) {
                scoreBox.classList.remove('pulse');
                void scoreBox.offsetWidth;
                scoreBox.classList.add('pulse');
            }
            if (current >= target) {
                window.clearInterval(timer);
                window.setTimeout(function() {
                    stamp.classList.add('show');
                    card.classList.add('celebrate');
                    playResultSound(state);
                }, 260);
            }
        }, 90);
    }

    function showResultOverlay(response) {
        var state = response.mastered ? 'mastered' : response.passed ? 'passed' : 'failed';
        var stampText = response.mastered ? 'MASTERED' : response.passed ? 'PASSED' : 'TRY AGAIN';
        var score = Number(response.correct_count || 0);
        var total = Number(response.question_count || 0);
        var copy = state === 'failed'
            ? 'Review the misses, then try once more.'
            : pickResultEncouragement();
        var ribbon = state === 'mastered'
            ? '<span class="mini">★</span> Mastery Challenge Complete'
            : state === 'passed'
                ? '<span class="mini">✓</span> Listening Challenge Complete'
                : '<span class="mini">↻</span> Review, then try again';
        var celebration = state === 'failed' ? '' :
            '<div class="result-confetti"><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span></div>';
        var spark = state === 'mastered' ? '<div class="result-spark"><span></span><span></span><span></span><span></span></div>' : '';
        var glow = state === 'mastered' ? '<div class="result-gold-glow"></div>' : '';
        var overlay = document.createElement('div');
        overlay.className = 'result-overlay';
        overlay.innerHTML =
            '<div class="result-card ' + state + '">' +
                glow +
                celebration +
                spark +
                '<div class="result-stamp ' + state + (state === 'failed' ? ' show' : '') + '">' + stampText + '</div>' +
                '<div class="result-score"><span class="result-score-number">' + (state === 'failed' ? score : Math.min(1, score)) + '</span><small>/' + total + '</small></div>' +
                '<p class="result-copy">' + escapeHtml(copy) + '</p>' +
                '<div class="result-actions">' +
                    '<button class="result-review-btn" type="button" data-result-action="close">Review Answers</button>' +
                '</div>' +
                '<div class="result-ribbon">' + ribbon + '</div>' +
            '</div>';
        document.body.appendChild(overlay);
        animateResultScore(overlay.querySelector('.result-card'), score, state);
        overlay.addEventListener('click', function(event) {
            var action = event.target && event.target.getAttribute('data-result-action');
            if (action === 'close' || event.target === overlay) overlay.remove();
        });
    }

    function recordAnswerReveal() {
        if (!assignmentId || !window.MrCatCloud) return;
        window.MrCatCloud.callFunction('getDashboard', {
            action: 'revealAnswers',
            assignment_id: assignmentId
        }).catch(function() {});
    }

    function checkAllAnswered(userAnswers) {
        var form = document.getElementById('quiz-form');
        var missing = [];
        var required = form.querySelectorAll('input[type="text"], input[type="radio"], select');
        var radioGroups = {};

        for (var i = 0; i < required.length; i++) {
            var el = required[i];
            if (el.type === 'radio') {
                if (!radioGroups[el.name]) radioGroups[el.name] = false;
                if (el.checked) radioGroups[el.name] = true;
            } else if (el.type === 'text') {
                if (!el.value || el.value.trim() === '') {
                    missing.push(el.name);
                }
            } else if (el.tagName === 'SELECT') {
                if (!el.value) {
                    missing.push(el.name);
                }
            }
        }

        for (var name in radioGroups) {
            if (!radioGroups[name]) missing.push(name);
        }

        return missing;
    }

    function showScore(score) {
        var el = document.getElementById('score-display');
        el.textContent = score.correct + ' / ' + score.total + ' correct';
        el.className = 'show';
        if (score.total === 0) {
            el.className += ' zero';
        } else if (score.correct === score.total) {
            el.className += ' perfect';
        } else if (score.correct === 0) {
            el.className += ' zero';
        } else {
            el.className += ' partial';
        }
    }

    var answerRevealConfirmed = false;
    function confirmAnswerReveal() {
        if (teacherMode) return true;
        if (answerRevealConfirmed) return true;
        if (assignmentStatus === 'mastered') {
            answerRevealConfirmed = true;
            recordAnswerReveal();
            return true;
        }
        answerRevealConfirmed = confirm('一旦查看答案，你将无法将本题进度提升至 master 等级，也无法获得对应星星，是否确认继续查看？');
        if (answerRevealConfirmed) recordAnswerReveal();
        return answerRevealConfirmed;
    }

    function applyFeedback(results) {
        for (var i = 0; i < results.length; i++) {
            var r = results[i];
            if (r.type === 'blank') {
                var input = document.querySelector('[name="' + r.id + '"]');
                if (!input) continue;
                input.classList.add(r.isCorrect ? 'correct' : 'wrong');
                var li = input.closest('li');
                if (li) {
                    var exp = document.createElement('div');
                    exp.className = 'inline-explanation' + (r.isCorrect ? ' correct' : ' wrong');
                    var prefix = r.isCorrect ? '&#10004;' : '&#10060;';
                    exp.innerHTML = prefix + ' <strong>Correct answer:</strong> ' + r.correctAnswer + (r.evidence ? '<br><strong>Evidence:</strong> ' + r.evidence : '');
                    li.parentNode.insertBefore(exp, li.nextSibling);
                    var bar = document.createElement('div');
                    bar.className = 'feedback-bar';
                    var toggleBtn = document.createElement('button');
                    toggleBtn.className = 'answer-toggle-btn';
                    toggleBtn.textContent = 'Show Answer';
                    toggleBtn.addEventListener('click', function(expEl) {
                        return function() {
                            if (!expEl.classList.contains('show') && !confirmAnswerReveal()) return;
                            expEl.classList.toggle('show');
                            this.textContent = expEl.classList.contains('show') ? 'Hide Answer' : 'Show Answer';
                        };
                    }(exp));
                    bar.appendChild(toggleBtn);
                    var argueBtn = document.createElement('button');
                    argueBtn.className = 'argue-btn';
                    argueBtn.textContent = 'Argue';
                    argueBtn.addEventListener('click', function(qId, barEl) {
                        return function() { openArgueInline(qId, barEl.parentNode); };
                    }(r.id, bar));
                    bar.appendChild(argueBtn);
                    li.parentNode.insertBefore(bar, exp.nextSibling);
                }
            } else if (r.type === 'mc') {
                var mcDiv = document.querySelector('[data-id="' + r.id + '"]');
                if (!mcDiv) continue;
                mcDiv.classList.add(r.isCorrect ? 'correct' : 'wrong');
                var correctRadio = mcDiv.querySelector('input[value="' + r.correctAnswer + '"]');
                if (correctRadio) {
                    correctRadio.closest('li').classList.add('correct');
                }
                if (!r.isCorrect && r.userAnswer) {
                    var wrongRadio = mcDiv.querySelector('input[value="' + r.userAnswer + '"]');
                    if (wrongRadio) {
                        wrongRadio.closest('li').classList.add('wrong');
                    }
                }
                var exp = document.createElement('div');
                exp.className = 'inline-explanation' + (r.isCorrect ? ' correct' : ' wrong');
                var prefix = r.isCorrect ? '&#10004;' : '&#10060;';
                exp.innerHTML = prefix + ' <strong>Correct answer:</strong> ' + r.correctAnswer + (r.evidence ? '<br><strong>Evidence:</strong> ' + r.evidence : '');
                mcDiv.appendChild(exp);
                var bar = document.createElement('div');
                bar.className = 'feedback-bar';
                var toggleBtn = document.createElement('button');
                toggleBtn.className = 'answer-toggle-btn';
                toggleBtn.textContent = 'Show Answer';
                toggleBtn.addEventListener('click', function(expEl) {
                    return function() {
                        if (!expEl.classList.contains('show') && !confirmAnswerReveal()) return;
                        expEl.classList.toggle('show');
                        this.textContent = expEl.classList.contains('show') ? 'Hide Answer' : 'Show Answer';
                    };
                }(exp));
                bar.appendChild(toggleBtn);
                var argueBtn = document.createElement('button');
                argueBtn.className = 'argue-btn';
                argueBtn.textContent = 'Argue';
                argueBtn.addEventListener('click', function(qId, barEl) {
                    return function() { openArgueInline(qId, barEl.parentNode); };
                }(r.id, bar));
                bar.appendChild(argueBtn);
                mcDiv.appendChild(bar);
            } else if (r.type === 'match') {
                var select = document.querySelector('[name="' + r.id + '"]');
                if (!select) continue;
                select.classList.add(r.isCorrect ? 'correct' : 'wrong');
                var tr = select.closest('tr');
                if (tr) {
                    var exp = document.createElement('div');
                    exp.className = 'inline-explanation wrong';
                    exp.innerHTML = '&#10060; <strong>Correct match:</strong> ' + r.correctAnswer;
                    var td = tr.querySelector('td:last-child');
                    td.appendChild(exp);
                    var bar = document.createElement('div');
                    bar.className = 'feedback-bar';
                    var toggleBtn = document.createElement('button');
                    toggleBtn.className = 'answer-toggle-btn';
                    toggleBtn.textContent = 'Show Answer';
                    toggleBtn.addEventListener('click', function(expEl) {
                        return function() {
                            if (!expEl.classList.contains('show') && !confirmAnswerReveal()) return;
                            expEl.classList.toggle('show');
                            this.textContent = expEl.classList.contains('show') ? 'Hide Answer' : 'Show Answer';
                        };
                    }(exp));
                    bar.appendChild(toggleBtn);
                    var argueBtn = document.createElement('button');
                    argueBtn.className = 'argue-btn';
                    argueBtn.textContent = 'Argue';
                    argueBtn.addEventListener('click', function(qId, barEl) {
                        return function() { openArgueInline(qId, barEl.parentNode); };
                    }(r.id, bar));
                    bar.appendChild(argueBtn);
                    td.appendChild(bar);
                }
            }
        }
    }

    function openArgueInline(questionId, containerEl) {
        var modal = document.createElement('div');
        modal.className = 'argue-modal';
        modal.setAttribute('role', 'dialog');
        modal.setAttribute('aria-modal', 'true');
        modal.innerHTML =
            '<div class="argue-modal-card">' +
                '<h2>Argue this question</h2>' +
                '<p class="argue-modal-copy">Tell the teacher why this answer should be reviewed. This note is optional.</p>' +
                '<p class="argue-modal-status" hidden></p>' +
                '<textarea placeholder="Why should this answer be reviewed? (optional)"></textarea>' +
                '<div class="argue-modal-actions">' +
                    '<button class="argue-modal-cancel" type="button">Cancel</button>' +
                    '<button class="argue-modal-submit" type="button">Submit</button>' +
                '</div>' +
            '</div>';
        document.body.appendChild(modal);

        modal.querySelector('.argue-modal-submit').addEventListener('click', function() {
            submitArgueInline(questionId, modal, containerEl);
        });
        modal.querySelector('.argue-modal-cancel').addEventListener('click', function() {
            modal.remove();
        });
        modal.addEventListener('click', function(event) {
            if (event.target === modal) modal.remove();
        });
        loadArgueStatus(questionId, modal, containerEl);
    }

    function renderArgueStatus(modal, dispute) {
        if (!dispute) return;
        var status = modal.querySelector('.argue-modal-status');
        var statusText = dispute.status === 'approved'
            ? 'Approved'
            : dispute.status === 'rejected'
                ? 'Original ruling kept'
                : 'Waiting for teacher review';
        status.hidden = false;
        status.className = 'argue-modal-status ' + (dispute.status || 'pending');
        status.innerHTML = '<strong>' + statusText + '</strong>' +
            (dispute.teacher_note ? '<br>Teacher note: ' + escapeHtml(dispute.teacher_note) : '');
        modal.querySelector('textarea').disabled = true;
        modal.querySelector('textarea').value = dispute.student_reason || '';
        modal.querySelector('.argue-modal-submit').hidden = true;
        modal.querySelector('.argue-modal-cancel').textContent = 'Close';
    }

    function markArgueBar(containerEl, status) {
        var bar = containerEl.querySelector('.feedback-bar');
        if (!bar) return;
        bar.classList.remove('dispute-pending', 'dispute-approved', 'dispute-rejected');
        bar.classList.add('dispute-' + (status || 'pending'));
    }

    function loadArgueStatus(questionId, modal, containerEl) {
        if (teacherMode || !currentArgueAttemptId || !window.MrCatCloud) return;
        window.MrCatCloud.callFunction('getDashboard', {
            action: 'listDisputesForAttempt',
            attempt_id: currentArgueAttemptId
        }).then(function(result) {
            var dispute = (result.disputes || []).find(function(item) {
                return String(item.question_id) === String(questionId);
            });
            if (!dispute) return;
            markArgueBar(containerEl, dispute.status);
            renderArgueStatus(modal, dispute);
        }).catch(function() {});
    }

    function submitArgueInline(questionId, modal, containerEl) {
        var reason = modal.querySelector('textarea').value.trim();
        var submitBtn = modal.querySelector('.argue-modal-submit');
        var status = modal.querySelector('.argue-modal-status');
        submitBtn.disabled = true;
        submitBtn.textContent = 'Sending...';
        var call = teacherMode
            ? window.MrCatCloud.callFunction('teacherAdmin', {
                action: 'submitTeacherDispute',
                set_id: setId,
                question_id: questionId,
                submitted_answer: collectAnswers()[questionId] || '',
                question_text: questionTextForId(questionId),
                reason: reason
            })
            : window.MrCatCloud.callFunction('getDashboard', {
                action: 'submitDispute',
                attempt_id: currentArgueAttemptId || '',
                question_id: questionId,
                question_text: questionTextForId(questionId),
                reason: reason
            });
        call.then(function(result) {
            if (!result || !result.success) {
                throw new Error(result && result.message || result && result.code || 'Unable to submit Argue.');
            }
            markArgueBar(containerEl, 'pending');
            status.hidden = false;
            status.className = 'argue-modal-status pending';
            status.textContent = teacherMode ? 'Sent to the Revise list.' : 'Sent to teacher. Thank you!';
            modal.querySelector('textarea').disabled = true;
            submitBtn.hidden = true;
            modal.querySelector('.argue-modal-cancel').textContent = 'Close';
        }).catch(function(error) {
            submitBtn.disabled = false;
            submitBtn.textContent = 'Submit';
            var msg = error.message === 'DISPUTE_ALREADY_EXISTS' ? 'Already sent' : (error.message || 'Try again');
            status.hidden = false;
            status.className = 'argue-modal-status rejected';
            status.textContent = msg;
        });
    }

    function disableAllInputs() {
        var form = document.getElementById('quiz-form');
        var els = form.elements;
        for (var i = 0; i < els.length; i++) {
            els[i].disabled = true;
        }
        var lis = form.querySelectorAll('.mc-options li');
        for (var j = 0; j < lis.length; j++) {
            lis[j].classList.add('disabled');
        }
    }

    function handleSubmit(e) {
        e.preventDefault();

        if (submitted) return;

        logEvent('click', { element: 'submit-btn', action: 'submit' });

        var userAnswers = collectAnswers();
        var missing = checkAllAnswered(userAnswers);

        if (missing.length > 0) {
            showIncompleteModal(missing.length);
            return;
        }

        var confirmModal = document.getElementById('confirm-modal');
        confirmModal.classList.add('show');
    }

    function doSubmit() {
        document.getElementById('confirm-modal').classList.remove('show');
        unlockResultAudio();

        var userAnswers = collectAnswers();
        var btn = document.getElementById('submit-btn');
        btn.disabled = true;
        btn.textContent = 'Submitting...';

        window.MrCatCloud.callFunction('submitAttempt', {
            set_id: setId,
            assignment_id: assignmentId || null,
            mode: 'bbc',
            answers: userAnswers,
            started_at: attemptStartedAt,
            duration_seconds: Math.max(0, Math.round((Date.now() - new Date(attemptStartedAt).getTime()) / 1000))
        }).then(function(response) {
            if (!response || !response.success) {
                throw new Error(response && response.message || 'Unable to save this attempt.');
            }

            submitted = true;
            btn.textContent = 'Submitted';
            currentArgueAttemptId = response.attempt_id;
            updateHistoryFromResponse(response);
            assignmentStatus = response.mastered ? 'mastered' : response.passed ? 'passed' : assignmentStatus;
            answerRevealAvailable = response.passed && !response.feedback_locked;
            updateHistoryToolbar();

            var feedback = (response.question_results || []).map(function(item) {
                var source = null;
                var type = 'blank';
                if (lessonData.blanks) {
                    source = lessonData.blanks.find(function(entry) { return entry.id === item.question_id; });
                }
                if (!source && lessonData.multipleChoice) {
                    source = lessonData.multipleChoice.find(function(entry) { return entry.id === item.question_id; });
                    if (source) type = 'mc';
                }
                if (!source && item.question_id.indexOf('-') !== -1) type = 'match';
                return {
                    type: type,
                    id: item.question_id,
                    userAnswer: item.submitted_answer || userAnswers[item.question_id] || '',
                    correctAnswer: item.correct_answer,
                    isCorrect: item.correct === true,
                    evidence: item.explanation || '',
                    question: source && source.question || ''
                };
            });

            disableAllInputs();
            if (!response.feedback_locked) applyFeedback(feedback);
            showResultOverlay(response);
            logEvent('submit', {
                attemptId: response.attempt_id,
                percentage: response.percentage,
                passed: response.passed
            });
        }).catch(function(error) {
            btn.disabled = false;
            btn.textContent = 'Submit Answers';
            alert(error && error.message ? error.message : 'Unable to submit. Please try again.');
        });
    }

    function attachListeners() {
        var form = document.getElementById('quiz-form');

        form.addEventListener('submit', handleSubmit);

        form.addEventListener('change', function(e) {
            var target = e.target;
            if (target.type === 'radio' || target.tagName === 'SELECT') {
                logEvent('answer_change', { name: target.name, value: target.value, type: target.type || 'select' });
                saveDraftAnswers();
            }
        });

        form.addEventListener('input', function(e) {
            if (e.target.type === 'text') {
                logEvent('answer_change', { name: e.target.name, value: e.target.value, type: 'text' });
                saveDraftAnswers();
            }
        });

        document.getElementById('modal-confirm').addEventListener('click', doSubmit);
        document.getElementById('modal-cancel').addEventListener('click', function() {
            document.getElementById('confirm-modal').classList.remove('show');
        });

        document.getElementById('incomplete-close').addEventListener('click', function() {
            document.getElementById('incomplete-modal').classList.remove('show');
        });

        document.getElementById('font-size-down').addEventListener('click', function() {
            updateQuizFontSize(-0.05);
        });

        document.getElementById('font-size-up').addEventListener('click', function() {
            updateQuizFontSize(0.05);
        });

        window.addEventListener('beforeunload', function() {
            logEvent('page_exit', {});
        });
    }

    document.addEventListener('DOMContentLoaded', function() {
        init();
        attachListeners();
    });
})();
</script>
