<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BBC 6 Minute English - Listening Practice</title>
    <style>
        :root {
            --primary: #16312f;
            --accent: #0f766e;
            --accent-bright: #14b8a6;
            --bg: #f4fbf7;
            --card-bg: rgba(255,255,255,0.78);
            --text-main: #1f2937;
            --text-light: #64748b;
            --border-color: rgba(15, 118, 110, 0.16);
            --correct-bg: #e8f8f5;
            --wrong-bg: #fdf2e9;
            --warm: #f97316;
            --warm-soft: #fff2df;
            --ink: #18352f;
            --muted: #6d807a;
            --line: rgba(15, 118, 110, 0.16);
            --border: rgba(15, 118, 110, 0.16);
            --bg-page: #f4fbf7;
            --text-primary: #1f2937;
            --text-secondary: #64748b;
            --text-muted: #64748b;
            --accent-dark: #0b5f59;
        }

        * { box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background:
                radial-gradient(circle at top left, rgba(254, 243, 199, 0.9) 0, transparent 28%),
                radial-gradient(circle at 90% 4%, rgba(209, 250, 229, 0.9) 0, transparent 24%),
                linear-gradient(180deg, #f8fafc 0%, #eef8f4 100%);
            color: var(--text-main);
            line-height: 1.6;
            margin: 0;
            padding: 28px 16px 64px;
        }

        .container {
            max-width: 980px;
            margin: 0 auto;
            background: transparent;
            padding: 0;
        }

        .lesson-hero {
            position: relative;
            overflow: hidden;
            color: #fff;
            background: linear-gradient(135deg, #123f3c 0%, #0f766e 54%, #14b8a6 100%);
            border: 1px solid rgba(255,255,255,0.22);
            border-radius: 30px;
            padding: 34px 30px 28px;
            margin-bottom: 16px;
            box-shadow: 0 24px 60px rgba(15, 118, 110, 0.22);
        }

        .lesson-hero::before,
        .lesson-hero::after {
            content: '';
            position: absolute;
            border-radius: 999px;
            pointer-events: none;
        }

        .lesson-hero::before {
            width: 260px;
            height: 260px;
            right: -64px;
            top: -78px;
            background: radial-gradient(circle, rgba(255, 237, 213, 0.6), transparent 66%);
        }

        .lesson-hero::after {
            width: 190px;
            height: 190px;
            right: 180px;
            bottom: -90px;
            background: radial-gradient(circle, rgba(204, 251, 241, 0.42), transparent 68%);
        }

        .hero-kicker {
            display: inline-flex;
            position: relative;
            z-index: 1;
            padding: 7px 12px;
            border-radius: 999px;
            background: rgba(255,255,255,0.16);
            border: 1px solid rgba(255,255,255,0.24);
            font-size: 0.82rem;
            font-weight: 800;
            letter-spacing: 0.04em;
            text-transform: uppercase;
        }

        h1 {
            color: inherit;
            text-align: center;
            border-bottom: none;
            padding-bottom: 0;
            margin: 10px 0 6px;
            font-size: clamp(2rem, 5vw, 3.5rem);
            line-height: 1.02;
            letter-spacing: -0.055em;
            position: relative;
            z-index: 1;
        }

        .hero-subtitle {
            position: relative;
            z-index: 1;
            text-align: center;
            color: rgba(255,255,255,0.72);
            font-size: 0.88rem;
            font-weight: 600;
            letter-spacing: 0.02em;
        }

        .hero-meta {
            position: relative;
            z-index: 1;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            color: rgba(255,255,255,0.82);
            font-weight: 700;
            font-size: 0.94rem;
        }

        #bbc-audio {
            display: none;
        }

        .sticky-player {
            display: grid;
            grid-template-columns: auto minmax(0, 1fr) auto;
            align-items: center;
            gap: 14px;
        }

        .player-btn {
            border: none;
            border-radius: 999px;
            cursor: pointer;
            font-weight: 900;
            transition: transform 0.15s ease, background 0.2s ease, opacity 0.2s ease;
        }

        .play-btn {
            width: 46px;
            height: 46px;
            background: #fff;
            color: var(--accent);
            font-size: 1rem;
            box-shadow: 0 12px 28px rgba(15, 23, 42, 0.18);
        }

        .player-btn:hover:not(:disabled) {
            transform: translateY(-1px);
        }

        .back-btn {
            padding: 10px 13px;
            background: rgba(255,255,255,0.16);
            color: #fff;
            border: 1px solid rgba(255,255,255,0.26);
        }

        .back-btn:disabled {
            opacity: 0.42;
            cursor: not-allowed;
        }

        .progress-wrap {
            min-width: 0;
        }

        .progress-wrap {
            cursor: pointer;
            position: relative;
            -webkit-tap-highlight-color: transparent;
        }

        .progress-track {
            width: 100%;
            height: 10px;
            border-radius: 999px;
            overflow: hidden;
            background: rgba(255,255,255,0.22);
            pointer-events: none;
        }

        .progress-fill {
            width: 0%;
            height: 100%;
            border-radius: inherit;
            background: linear-gradient(90deg, #fde68a, #fff);
            pointer-events: none;
        }

        .time-row {
            display: grid;
            grid-template-columns: 1fr auto 1fr;
            align-items: center;
            gap: 12px;
            margin-top: 8px;
            color: rgba(255,255,255,0.82);
            font-size: 0.82rem;
            font-weight: 800;
        }

        .time-row span:last-child {
            text-align: right;
        }

        .sticky-player {
            position: sticky;
            top: 0;
            z-index: 800;
            margin: 0 0 24px;
            padding: 12px 14px;
            border-radius: 18px;
            background: rgba(18, 63, 60, 0.94);
            border: 1px solid rgba(255,255,255,0.18);
            box-shadow: 0 14px 36px rgba(15, 23, 42, 0.18);
            backdrop-filter: blur(16px);
        }

        .sticky-identity {
            color: rgba(255,255,255,0.78);
            text-align: center;
            white-space: nowrap;
        }

        .sticky-player .play-btn {
            width: 38px;
            height: 38px;
        }

        .sticky-player .back-btn {
            width: 38px;
            height: 38px;
            background: #fff;
            color: var(--accent);
            font-size: 0.82rem;
            padding: 0;
            border: none;
            box-shadow: 0 12px 28px rgba(15, 23, 42, 0.18);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            line-height: 1;
        }

        h2 {
            color: var(--primary);
            font-size: 1.4em;
            margin-top: 40px;
            border-left: 4px solid var(--accent);
            padding-left: 15px;
        }

        h3 {
            color: var(--accent);
            font-size: 1.1em;
            margin-top: 25px;
            margin-bottom: 10px;
        }

        .content-card {
            background: rgba(255,255,255,0.74);
            border: 1px solid rgba(255,255,255,0.82);
            border-radius: 26px;
            padding: 26px;
            margin-top: 18px;
            box-shadow: 0 16px 38px rgba(15, 23, 42, 0.07);
            backdrop-filter: blur(18px);
        }

        .quiz-toolbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 8px;
            margin-bottom: 18px;
        }

        .quiz-toolbar h2 {
            margin: 0;
        }

        .font-size-controls {
            display: flex;
            align-items: center;
            gap: 8px;
            flex: 0 0 auto;
        }

        .font-size-btn {
            width: 34px;
            height: 34px;
            border: 1px solid rgba(15, 118, 110, 0.16);
            border-radius: 999px;
            background: rgba(255,255,255,0.82);
            color: var(--accent);
            font-size: 1.1rem;
            font-weight: 900;
            cursor: pointer;
            box-shadow: 0 8px 18px rgba(15, 23, 42, 0.05);
        }

        .font-size-btn:hover {
            background: rgba(15, 118, 110, 0.09);
        }

        ul.fill-blanks {
            list-style-type: none;
            padding-left: 0;
            margin: 0;
            color: var(--text-main);
            font-size: 1.02em;
        }

        ul.fill-blanks li {
            margin-bottom: 12px;
            line-height: 1.85;
            padding: 14px 16px;
            background: rgba(255,255,255,0.76);
            border: 1px solid rgba(15, 118, 110, 0.12);
            border-radius: 16px;
            box-shadow: 0 8px 18px rgba(15, 23, 42, 0.04);
        }
        .blank-num {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-width: 28px;
            height: 28px;
            margin-right: 8px;
            border-radius: 999px;
            font-weight: 900;
            color: #fff;
            background: var(--accent);
        }
        .blank-section-title {
            font-weight: 900;
            font-size: 1.03em;
            color: var(--accent);
            margin: 26px 0 12px;
            padding: 12px 14px;
            background: rgba(15, 118, 110, 0.08);
            border: 1px solid rgba(15, 118, 110, 0.14);
            border-left: 5px solid var(--accent);
            border-radius: 16px;
        }
        .blank-section-title:first-of-type {
            margin-top: 0;
        }

        .blank-input {
            border: none;
            border-bottom: 2px solid var(--accent);
            background: transparent;
            text-align: center;
            margin: 0 3px;
            color: var(--primary);
            font-size: 0.95em;
            font-weight: bold;
            padding: 0 4px 2px;
            width: 30px;
            min-width: 30px;
            outline: none;
            transition: border-color 0.2s, width 0.1s;
            box-sizing: content-box;
        }
        .blank-input:focus {
            border-bottom-color: #f97316;
        }

        .blank-input:focus {
            border-bottom-color: var(--accent);
        }

        .blank-input::placeholder {
            color: #ccc;
            font-weight: normal;
        }

        .blank-input:disabled {
            color: #7f8c8d;
            border-bottom-color: #bdc3c7;
            cursor: not-allowed;
        }

        .blank-input.correct {
            background: var(--correct-bg) !important;
            border-bottom-color: var(--accent) !important;
        }

        .blank-input.wrong {
            background: var(--wrong-bg) !important;
            border-bottom-color: #e74c3c !important;
        }

        .mc-question {
            margin-bottom: 35px;
            background: #fafbfc;
            padding: 20px;
            border-radius: 8px;
            border: 1px solid var(--border-color);
        }

        .mc-question.wrong {
            border-left: 4px solid #e74c3c;
        }

        .mc-question.correct {
            border-left: 4px solid var(--accent);
        }

        .mc-title {
            font-weight: 600;
            font-size: 1.1em;
            margin-bottom: 15px;
            color: var(--primary);
        }

        .mc-options {
            list-style-type: none;
            padding: 0;
            margin: 0;
        }

        .mc-options li {
            background: var(--card-bg);
            margin: 8px 0;
            border-radius: 6px;
            border: 1px solid var(--border-color);
            border-left: 4px solid var(--border-color);
            transition: all 0.2s ease;
        }

        .mc-options li:hover:not(.disabled) {
            border-left-color: var(--accent);
            background: #f0f9f4;
        }

        .mc-options li:has(input[type="radio"]:checked) {
            border-left-color: var(--accent);
            background: #e8f8f5;
            border-color: var(--accent);
        }

        .mc-options li.wrong {
            border-left-color: #e74c3c !important;
            background: #fff5f5 !important;
            border-color: #f5c6c6 !important;
        }

        .mc-options li.wrong label {
            color: #c0392b;
        }

        .mc-options li.correct {
            border-left-color: var(--accent) !important;
            background: #f0fff4 !important;
            border-color: #b8e6c8 !important;
        }

        .mc-options label {
            display: flex;
            align-items: flex-start;
            padding: 12px 18px;
            cursor: pointer;
            width: 100%;
        }

        .mc-options input[type="radio"] {
            position: absolute;
            opacity: 0;
            pointer-events: none;
        }

        .mc-options input[type="radio"]:disabled {
            cursor: not-allowed;
        }

        .mc-options label:has(input[type="radio"]:disabled) {
            cursor: not-allowed;
            color: #7f8c8d;
        }

        .option-label {
            font-weight: bold;
            margin-right: 8px;
            color: var(--accent);
        }

        .matching-section {
            margin-bottom: 35px;
            background: #fafbfc;
            padding: 20px;
            border-radius: 8px;
            border: 1px solid var(--border-color);
        }

        .matching-instruction {
            font-weight: 600;
            font-size: 1.1em;
            margin-bottom: 15px;
            color: var(--primary);
        }

        .matching-table {
            width: 100%;
            border-collapse: collapse;
        }

        .matching-table th {
            text-align: left;
            padding: 10px 15px;
            background: #f8f9fa;
            color: var(--primary);
            border: 1px solid var(--border-color);
            font-weight: bold;
        }

        .matching-table td {
            padding: 12px 15px;
            border: 1px solid var(--border-color);
            vertical-align: middle;
        }

        .matching-table tr:nth-child(even) td {
            background: #fcfcfc;
        }

        .matching-table select {
            padding: 8px 12px;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            font-size: 0.95em;
            background: var(--card-bg);
            color: var(--text-main);
            outline: none;
            cursor: pointer;
            min-width: 80px;
        }

        .matching-table select:focus {
            border-color: var(--accent);
        }

        .matching-table select:disabled {
            cursor: not-allowed;
            background: #f1f1f1;
        }

        .matching-table select.correct {
            border-color: var(--accent);
            background: var(--correct-bg);
        }

        .matching-table select.wrong {
            border-color: #e74c3c;
            background: var(--wrong-bg);
        }

        .right-label {
            font-weight: bold;
            color: var(--text-light);
            margin-right: 6px;
        }

        .submit-btn {
            display: block;
            width: 100%;
            max-width: 400px;
            margin: 50px auto 30px;
            padding: 16px 20px;
            font-size: 1.2em;
            font-weight: bold;
            color: white;
            background-color: var(--accent);
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.3s, transform 0.1s;
            box-shadow: 0 4px 6px rgba(39, 174, 96, 0.2);
        }

        .submit-btn:hover:not(:disabled) {
            background-color: #1e8449;
        }

        .submit-btn:active:not(:disabled) {
            transform: translateY(2px);
            box-shadow: 0 2px 4px rgba(39, 174, 96, 0.2);
        }

        .submit-btn:disabled {
            background-color: #95a5a6;
            cursor: not-allowed;
            box-shadow: none;
        }

        #score-display {
            text-align: center;
            font-size: 1.3em;
            font-weight: bold;
            padding: 15px;
            border-radius: 8px;
            margin: 20px 0;
            display: none;
        }

        #score-display.show {
            display: block;
        }

        #score-display.perfect {
            background: var(--correct-bg);
            color: #1e7e34;
            border: 1px solid #b8e6c8;
        }

        #score-display.partial {
            background: #fff8e1;
            color: #b9770e;
            border: 1px solid #f5cba7;
        }

        #score-display.zero {
            background: var(--wrong-bg);
            color: #c0392b;
            border: 1px solid #f5c6c6;
        }

        .feedback-bar {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-top: 10px;
        }

        .answer-toggle-btn {
            border: 1px solid rgba(15, 118, 110, 0.2);
            border-radius: 999px;
            padding: 6px 14px;
            background: rgba(255,255,255,0.9);
            color: var(--accent);
            font-size: 0.8rem;
            font-weight: 800;
            cursor: pointer;
        }

        .answer-toggle-btn:hover {
            background: var(--accent);
            color: #fff;
        }

        .argue-btn {
            border: 1px solid #e2c8b0;
            border-radius: 999px;
            padding: 6px 14px;
            background: #fff6ed;
            color: #9a5a2a;
            font-size: 0.8rem;
            font-weight: 800;
            cursor: pointer;
        }

        .argue-btn:hover {
            background: #fde8d0;
            color: #7a431a;
        }

        .argue-modal {
            position: fixed;
            inset: 0;
            z-index: 1300;
            display: grid;
            place-items: center;
            padding: 20px;
            background: rgba(13, 44, 39, 0.38);
            backdrop-filter: blur(6px);
        }

        .argue-modal-card {
            width: min(460px, 100%);
            padding: 22px;
            border-radius: 22px;
            background: #fff;
            box-shadow: 0 24px 80px rgba(17, 54, 48, 0.22);
        }

        .argue-modal-card h2 {
            margin: 0 0 7px;
            color: var(--ink);
            font-size: 1.25rem;
        }

        .argue-modal-card p {
            margin: 0 0 14px;
            color: var(--muted);
            line-height: 1.45;
        }

        .argue-modal-card textarea {
            width: 100%;
            min-height: 92px;
            padding: 10px 12px;
            border: 1px solid #dce8e3;
            border-radius: 12px;
            font-family: inherit;
            resize: vertical;
            outline: none;
            box-sizing: border-box;
        }

        .argue-modal-status {
            margin: 0 0 12px !important;
            padding: 10px 12px;
            border-radius: 12px;
            background: #f6faf8;
            font-size: 0.88rem;
        }

        .argue-modal-status.pending { color: #7a5528; background: #fff8e5; }
        .argue-modal-status.approved { color: #237a52; background: #ecf9f1; }
        .argue-modal-status.rejected { color: #b54747; background: #fff0ed; }

        .argue-modal-actions {
            display: flex;
            justify-content: flex-end;
            gap: 9px;
            margin-top: 14px;
        }

        .argue-modal-actions button {
            min-height: 38px;
            padding: 0 15px;
            border-radius: 11px;
            font-weight: 850;
            cursor: pointer;
        }

        .argue-modal-submit {
            border: 0;
            color: #fff;
            background: var(--accent);
        }

        .argue-modal-cancel {
            border: 1px solid var(--line);
            color: var(--ink);
            background: #fff;
        }

        .result-overlay {
            position: fixed;
            inset: 0;
            z-index: 1200;
            display: grid;
            place-items: center;
            padding: 20px;
            background: rgba(13, 44, 39, 0.38);
            backdrop-filter: blur(8px);
        }

        .result-card {
            position: relative;
            width: min(390px, 100%);
            padding: 32px 26px 0;
            border: 1px solid rgba(24, 53, 47, 0.1);
            border-radius: 30px;
            background: rgba(255,255,255,0.95);
            text-align: center;
            box-shadow: 0 28px 78px rgba(24,53,47,0.22);
            animation: resultPop 720ms cubic-bezier(.18,.95,.26,1.18) both;
            overflow: visible;
        }

        .result-card.mastered {
            box-shadow:
                0 28px 78px rgba(24,53,47,0.22),
                0 0 42px rgba(255, 192, 45, 0.24);
        }

        .result-gold-glow {
            position: absolute;
            inset: 18px;
            border-radius: 30px;
            pointer-events: none;
            opacity: 0;
            background:
                radial-gradient(circle at 50% 30%, rgba(255, 226, 111, .50), transparent 32%),
                radial-gradient(circle at 72% 18%, rgba(255, 181, 30, .35), transparent 18%);
            filter: blur(10px);
        }

        .result-card.celebrate .result-gold-glow {
            opacity: 1;
            animation: resultGoldGlow 2.6s ease-in-out infinite;
        }

        .result-stamp {
            position: absolute;
            z-index: 7;
            right: -18px;
            top: -22px;
            display: grid;
            place-items: center;
            width: 210px;
            height: 82px;
            border: 5px solid currentColor;
            border-radius: 16px;
            pointer-events: none;
            font-size: 31px;
            font-weight: 950;
            text-transform: uppercase;
            letter-spacing: .04em;
            mix-blend-mode: multiply;
            opacity: 0;
            transform: rotate(9deg) scale(1.35);
            filter: contrast(1.08) blur(1px);
            box-shadow: 0 0 0 2px rgba(255,255,255,.34) inset;
            text-shadow: 1px 0 0 rgba(255,255,255,.18), -1px 0 0 rgba(255,255,255,.10);
        }

        .result-stamp.show {
            animation: resultStampIn 560ms cubic-bezier(.2,.95,.3,1.35) both;
        }

        .result-stamp::before {
            content: "";
            position: absolute;
            inset: 0;
            border-radius: inherit;
            background:
                radial-gradient(circle at 18% 24%, rgba(255,255,255,.42) 0 2px, transparent 3px),
                radial-gradient(circle at 76% 32%, rgba(255,255,255,.34) 0 1px, transparent 2px),
                radial-gradient(circle at 42% 74%, rgba(255,255,255,.30) 0 2px, transparent 3px),
                repeating-linear-gradient(135deg, transparent 0 8px, rgba(255,255,255,.13) 8px 9px);
            opacity: .72;
            mix-blend-mode: screen;
        }

        .result-stamp::after {
            content: "";
            position: absolute;
            inset: 5px;
            border: 2px solid currentColor;
            border-radius: inherit;
            opacity: .72;
        }

        .result-stamp.passed { color: #147964; }
        .result-stamp.mastered {
            color: #f2ad1f;
            background: radial-gradient(circle at 32% 28%, rgba(255, 246, 173, .28), transparent 34%);
            box-shadow:
                0 0 0 2px rgba(255,255,255,.34) inset,
                0 0 18px rgba(255, 205, 74, .38),
                0 0 44px rgba(255, 176, 32, .28);
            text-shadow:
                0 0 8px rgba(255, 222, 99, .46),
                1px 0 0 rgba(255,255,255,.18),
                -1px 0 0 rgba(255,255,255,.10);
        }
        .result-stamp.failed {
            color: #c76624;
            opacity: .88;
            transform: rotate(9deg) scale(1);
            filter: contrast(1.08);
        }

        .result-score {
            position: relative;
            z-index: 3;
            margin: 18px 0 8px;
            font-size: 4.2rem;

        .result-confetti span:nth-child(3n) { background: #e87695; animation-duration: 2.18s; }
        .result-confetti span:nth-child(4n) { background: #5b8def; animation-duration: 2.78s; }
        .result-confetti span:nth-child(1) { left: 7%; animation-delay: 0s; }
        .result-confetti span:nth-child(2) { left: 17%; animation-delay: .26s; }
        .result-confetti span:nth-child(3) { left: 28%; animation-delay: .06s; }
        .result-confetti span:nth-child(4) { left: 41%; animation-delay: .38s; }
        .result-confetti span:nth-child(5) { left: 54%; animation-delay: .14s; }
        .result-confetti span:nth-child(6) { left: 67%; animation-delay: .48s; }
        .result-confetti span:nth-child(7) { left: 79%; animation-delay: .30s; }
        .result-confetti span:nth-child(8) { left: 91%; animation-delay: .11s; }

        .result-spark span {
            width: 13px;
            height: 13px;

            animation: resultStarPop 1.6s ease-out infinite;
        }

        .result-spark span:nth-child(1) { left: 19%; top: 23%; animation-delay: .1s; }
        .result-spark span:nth-child(2) { left: 77%; top: 24%; animation-delay: .34s; }
        .result-spark span:nth-child(3) { left: 70%; top: 72%; animation-delay: .66s; }
        .result-spark span:nth-child(4) { left: 22%; top: 68%; animation-delay: .84s; }

        .result-card.failed { animation: resultPop 720ms cubic-bezier(.18,.95,.26,1.18) both, resultSoftShake 650ms 880ms ease both; }

        .history-toolbar {
            position: fixed;

        @keyframes resultPop {
            from { opacity: 0; transform: translateY(18px) scale(0.94); }

        @keyframes resultScorePulse {
            from { transform: scale(1.08); }

        @keyframes resultStampIn {
            from { opacity: 0; transform: rotate(9deg) scale(1.35); filter: contrast(1.08) blur(1px); }

        @keyframes resultFall {
            from { transform: translateY(-24px) rotate(0deg); opacity: 0; }

            to { transform: translateY(410px) rotate(340deg); opacity: 0; }
        }

        @keyframes resultStarPop {
            0% { opacity: 0; transform: translateY(10px) scale(.35) rotate(0deg); }
            28% { opacity: 1; }
            100% { opacity: 0; transform: translateY(-28px) scale(1.2) rotate(80deg); }
        }

        @keyframes resultSoftShake {
            0%, 100% { transform: translateX(0); }
            20% { transform: translateX(-5px); }
            40% { transform: translateX(5px); }
            60% { transform: translateX(-3px); }

        .argue-inline textarea {

        }

        .argue-inline-actions {

        .argue-inline-actions button {

        .argue-inline-close {

        #error-message {

        @media screen and (max-width: 768px) {

    </style>
</head>

<div class="container" id="app">
    <div id="loading-message">Loading lesson data...</div>

    <div id="error-message" class="error-container">
        <div class="error-icon">&#9888;</div>
        <h2>Error</h2>
        <p id="error-text"></p>
    </div>

    <div id="login-modal" class="modal-overlay">
        <div class="modal-box">
            <div style="display:flex;gap:8px;margin-top:14px;">
                <input type="text" id="bbc-custom-id-input" placeholder="Enter a student ID" autocomplete="off" style="flex:1;padding:12px;border:1px solid var(--border);border-radius:8px;font-size:0.95em;outline:none;background:var(--bg-page);color:var(--text-primary);" />
                <button id="bbc-custom-login-btn" style="padding:12px 20px;background:#f97316;color:#fff;border:none;border-radius:8px;font-size:0.95em;font-weight:600;cursor:pointer;white-space:nowrap;">Login</button>
            </div>
            <button id="bbc-saved-identity-btn" style="display:none;width:100%;margin-top:12px;padding:12px;background:transparent;color:var(--text-light);border:1px solid var(--border-color);border-radius:8px;font-size:0.9em;cursor:pointer;"></button>
            <div id="bbc-login-error" style="font-size:0.85em;color:var(--text-muted);margin-top:6px;min-height:1.2em;"></div>
            <div style="display:flex;align-items:center;gap:10px;margin:16px 0;color:var(--text-muted);font-size:0.85em;"><span style="flex:1;border-top:1px solid var(--border);"></span><span>or</span><span style="flex:1;border-top:1px solid var(--border);"></span></div>
            <button id="bbc-visitor-btn" style="display:block;width:100%;padding:12px;background:transparent;color:var(--text-muted);border:1px solid var(--border);border-radius:8px;font-size:0.9em;cursor:pointer;">Continue as Visitor</button>
        </div>
    </div>

    <div id="content" class="content-container">
        <section class="lesson-hero">
            <div id="title-area"></div>
            <div class="hero-meta" id="hero-meta"></div>
        </section>

        <div class="sticky-player" id="sticky-player">
            <audio id="bbc-audio" preload="none">
                <source id="audio-source" src="" type="audio/mpeg">
            </audio>
            <button class="player-btn play-btn" id="sticky-play-btn" type="button">▶</button>
            <div class="progress-wrap">
                <div class="progress-track"><div class="progress-fill" id="sticky-progress-fill"></div></div>
                <div class="time-row">
                    <span id="sticky-current-time">0:00</span>
                    <span class="sticky-identity" id="identity-status">Login</span>
                    <span id="sticky-duration">0:00</span>
                </div>
            </div>
            <button class="player-btn back-btn" id="sticky-back-btn" type="button"><svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor"><polygon points="12,5 3,12 12,19"/><polygon points="21,5 12,12 21,19"/></svg></button>
        </div>

        <form id="quiz-form" class="content-card" novalidate>
            <div class="quiz-toolbar" aria-label="Text size controls">
                <h2>Part 1: Fill in the Blanks</h2>
                <div class="font-size-controls">
                    <button class="font-size-btn" id="font-size-down" type="button" aria-label="Decrease text size">−</button>
                    <button class="font-size-btn" id="font-size-up" type="button" aria-label="Increase text size">+</button>
                </div>
            </div>
            <ul class="fill-blanks" id="blanks-container"></ul>

            <hr style="border: 0; border-top: 1px solid var(--border-color); margin: 40px 0;">

            <h2>Part 2: Multiple Choice</h2>
            <div id="mc-container"></div>

            <hr style="border: 0; border-top: 1px solid var(--border-color); margin: 40px 0;" id="matching-divider">

            <h2 id="matching-heading">Part 3: Matching</h2>
            <div id="matching-container"></div>

            <div id="score-display"></div>

            <button type="submit" id="submit-btn" class="submit-btn">Submit Answers</button>
        </form>

        <div id="confirm-modal" class="modal-overlay">
            <div class="modal-box">
                <p>Submit all answers?</p>
                <div class="modal-actions">
                    <button class="modal-btn primary" id="modal-confirm">Confirm</button>
                    <button class="modal-btn danger" id="modal-cancel">Cancel</button>
                </div>
            </div>
        </div>

        <div id="incomplete-modal" class="modal-overlay">
            <div class="modal-box">
                <h2 style="border:0;padding:0;margin:0 0 10px;color:var(--primary);">Almost there, detective.</h2>
                <p id="incomplete-message">Please answer all questions before submitting.</p>
                <div class="modal-actions">
                    <button class="modal-btn primary" id="incomplete-close" type="button">Keep going</button>
                </div>
            </div>
        </div>
    </div>
</div>
