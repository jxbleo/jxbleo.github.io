<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vocabulary Unit</title>
    <style>
        :root {
            --ink: #1f2937;
            --muted: #6b7280;
            --border: #dbe2ea;
            --soft: #f4f7fb;
            --card: #ffffff;
            --accent: #0f766e;
            --accent-soft: #dbf5ef;
            --warm: #9a3412;
            --warm-soft: #ffedd5;
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            padding: 32px 16px 64px;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            color: var(--ink);
            background:
                radial-gradient(circle at top left, #fef3c7 0, transparent 28%),
                radial-gradient(circle at top right, #d1fae5 0, transparent 22%),
                linear-gradient(180deg, #f8fafc 0%, #eef5f7 100%);
        }

        .shell {
            max-width: 1100px;
            margin: 0 auto;
        }

        .hero {
            background: linear-gradient(135deg, #134e4a 0%, #0f766e 52%, #14b8a6 100%);
            color: #fff;
            border-radius: 24px;
            padding: 24px 28px;
            box-shadow: 0 18px 40px rgba(15, 118, 110, 0.18);
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
            gap: 14px;
        }

        .stat {
            background: rgba(255,255,255,0.14);
            border: 1px solid rgba(255,255,255,0.18);
            border-radius: 18px;
            padding: 16px 18px;
        }

        .stat-label {
            font-size: 0.82rem;
            color: rgba(255,255,255,0.72);
            margin-bottom: 6px;
        }

        .stat-value {
            font-size: 1.35rem;
            font-weight: 700;
        }

        .panel {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 22px;
            margin-top: 22px;
            padding: 24px;
            box-shadow: 0 10px 28px rgba(15, 23, 42, 0.05);
        }

        .panel h2 {
            margin: 0 0 14px;
            font-size: 1.15rem;
        }

        .switcher {
            display: inline-flex;
            gap: 8px;
            padding: 6px;
            border-radius: 999px;
            background: #e9f1f4;
            margin-bottom: 18px;
        }

        .switch-btn {
            border: none;
            background: transparent;
            color: var(--muted);
            padding: 10px 16px;
            border-radius: 999px;
            cursor: pointer;
            font-size: 0.95rem;
            font-weight: 600;
        }

        .switch-btn.active {
            background: #fff;
            color: var(--ink);
            box-shadow: 0 1px 2px rgba(0,0,0,0.08);
        }

        .view { display: none; }
        .view.active { display: block; }

        .word-toolbar {
            display: flex;
            gap: 12px;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            margin-bottom: 16px;
        }

        .word-search {
            width: min(320px, 100%);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 12px 14px;
            font-size: 0.95rem;
            outline: none;
            background: #fff;
        }

        .word-search:focus {
            border-color: var(--accent);
        }

        .word-table-wrap {
            overflow: auto;
            border: 1px solid var(--border);
            border-radius: 18px;
            background: #fff;
            box-shadow: inset 0 1px 0 rgba(255,255,255,0.7);
        }

        table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0;
            background: #fff;
        }

        th, td {
            padding: 13px 14px;
            border-bottom: 1px solid var(--border);
            text-align: left;
            vertical-align: top;
            font-size: 0.95rem;
            line-height: 1.55;
        }

        th {
            position: sticky;
            top: 0;
            background: #f8fbfc;
            font-size: 0.82rem;
            text-transform: uppercase;
            letter-spacing: 0.03em;
            color: var(--muted);
        }

        th + th,
        td + td {
            border-left: 1px solid #eef2f7;
        }

        tbody tr:nth-child(even) {
            background: #fbfdff;
        }

        tbody tr:hover {
            background: #f0fdfa;
        }

        tr:last-child td { border-bottom: none; }

        .word-table th:nth-child(1),
        .word-table td:nth-child(1) {
            width: 72px;
            color: var(--muted);
            font-weight: 700;
        }

        .word-table th:nth-child(2),
        .word-table td:nth-child(2) {
            width: 130px;
        }

        .word-table th:nth-child(3),
        .word-table td:nth-child(3) {
            width: 74px;
            text-align: center;
        }

        .word-table th:nth-child(4),
        .word-table td:nth-child(4) {
            width: 48%;
        }

        .word-table th:nth-child(5),
        .word-table td:nth-child(5) {
            width: 28%;
            color: #475569;
        }

        .word-cell {
            color: #0f766e;
            font-size: 1.02rem;
            letter-spacing: 0.01em;
        }

        .emoji {
            font-size: 1.25rem;
            white-space: nowrap;
        }

        .word-card-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 14px;
        }

        .word-card {
            position: relative;
            min-height: 176px;
            padding: 18px;
            border: 1px solid rgba(15, 118, 110, 0.12);
            border-radius: 18px;
            background:
                linear-gradient(180deg, #ffffff 0%, #fbfefd 100%);
            box-shadow: 0 10px 24px rgba(15, 23, 42, 0.045);
        }

        .word-card-top {
            display: flex;
            justify-content: space-between;
            gap: 14px;
            align-items: flex-start;
            margin-bottom: 12px;
        }

        .word-card-number {
            color: var(--muted);
            font-size: 0.78rem;
            font-weight: 900;
        }

        .word-card-word {
            margin: 3px 0 0;
            color: var(--accent);
            font-size: 1.35rem;
            font-weight: 900;
            line-height: 1.05;
        }

        .word-card-emoji {
            font-size: 1.55rem;
            line-height: 1;
            white-space: nowrap;
        }

        .word-card-definition {
            margin: 0 0 12px;
            color: var(--ink);
            font-size: 0.95rem;
            line-height: 1.55;
        }

        .word-card-meaning {
            margin: 0;
            padding-top: 12px;
            border-top: 1px solid #edf2f7;
            color: #475569;
            font-size: 0.9rem;
            line-height: 1.55;
        }

        .group-grid {
            display: grid;
            gap: 18px;
        }

        .group-card {
            --practice-font-size: 1rem;
            border: 1px solid var(--border);
            border-radius: 18px;
            overflow: visible;
            background: #fff;
        }

        .group-head {
            position: sticky;
            top: 0;
            z-index: 40;
            display: block;
            padding: 18px 20px;
            background: #f8fbfc;
            border-bottom: 1px solid var(--border);
            box-shadow: 0 10px 24px rgba(15, 23, 42, 0.08);
        }

        .group-head-main {
            width: 100%;
        }

        .font-controls {
            position: absolute;
            top: 14px;
            right: 20px;
            display: inline-flex;
            gap: 6px;
            padding: 4px;
            border-radius: 999px;
            background: rgba(15, 118, 110, 0.08);
        }

        .font-control-btn {
            width: 28px;
            height: 28px;
            border: none;
            border-radius: 999px;
            background: rgba(255,255,255,0.82);
            color: var(--accent);
            font-size: 1rem;
            font-weight: 900;
            line-height: 1;
            cursor: pointer;
        }

        .font-control-btn:hover {
            background: var(--accent);
            color: #fff;
        }

        .group-title {
            margin: 0;
            font-size: 0.9rem;
            color: var(--muted);
            font-weight: 850;
        }

        .set-meta-row {
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
            color: var(--muted);
            font-size: 0.8rem;
            font-weight: 800;
        }

        .set-badge {
            display: inline-flex;
            align-items: center;
            min-height: 30px;
            padding: 6px 12px;
            border-radius: 999px;
            background: rgba(15, 118, 110, 0.08);
            color: var(--accent);
            font-weight: 900;
        }

        .set-badge.test-set {
            background: var(--warm-soft);
            color: var(--warm);
        }

        .group-range {
            margin: 6px 0 0;
            color: var(--muted);
            font-size: 0.9rem;
        }

        .group-wordline {
            margin: 10px 0 0;
            color: var(--ink);
            font-size: 0.93rem;
            line-height: 1.65;
        }

        .word-bank {
            margin-top: 12px;
            padding: 0;
            font-size: var(--practice-font-size);
        }

        .word-chip-list {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            align-items: center;
            width: 100%;
            counter-reset: word-bank;
        }

        .word-chip {
            counter-increment: word-bank;
            display: inline-flex;
            align-items: center;
            gap: 0.48em;
            min-height: 2.35em;
            padding: 0.48em 0.68em;
            flex: 0 1 auto;
            border: 1px solid rgba(15, 118, 110, 0.1);
            border-radius: 0.82em;
            background: #ffffff;
            color: var(--ink);
            font-size: 0.92em;
            font-weight: 850;
            line-height: 1;
            white-space: nowrap;
            box-shadow: inset 0 1px 0 rgba(255,255,255,0.9);
        }

        .word-chip::before {
            content: counter(word-bank);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 1.45em;
            height: 1.45em;
            border-radius: 999px;
            background: var(--accent-soft);
            color: var(--accent);
            font-size: 0.75em;
            font-weight: 900;
            flex: 0 0 auto;
        }

        .question-list {
            padding: 20px;
            display: grid;
            gap: 16px;
            font-size: var(--practice-font-size);
        }

        .question-item {
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 16px;
            background: #fff;
        }

        .question-item.correct {
            border-color: #4ade80;
            background: #f0fdf4;
        }

        .question-item.wrong {
            border-color: #fb923c;
            background: #fff7ed;
        }

        .question-item.pending {
            border-color: #facc15;
            background: #fefce8;
        }

        .dictation-row.correct td {
            background: #f0fdf4;
        }

        .dictation-row.wrong td {
            background: #fff7ed;
        }

        .dictation-row.pending td {
            background: #fefce8;
        }

        .question-prompt {
            margin: 0 0 12px;
            font-size: inherit;
            line-height: 1.6;
        }

        .question-prompt.with-inline-answer {
            margin-bottom: 0;
        }

        .answer-box {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            align-items: center;
        }

        .answer-input {
            width: 9ch;
            min-width: 7ch;
            max-width: 24ch;
            border: none;
            border-bottom: 2px solid #64748b;
            border-radius: 0;
            padding: 2px 2px 3px;
            font-size: 1rem;
            font-weight: 700;
            font-family: inherit;
            outline: none;
            background: transparent;
            color: var(--ink);
            text-align: center;
            transition: border-color 0.2s, width 0.15s ease;
        }

        .answer-input:focus {
            border-color: var(--accent);
        }

        .blank-input {
            margin: 0 4px;
        }

        .blank-trigger {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-width: 4.5ch;
            max-width: min(18ch, 100%);
            min-height: 1.45em;
            margin: 0 4px;
            border: none;
            border-bottom: 2px solid #64748b;
            border-radius: 0;
            padding: 1px 2px 3px;
            background: transparent;
            color: var(--ink);
            font: inherit;
            font-weight: 800;
            outline: none;
            cursor: pointer;
            vertical-align: baseline;
        }

        .blank-trigger:focus,
        .blank-trigger:hover {
            border-bottom-color: var(--accent);
        }

        .blank-trigger.selected {
            min-width: 4.5ch;
        }

        .choice-panel {
            display: none;
            flex-direction: column;
            gap: 8px;
            margin-top: 12px;
            padding: 12px;
            border: 1px solid rgba(15, 118, 110, 0.14);
            border-radius: 14px;
            background: #f8fbfc;
        }

        .choice-options-wrap {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .question-item.choice-open .choice-panel {
            display: flex;
        }

        .choice-option {
            border: 1px solid rgba(15, 118, 110, 0.16);
            border-radius: 999px;
            padding: 8px 12px;
            background: #fff;
            color: var(--accent);
            font-size: 0.9rem;
            font-weight: 850;
            cursor: pointer;
        }

        .choice-option:hover,
        .choice-option.selected {
            background: #0f766e;
            color: #fff;
        }

        .choice-option.clear-choice {
            align-self: flex-end;
            border-color: #e2c8b0;
            background: #fff6ed;
            color: #9a5a2a;
            font-size: 0.82rem;
        }

        .choice-option.clear-choice:hover {
            background: #fde8d0;
            color: #7a431a;
        }

        .dictation-input {
            display: inline-flex;
            flex-wrap: wrap;
            gap: 0.55ch;
            align-items: end;
        }

        .dictation-table th:first-child,
        .dictation-table td:first-child {
            width: 46%;
        }

        .dictation-table th:nth-child(2),
        .dictation-table td:nth-child(2) {
            width: 54%;
            color: #475569;
        }

        .part-of-speech {
            display: inline-flex;
            margin-left: 8px;
            padding: 3px 8px;
            border-radius: 999px;
            background: var(--accent-soft);
            color: var(--accent);
            font-size: 0.78rem;
            font-weight: 800;
            letter-spacing: 0.02em;
        }

        .letter-slot {
            width: 1.75ch;
            border: none;
            border-bottom: 2.5px solid #64748b;
            border-radius: 0;
            padding: 0 0 5px;
            background: transparent;
            color: var(--ink);
            font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
            font-size: 1.12rem;
            font-weight: 800;
            line-height: 1.25;
            text-align: center;
            text-transform: lowercase;
            outline: none;
        }

        .letter-slot:focus {
            border-bottom-color: var(--accent);
        }

        .dictation-spell-head {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 12px;
            flex-wrap: wrap;
        }

        .dictation-number {
            color: var(--muted);
            font-weight: 900;
        }

        .reveal {
            margin-top: 12px;
            display: none;
            padding: 12px 14px;
            border-radius: 12px;
            background: var(--warm-soft);
            color: var(--warm);
            font-size: 0.9rem;
            line-height: 1.65;
        }

        .reveal.show {
            display: block;
        }

        .group-actions {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
            flex-wrap: wrap;
            padding: 18px 20px 20px;
            margin-top: 4px;
        }

        .btn {
            border: none;
            border-radius: 12px;
            padding: 11px 16px;
            cursor: pointer;
            font-size: 0.92rem;
            font-weight: 700;
        }

        .btn-primary {
            background: var(--accent);
            color: #fff;
        }

        .btn-secondary {
            background: #eef2f7;
            color: var(--ink);
        }

        .btn-clear-all {
            background: #fff6ed;
            color: #9a5a2a;
            border: 1px solid #e2c8b0;
        }

        .btn-clear-all:hover {
            background: #fde8d0;
            color: #7a431a;
        }

        .btn-hide-answer {
            background: #e0eef5;
            color: #1a5f7a;
        }

        .btn-hide-answer:hover {
            background: #cde2ee;
        }

        .test-setup {
            display: flex;
            align-items: center;
            gap: 12px;
            justify-content: space-between;
            padding: 16px;
            border: 1px solid var(--border);
            border-radius: 16px;
            background: #f8fbfc;
            margin-bottom: 18px;
        }

        .test-setup select {
            border: 1px solid var(--border);
            border-radius: 999px;
            padding: 11px 38px 11px 14px;
            background:
                linear-gradient(180deg, #fff 0%, #f8fbfc 100%);
            font-size: 0.95rem;
            font-weight: 800;
            color: var(--ink);
            outline: none;
        }

        .timer {
            display: none;
            margin-left: auto;
            padding: 8px 12px;
            border-radius: 999px;
            background: var(--warm-soft);
            color: var(--warm);
            font-weight: 800;
        }

        .timer.sticky {
            display: block;
            position: fixed;
            top: 16px;
            left: 16px;
            z-index: 50;
            box-shadow: 0 12px 28px rgba(154, 52, 18, 0.18);
        }

        .range-picker {
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: nowrap;
            justify-content: flex-start;
            padding: 16px;
            border: 1px solid var(--border);
            border-radius: 16px;
            background: #f8fbfc;
            margin-bottom: 18px;
        }

        .range-picker select {
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 10px 12px;
            background: #fff;
            font-size: 0.95rem;
        }

        .range-picker .btn {
            margin-left: auto;
        }

        .test-summary {
            display: none;
            margin: 16px 0;
            padding: 16px;
            border-radius: 16px;
            background: var(--accent-soft);
            color: #064e3b;
            font-weight: 800;
        }

        .test-summary.show {
            display: block;
        }

        .result-overlay {
            position: fixed;
            inset: 0;
            z-index: 1200;
            display: grid;
            place-items: center;
            padding: 20px;
            background: rgba(15,23,42,.35);
            backdrop-filter: blur(5px);
        }

        .result-card {
            width: min(420px,100%);
            padding: 26px;
            border-radius: 24px;
            background: #fff;
            text-align: center;
            box-shadow: 0 24px 70px rgba(0,0,0,.24);
            animation: resultPop 420ms ease-out both;
        }

        .result-emoji { font-size: 3rem; }
        .result-card h2 { margin: 8px 0; }
        .result-score { margin: 0; font-size: 1.8rem; font-weight: 800; color: var(--accent); }
        .result-copy { color: var(--muted); line-height: 1.45; }
        .result-actions { display: flex; flex-wrap: wrap; justify-content: center; gap: 9px; margin-top: 18px; }

        .history-toolbar {
            position: fixed;
            z-index: 999;
            right: 14px;
            bottom: 14px;
            display: flex;
            gap: 8px;
            justify-content: flex-end;
            pointer-events: none;
        }
        .history-toolbar button {
            pointer-events: auto;
            border: 1px solid rgba(15,118,110,.22);
            border-radius: 999px;
            padding: 10px 14px;
            color: #0f5f57;
            background: rgba(255,255,255,.94);
            box-shadow: 0 10px 28px rgba(15,76,71,.16);
            font-size: .82rem;
            font-weight: 800;
        }

        @keyframes resultPop {
            from { opacity: 0; transform: translateY(18px) scale(.94); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        .dictation-empty {
            padding: 22px;
            border: 1px dashed var(--border);
            border-radius: 16px;
            color: var(--muted);
            background: #f8fbfc;
            text-align: center;
            font-weight: 700;
        }

        .identity-status {
            position: fixed;
            top: 16px;
            right: 18px;
            z-index: 60;
            padding: 8px 14px;
            border-radius: 999px;
            background: rgba(255,255,255,0.88);
            border: 1px solid rgba(255,255,255,0.92);
            color: var(--ink);
            font-size: 0.86rem;
            font-weight: 800;
            box-shadow: 0 10px 24px rgba(15, 23, 42, 0.12);
            backdrop-filter: blur(14px);
        }

        .loading,
        .error {
            text-align: center;
            padding: 60px 20px;
            color: var(--muted);
        }

        .error {
            color: #b91c1c;
        }

        @media (max-width: 700px) {
            body {
                padding: 18px 10px 40px;
            }

            .hero,
            .panel {
                padding: 18px;
                border-radius: 18px;
            }

            th, td {
                padding: 12px 10px;
                font-size: 0.9rem;
            }

            .group-head,
            .question-list,
            .group-actions {
                padding-left: 16px;
                padding-right: 16px;
            }

            .range-picker,
            .test-setup {
                gap: 8px;
            }

            .range-picker select,
            .test-setup select {
                min-width: 0;
                padding: 9px 9px;
            }

            .font-controls {
                right: 16px;
            }

            .word-chip-list {
                gap: 6px;
            }

            .word-chip {
                gap: 0.34em;
                padding: 0.42em 0.52em;
                font-size: 0.82em;
                border-radius: 0.72em;
            }

            .word-chip::before {
                width: 1.32em;
                height: 1.32em;
                font-size: 0.72em;
            }
        }
    </style>
</head>
<body>
    <div class="identity-status" id="identity-status">Login</div>
    <div class="shell">
        <div id="loading" class="loading">Loading vocabulary unit...</div>
        <div id="error" class="error" style="display:none;"></div>
        <div id="app" style="display:none;">
            <section class="hero">
                <div class="stats">
                    <div class="stat">
                        <div class="stat-label">Word Source</div>
                        <div class="stat-value" id="stat-source"></div>
                    </div>
                    <div class="stat">
                        <div class="stat-label">CEFR Level</div>

    <script>
        var params = new URLSearchParams(window.location.search);
        var setId = params.get('set') || 'NGSL-A';
        var assignmentId = params.get('assignment') || '';
        var prefillAttemptId = params.get('prefill') || '';

        var unitData = null;
        var testTimerId = null;
        var testRemainingSeconds = 0;
        var activeTestGroups = [];
        var activeTestGroupCount = 0;
        var testStartedAt = null;
        var students = [
            { id: 'EI6688', label: '甘昕雨Eilene' },
            { id: 'EV3389', label: '刘榆雯Eva' },
            { id: 'LEO6666', label: 'jxbleo' }
        ];

        function getStudentLabel(id) {
            for (var i = 0; i < students.length; i++) {
                if (students[i].id === id) return students[i].label;
            }
            return id;
        }

        function updateIdentityStatus() {
            var el = document.getElementById('identity-status');
            if (!el) return;
            var urlUser = params.get('user');
            if (urlUser && urlUser !== 'VISITOR') {
                localStorage.setItem('opencode_user', urlUser);
                localStorage.removeItem('opencode_visitor');
            } else if (urlUser === 'VISITOR') {
                localStorage.removeItem('opencode_user');
                localStorage.setItem('opencode_visitor', 'true');
            }
            var user = localStorage.getItem('opencode_user') || '';
            var isVisitor = localStorage.getItem('opencode_visitor') === 'true';
            el.textContent = user ? getStudentLabel(user) : (isVisitor ? 'Visitor' : 'Login');
        }

        function currentUserId() {
            return localStorage.getItem('opencode_user') || (localStorage.getItem('opencode_visitor') === 'true' ? 'VISITOR' : '');
        }

        function testDraftKey() {
            return 'vocab-test-' + setId + '-' + (assignmentId || currentUserId() || 'visitor');
        }

        function saveTestDraft() {
            if (!activeTestGroups.length || !testStartedAt) return;
            var answers = {};
            document.querySelectorAll('.test-question').forEach(function(card) {
                var input = card.querySelector('.answer-input');
                answers[card.getAttribute('data-question-key')] = input ? input.value : '';
            });
            try {
                localStorage.setItem(testDraftKey(), JSON.stringify({
                    group_ids: activeTestGroups.map(function(group) { return group.id; }),
                    group_count: activeTestGroupCount,
                    started_at: testStartedAt,
                    total_seconds: activeTestGroupCount * 120,
                    answers: answers
                }));
            } catch (e) {}
        }

        function clearTestDraft() {
            try { localStorage.removeItem(testDraftKey()); } catch (e) {}
        }

        function recordAnswerReveal() {
            if (!assignmentId || !window.MrCatCloud) return;
            window.MrCatCloud.callFunction('getDashboard', {
                action: 'revealAnswers',
                assignment_id: assignmentId
            }).catch(function() {});
        }

        function clearAllTestAnswers() {
            document.querySelectorAll('.test-question').forEach(function(card) {
                card.classList.remove('correct', 'wrong', 'pending', 'choice-open');
                var input = card.querySelector('.answer-input');
                var trigger = card.querySelector('.blank-trigger');
                var reveal = card.querySelector('.reveal');
                if (input) {
                    input.value = '';
                    input.disabled = false;
                }
                if (trigger) {
                    trigger.textContent = '';
                    trigger.classList.remove('selected');
                    trigger.disabled = false;
                }
                if (reveal) {
                    reveal.classList.remove('show');
                    reveal.innerHTML = '';
                }
            });
            saveTestDraft();
        }

        function enableTestRetry() {
            document.querySelectorAll('.test-question').forEach(function(card) {
                card.classList.remove('correct', 'wrong', 'pending', 'choice-open');
                var input = card.querySelector('.answer-input');
                var trigger = card.querySelector('.blank-trigger');
                var reveal = card.querySelector('.reveal');
                if (input) input.disabled = false;
                if (trigger) trigger.disabled = false;
                if (reveal) reveal.classList.remove('show');
            });

            submitButton.disabled = false;
            submitButton.textContent = 'Submit Test';
            submitButton.style.display = 'inline-flex';
            saveTestDraft();

            if (document.getElementById('history-toolbar')) return;

            document.body.appendChild(toolbar);

        function showResultOverlay(response) {
            var status = response.mastered ? 'Mastered' : response.passed ? 'Passed' : 'Not Passed';
            var emoji = response.mastered ? '⭐' : response.passed ? '🎉' : '😅';
            var score = response.passed ? response.percentage + '%' : response.correct_count + ' / ' + response.question_count;
            var copy = response.mastered ? 'Mastered! This task moved to your Mastered list.' :
                response.passed ? 'You passed. Keep trying if you want to master it.' :
                'Keep going. Fix a few answers and try again.';
            var overlay = document.createElement('div');
            overlay.className = 'result-overlay';
            overlay.innerHTML =
                '<div class="result-card"><div class="result-emoji">' + emoji + '</div><h2>' + status + '</h2>' +
                '<p class="result-score">' + score + '</p><p class="result-copy">' + copy + '</p><div class="result-actions">' +
                (response.passed && !response.feedback_locked ? '<button class="btn btn-primary" type="button" data-result-action="view">View Answers</button>' : '') +
                '<button class="btn btn-primary" type="button" data-result-action="fix">Fix Answers</button>' +
                '<button class="btn btn-primary" type="button" data-result-action="fresh">Start Fresh</button></div></div>';
            document.body.appendChild(overlay);
            overlay.addEventListener('click', function(event) {
                var action = event.target && event.target.getAttribute('data-result-action');
                if (!action) return;
                if (action === 'view') {
                    if (!confirm('一旦查看答案，你将无法将本题进度提升至 master 等级，也无法获得对应星星，是否确认继续查看？')) return;
                    recordAnswerReveal();
                    document.querySelectorAll('[data-answer-reveal="1"]').forEach(function(el) { el.classList.add('show'); });
                    event.target.textContent = 'Answers Shown';
                    event.target.disabled = true;
                    return;
                }
                overlay.remove();
                enableTestRetry();
                if (action === 'fresh') clearAllTestAnswers();
                else saveTestDraft();
            });
        }

        function injectScript(src) {
            return new Promise(function(resolve, reject) {
                var script = document.createElement('script');
                script.src = src;
                script.onload = resolve;
                script.onerror = reject;
                document.head.appendChild(script);
            });

                view.classList.toggle('active', view.id === viewId);

        function attachAdaptiveInput(input) {

                input.style.width = Math.max(7, Math.min(24, (input.value.length || 0) + 2)) + 'ch';
            }
            input.addEventListener('input', resize);
            resize();
        }

        function setupAdaptiveInputs(root) {
            (root || document).querySelectorAll('.blank-input').forEach(attachAdaptiveInput);

        function renderHero(data) {
            document.getElementById('stat-source').textContent = data.id || data.sourceName || 'Vocabulary';
            document.getElementById('stat-cefr').textContent = data.cefrLevel || '—';

        function getWordRangeText(group) {
            return 'Words ' + group.rangeStart + '–' + group.rangeEnd;

        function normalizeAnswer(value) {
            return String(value || '').trim().toLowerCase();
        }

        }

        function getWordsForGroup(group) {
            return (unitData.words || []).filter(function(word) {

            });
        }

        function buildLetterGuide(word) {
            return String(word || '').split('').map(function(char) {
                return /[a-z]/i.test(char) ? '_' : char;
            }).join(' ');
        }

        function shuffleList(list) {
            var copy = list.slice();
            for (var i = copy.length - 1; i > 0; i--) {
                var j = Math.floor(Math.random() * (i + 1));
                var tmp = copy[i];
                copy[i] = copy[j];
                copy[j] = tmp;
            }
            return copy;
        }

        function formatTime(seconds) {
            var min = Math.floor(seconds / 60);
            var sec = seconds % 60;
            return min + ':' + String(sec).padStart(2, '0');
        }

        function renderWords(words) {
            var root = document.getElementById('word-list-grid');
            root.innerHTML = words.map(function(word) {
                return '<article class="word-card">' +
                    '<div class="word-card-top">' +
                        '<div>' +

        function escapeHtml(value) {
            return String(value || '')
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')

        function renderPromptWithSelect(question, options) {
            var blank = renderAnswerBlank();
            if (question.prompt.indexOf('__________') !== -1) {
                return question.prompt.replace('__________', blank);
            }
            if (question.prompt.indexOf('_____') !== -1) {
                return question.prompt.replace('_____', blank);
            }
            return question.prompt + ' ' + blank;

        function checkGroupAnswers(groupId) {
            var group = (unitData.quizGroups || []).find(function(item) { return item.id === groupId; });
            if (!group) return;
            var answers = {};
            group.questions.forEach(function(question, index) {
                var card = document.getElementById('self-' + groupId + '-question-' + index);
                var key = question.questionKey || (group.id + ':' + question.number);
                answers[key] = (card.querySelector('.answer-input') || {}).value || '';
            });
            window.MrCatCloud.callFunction('submitAttempt', {
                set_id: setId,
                mode: 'vocabulary_practice',
                answers: answers,
                selected_group_count: 1,
                selected_group_ids: [groupId]
            }).then(function(response) {
                if (!response || !response.success) throw new Error(response && response.message || 'Unable to check answers.');
                var resultMap = {};
                (response.question_results || []).forEach(function(item) { resultMap[item.question_id] = item; });
                group.questions.forEach(function(question, index) {
                    var card = document.getElementById('self-' + groupId + '-question-' + index);
                    var input = card.querySelector('.answer-input');
                    var reveal = card.querySelector('.reveal');
                    var key = question.questionKey || (group.id + ':' + question.number);
                    var result = resultMap[key];
                    card.classList.remove('correct', 'wrong', 'pending');
                    if (!result) return;
                    card.classList.add(result.correct ? 'correct' : (input.value.trim() ? 'wrong' : 'pending'));
                    reveal.innerHTML = '<strong>Answer:</strong> ' + escapeHtml(result.correct_answer) +
                        (result.explanation ? '<br><br>' + escapeHtml(result.explanation) : '');
                    reveal.classList.add('show');
                });
                var btn = document.querySelector('[data-action="check"][data-group="' + groupId + '"]');
                if (btn) {
                    btn.textContent = 'Hide Answer';
                    btn.classList.remove('btn-primary');
                    btn.classList.add('btn-hide-answer');
                    btn.setAttribute('data-action', 'hide');
                }
            }).catch(function(error) {
                alert(error && error.message ? error.message : 'Unable to check answers.');
            });
        }

        function hideGroupAnswers(groupId) {
            var group = (unitData.quizGroups || []).find(function(item) { return item.id === groupId; });
            if (!group) return;
            group.questions.forEach(function(question, index) {

                card.classList.remove('correct', 'wrong', 'pending');

        function getDictationValue(row) {

        function fillDictationSlots(wrapper, value) {
            var slots = Array.from(wrapper.querySelectorAll('.letter-slot'));
            slots.forEach(function(slot) {
                slot.value = '';
            });
            value.split('').slice(0, slots.length).forEach(function(char, index) {
                slots[index].value = char.toLowerCase();
            });
        }

        function wireDictationSlots(root) {
            root.querySelectorAll('.dictation-input').forEach(function(wrapper) {
                var slots = Array.from(wrapper.querySelectorAll('.letter-slot'));
                slots.forEach(function(slot, index) {
                    slot.addEventListener('input', function() {
                        var cleaned = slot.value.replace(/[^a-z]/gi, '').toLowerCase();
                        if (cleaned.length > 1) {
                            fillDictationSlots(wrapper, cleaned);
                            var nextIndex = Math.min(slots.length - 1, index + cleaned.length);
                            slots[nextIndex].focus();
                            return;
                        }
                        slot.value = cleaned;
                        if (cleaned && slots[index + 1]) slots[index + 1].focus();
                    });
                    slot.addEventListener('keydown', function(e) {
                        if (e.key === 'Backspace' && !slot.value && slots[index - 1]) {
                            slots[index - 1].focus();
                        }
                    });
                    slot.addEventListener('paste', function(e) {
                        e.preventDefault();
                        var text = (e.clipboardData || window.clipboardData).getData('text').replace(/[^a-z]/gi, '').toLowerCase();
                        fillDictationSlots(wrapper, text);
                        var nextIndex = Math.min(slots.length - 1, index + text.length);
                        slots[nextIndex].focus();
                    });
                });
            });
        }

        function renderDictationRangeOptions(words) {
            var start = document.getElementById('dictation-start');

            start.innerHTML = options;
            end.innerHTML = options;
            if (words.length) {
                start.value = words[0].number;
                end.value = words[Math.min(words.length - 1, 9)].number;
            }
            document.getElementById('dictation-list').innerHTML = '';
            document.getElementById('dictation-check-btn').style.display = 'none';
        }

        function buildDictationFromSelection() {
            var start = Number(document.getElementById('dictation-start').value);
            var end = Number(document.getElementById('dictation-end').value);
            if (start > end) {
                var tmp = start;
                start = end;
                end = tmp;
            }
            var selected = (unitData.words || []).filter(function(word) {
                return word.number >= start && word.number <= end;
            });
            renderDictation(shuffleList(selected));
            document.getElementById('dictation-check-btn').style.display = 'inline-flex';
        }

        function checkDictation() {
            document.querySelectorAll('.dictation-row').forEach(function(row) {
                var reveal = row.querySelector('.reveal');
                var answer = row.getAttribute('data-answer');
                row.classList.remove('correct', 'wrong', 'pending');
                var value = getDictationValue(row);
                if (normalizeAnswer(value) === normalizeAnswer(answer)) {
                    row.classList.add('correct');
                    reveal.classList.remove('show');
                } else {
                    row.classList.add(value.trim() ? 'wrong' : 'pending');
                    reveal.innerHTML = '<strong>Answer:</strong> ' + answer;
                    reveal.classList.add('show');
                }
            });
        }

        function closeChoicePanels(exceptCard) {
            document.querySelectorAll('.question-item.choice-open').forEach(function(card) {
                if (card !== exceptCard) card.classList.remove('choice-open');
            });
        }

        function adjustGroupFontSize(button, delta) {
            var groupCard = button.closest('.group-card');
            if (!groupCard) return;
            var currentStep = Number(groupCard.getAttribute('data-font-step') || 0);
            var nextStep = Math.max(-3, Math.min(5, currentStep + delta));
            groupCard.setAttribute('data-font-step', String(nextStep));
            groupCard.style.setProperty('--practice-font-size', (1 + nextStep * 0.06) + 'rem');
        }

        function refreshChoiceAvailability(groupCard) {
            if (!groupCard) return;
            var selectedValues = Array.from(groupCard.querySelectorAll('.question-item .answer-input'))
                .map(function(input) { return normalizeAnswer(input.value); })
                .filter(Boolean);

            groupCard.querySelectorAll('.question-item').forEach(function(card) {
                var ownValue = normalizeAnswer((card.querySelector('.answer-input') || {}).value);
                card.querySelectorAll('.choice-option[data-value]').forEach(function(option) {
                    var optionValue = normalizeAnswer(option.getAttribute('data-value'));
                    var usedElsewhere = selectedValues.indexOf(optionValue) !== -1 && optionValue !== ownValue;
                    option.hidden = usedElsewhere;
                    option.classList.toggle('selected', optionValue === ownValue);
                });
            });
        }

        function handleChoiceClick(e) {
            var fontButton = e.target.closest('.font-control-btn');
            if (fontButton) {
                var action = fontButton.getAttribute('data-action');
                adjustGroupFontSize(fontButton, action === 'font-larger' ? 1 : -1);
                return;
            }

            var clearButton = e.target.closest('.clear-choice');
            if (clearButton) {
                var clearCard = clearButton.closest('.question-item');
                var clearInput = clearCard.querySelector('.answer-input');
                var clearTrigger = clearCard.querySelector('.blank-trigger');
                clearInput.value = '';
                clearTrigger.textContent = '';
                clearTrigger.classList.remove('selected');
                clearCard.classList.remove('choice-open');
                refreshChoiceAvailability(clearButton.closest('.group-card'));
                return;
            }

            var option = e.target.closest('.choice-option');
            if (option) {
                var optionCard = option.closest('.question-item');
                var input = optionCard.querySelector('.answer-input');
                var trigger = optionCard.querySelector('.blank-trigger');
                var value = option.getAttribute('data-value') || '';
                input.value = value;
                trigger.textContent = value;
                trigger.classList.add('selected');
                optionCard.querySelectorAll('.choice-option').forEach(function(btn) {
                    btn.classList.toggle('selected', btn === option);
                });
                optionCard.classList.remove('choice-open');
                refreshChoiceAvailability(option.closest('.group-card'));
                return;
            }

            var trigger = e.target.closest('.blank-trigger');
            if (trigger && !trigger.disabled) {
                var triggerCard = trigger.closest('.question-item');
                var willOpen = !triggerCard.classList.contains('choice-open');
                closeChoicePanels(triggerCard);
                refreshChoiceAvailability(triggerCard.closest('.group-card'));
                triggerCard.classList.toggle('choice-open', willOpen);
                return;
            }

            if (!e.target.closest('.choice-panel')) {
                closeChoicePanels(null);
            }
        }

        function renderTestOptions(groups) {
            var select = document.getElementById('test-group-count');
            select.innerHTML = groups.map(function(group, index) {
                var count = index + 1;
                var status = count < 5 ? ' · Self-test only' : ' · Counts toward results';
                return '<option value="' + count + '">' + count + ' set' + (count > 1 ? 's' : '') + ' · ' + (count * 2) + ' min' + status + '</option>';
            }).join('');
            updateTestCountNote();
        }

        function updateTestCountNote() {
            var count = Number(document.getElementById('test-group-count').value || 1);
            var note = document.getElementById('test-count-note');
            if (count < 5) {
                note.textContent = 'Tests with 4 groups or fewer are for self-study only. They are not saved and do not affect assignments.';
            } else {
                note.textContent = 'This is a counted test. Your answers, group accuracy, and overall result will be saved.';
            }
        }

        function renderTestQuestion(group, question, index) {
            var questionKey = question.questionKey || (group.id + ':' + question.number);
            return '<div class="question-item test-question" id="test-' + group.id + '-question-' + index + '" data-question-key="' + escapeHtml(questionKey) + '">' +
                '<p class="question-prompt with-inline-answer">' + renderPromptWithSelect(question, group.wordList || []) + '</p>' +
                renderChoicePanel(group.wordList || []) +
                '<div class="reveal"></div>' +
            '</div>';
        }

        function playTimeUpSound() {
            var AudioContext = window.AudioContext || window.webkitAudioContext;
            if (!AudioContext) return;
            try {
                var ctx = new AudioContext();
                var now = ctx.currentTime;
                [740, 620, 520].forEach(function(freq, index) {
                    var osc = ctx.createOscillator();
                    var gain = ctx.createGain();
                    var start = now + index * 0.16;
                    osc.type = 'sine';
                    osc.frequency.value = freq;
                    gain.gain.setValueAtTime(0.0001, start);
                    gain.gain.exponentialRampToValueAtTime(0.16, start + 0.02);
                    gain.gain.exponentialRampToValueAtTime(0.0001, start + 0.13);
                    osc.connect(gain);
                    gain.connect(ctx.destination);
                    osc.start(start);
                    osc.stop(start + 0.14);
                });
                setTimeout(function() { ctx.close(); }, 800);
            } catch (e) {}
        }

        function startTimer(seconds) {
            clearInterval(testTimerId);
            testRemainingSeconds = seconds;
            var timer = document.getElementById('test-timer');
            timer.textContent = formatTime(testRemainingSeconds);
            timer.classList.add('sticky');
            testTimerId = setInterval(function() {
                testRemainingSeconds--;
                timer.textContent = formatTime(Math.max(0, testRemainingSeconds));
                if (testRemainingSeconds <= 0) {
                    clearInterval(testTimerId);
                    playTimeUpSound();
                    submitTest();
                }
            }, 1000);
        }

        function restoreTestDraft() {
            if (params.get('retry') === '1') {
                clearTestDraft();
                return false;
            }
            var draft = null;
            try { draft = JSON.parse(localStorage.getItem(testDraftKey()) || 'null'); } catch (e) {}
            if (!draft || !draft.group_ids || !draft.group_ids.length || !draft.started_at) return false;
            var elapsed = Math.max(0, Math.round((Date.now() - new Date(draft.started_at).getTime()) / 1000));
            var remaining = Math.max(0, Number(draft.total_seconds || draft.group_count * 120) - elapsed);
            if (remaining <= 0) {
                clearTestDraft();
                return false;
            }
            var groupMap = {};
            (unitData.quizGroups || []).forEach(function(group) { groupMap[group.id] = group; });
            var selected = draft.group_ids.map(function(id) { return groupMap[id]; }).filter(Boolean);
            if (!selected.length) return false;
            activeTestGroups = selected;
            activeTestGroupCount = Number(draft.group_count || selected.length);
            testStartedAt = draft.started_at;
            var root = document.getElementById('test-groups');
            document.getElementById('test-summary').classList.remove('show');
            document.getElementById('test-setup').classList.add('locked');
            document.getElementById('test-setup').style.display = 'none';
            root.innerHTML = selected.map(function(group, groupIndex) {
                var questions = (group.questions || []).map(function(question, index) {
                    return renderTestQuestion(group, question, index);
                }).join('');
                return '<div class="group-card">' +
                    '<div class="group-head">' +
                        '<div class="group-head-main">' +
                            '<div class="set-meta-row"><span class="set-badge test-set">Test Set ' + (groupIndex + 1) + '</span></div>' +
                            renderWordBank(group.wordList || []) +
                        '</div>' +
                        renderFontControls() +
                    '</div>' +
                    '<div class="question-list">' + questions + '</div>' +
                '</div>';
            }).join('');
            setupAdaptiveInputs(root);
            Object.keys(draft.answers || {}).forEach(function(key) {
                var card = document.querySelector('[data-question-key="' + CSS.escape(key) + '"]');
                if (!card) return;
                var input = card.querySelector('.answer-input');
                var trigger = card.querySelector('.blank-trigger');
                if (input) input.value = draft.answers[key] || '';
                if (trigger && draft.answers[key]) {
                    trigger.textContent = draft.answers[key];
                    trigger.classList.add('selected');
                }
            });
            document.getElementById('submit-test-btn').style.display = 'inline-flex';
            startTimer(remaining);
            return true;
        }

        function startTestWithGroups(selected, answers) {
            if (!selected || !selected.length) return false;
            activeTestGroups = selected;
            activeTestGroupCount = selected.length;
            testStartedAt = new Date().toISOString();
            var root = document.getElementById('test-groups');
            document.getElementById('test-summary').classList.remove('show');
            document.getElementById('test-setup').classList.add('locked');
            document.getElementById('test-setup').style.display = 'none';
            root.innerHTML = selected.map(function(group, groupIndex) {
                var questions = (group.questions || []).map(function(question, index) {
                    return renderTestQuestion(group, question, index);
                }).join('');
                return '<div class="group-card">' +
                    '<div class="group-head">' +
                        '<div class="group-head-main">' +
                            '<div class="set-meta-row"><span class="set-badge test-set">Test Set ' + (groupIndex + 1) + '</span></div>' +
                            renderWordBank(group.wordList || []) +
                        '</div>' +
                        renderFontControls() +
                    '</div>' +
                    '<div class="question-list">' + questions + '</div>' +
                '</div>';
            }).join('');
            setupAdaptiveInputs(root);
            Object.keys(answers || {}).forEach(function(key) {
                var card = document.querySelector('[data-question-key="' + CSS.escape(key) + '"]');
                if (!card) return;
                var input = card.querySelector('.answer-input');
                var trigger = card.querySelector('.blank-trigger');
                if (input) input.value = answers[key] || '';
                if (trigger && answers[key]) {
                    trigger.textContent = answers[key];
                    trigger.classList.add('selected');
                }
            });
            document.getElementById('submit-test-btn').style.display = 'inline-flex';
            startTimer(selected.length * 120);
            saveTestDraft();
            return true;
        }

        function fetchPrefillAttempt(force, attemptIdOverride) {
            var targetAttemptId = attemptIdOverride || prefillAttemptId;
            if (!targetAttemptId || !window.MrCatCloud) return Promise.resolve(false);
            if (params.get('retry') === '1') return Promise.resolve(false);
            try {
                if (!force && localStorage.getItem(testDraftKey())) return Promise.resolve(false);
            } catch (e) {}
            return window.MrCatCloud.callFunction('getDashboard', {
                action: 'getAttemptForRetry',
                attempt_id: targetAttemptId
            }).then(function(result) {
                if (!result || !result.success || !result.attempt || !result.attempt.answers) return false;
                var groupIds = [];
                Object.keys(result.attempt.answers).forEach(function(key) {
                    var groupId = key.split(':')[0];
                    if (groupId && groupIds.indexOf(groupId) === -1) groupIds.push(groupId);
                });
                var groupMap = {};
                (unitData.quizGroups || []).forEach(function(group) { groupMap[group.id] = group; });
                var selected = groupIds.map(function(id) { return groupMap[id]; }).filter(Boolean);
                return startTestWithGroups(selected, result.attempt.answers);
            }).catch(function() { return false; });
        }

        function startTest() {
            var groups = unitData.quizGroups || [];
            var count = Number(document.getElementById('test-group-count').value || 1);
            var selected = shuffleList(groups).slice(0, count);
            activeTestGroups = selected;
            activeTestGroupCount = count;
            testStartedAt = new Date().toISOString();
            var root = document.getElementById('test-groups');
            document.getElementById('test-summary').classList.remove('show');
            document.getElementById('test-setup').classList.add('locked');
            document.getElementById('test-setup').style.display = 'none';
            root.innerHTML = selected.map(function(group, groupIndex) {
                var questions = shuffleList(group.questions || []).map(function(question, index) {
                    return renderTestQuestion(group, question, index);
                }).join('');
                return '<div class="group-card">' +
                    '<div class="group-head">' +
                        '<div class="group-head-main">' +
                            '<div class="set-meta-row">' +
                                '<span class="set-badge test-set">Test Set ' + (groupIndex + 1) + '</span>' +
                            '</div>' +
                            renderWordBank(group.wordList || []) +
                        '</div>' +
                        renderFontControls() +
                    '</div>' +
                    '<div class="question-list">' + questions + '</div>' +
                '</div>';
            }).join('');
            setupAdaptiveInputs(root);
            document.getElementById('submit-test-btn').style.display = 'inline-flex';
            startTimer(count * 120);
            saveTestDraft();
            root.scrollIntoView({ behavior: 'smooth', block: 'start' });
        }

        function submitTest() {
            clearInterval(testTimerId);
            var questions = document.querySelectorAll('.test-question');
            if (!questions.length) return;
            submitVocabularyTest(questions);
        }

        function submitVocabularyTest(questions) {
            var answers = {};
            var answerRevealConfirmed = false;
            questions.forEach(function(card) {
                var key = card.getAttribute('data-question-key');
                var input = card.querySelector('.answer-input');
                answers[key] = input ? input.value : '';
            });

            var submitButton = document.getElementById('submit-test-btn');
            submitButton.disabled = true;
            submitButton.textContent = 'Submitting...';

            window.MrCatCloud.callFunction('submitAttempt', {
                set_id: setId,
                assignment_id: assignmentId || null,
                mode: 'vocabulary_test',
                answers: answers,
                selected_group_count: activeTestGroupCount,
                selected_group_ids: activeTestGroups.map(function(group) { return group.id; }),
                started_at: testStartedAt,
                duration_seconds: testStartedAt
                    ? Math.max(0, Math.round((Date.now() - new Date(testStartedAt).getTime()) / 1000))
                    : null
            }).then(function(response) {
                if (!response || !response.success) {
                    throw new Error(response && response.message || 'Unable to submit this test.');
                }
                var resultMap = {};
                (response.question_results || []).forEach(function(item) {
                    resultMap[item.question_id] = item;
                });
                questions.forEach(function(card) {
                    var key = card.getAttribute('data-question-key');
                    var result = resultMap[key];
                    var input = card.querySelector('.answer-input');
                    var trigger = card.querySelector('.blank-trigger');
                    var reveal = card.querySelector('.reveal');
                    card.classList.remove('correct', 'wrong', 'pending', 'choice-open');
                    if (input) input.disabled = true;
                    if (trigger) trigger.disabled = true;
                    if (!result) return;
                    card.classList.add(result.correct ? 'correct' : (input && input.value.trim() ? 'wrong' : 'pending'));
                    if (!result.correct && !response.feedback_locked) {
                        reveal.innerHTML = '<strong>Answer:</strong> ' + escapeHtml(result.correct_answer) +
                            (result.explanation ? '<br><br>' + escapeHtml(result.explanation) : '');
                        reveal.classList.remove('show');
                        reveal.setAttribute('data-answer-reveal', '1');
                    }
                });

                var summary = document.getElementById('test-summary');
                var resultLabel = response.recorded
                    ? (response.passed ? 'Passed' : 'Failed')
                    : 'Self-test only — this result was not saved';
                summary.innerHTML = 'Score: ' + response.correct_count + ' / ' + response.question_count +
                    (response.passed ? ' · ' + response.percentage + '%' : '') + ' · ' + resultLabel;
                summary.classList.add('show');
                showResultOverlay(response);
                var timer = document.getElementById('test-timer');
                timer.textContent = 'Finished';
                timer.classList.remove('sticky');
                submitButton.style.display = 'none';
                clearTestDraft();
            }).catch(function(error) {
                submitButton.disabled = false;
                submitButton.textContent = 'Submit Test';
                alert(error && error.message ? error.message : 'Unable to submit. Please try again.');
            });
        }

        function wireEvents() {
            document.querySelectorAll('.switch-btn').forEach(function(btn) {
                btn.addEventListener('click', function() {
                    switchView(btn.getAttribute('data-view-target'));
                });
            });

            document.getElementById('word-search').addEventListener('input', function(e) {
                var query = e.target.value.trim().toLowerCase();
                var filtered = (unitData.words || []).filter(function(word) {
                    return [word.word, word.simpleDefinition, word.meaning, String(word.number)].join(' ').toLowerCase().indexOf(query) !== -1;
                });
                renderWords(filtered);
            });

            document.getElementById('self-study-groups').addEventListener('click', function(e) {
                var action = e.target.getAttribute('data-action');
                var groupId = e.target.getAttribute('data-group');
                if (!action || !groupId) return;
                if (action === 'check') checkGroupAnswers(groupId);
                if (action === 'hide') hideGroupAnswers(groupId);
                if (action === 'clear-all') clearGroupAnswers(groupId);
            });

            document.getElementById('dictation-build-btn').addEventListener('click', buildDictationFromSelection);
            document.getElementById('dictation-check-btn').addEventListener('click', checkDictation);
            document.getElementById('start-test-btn').addEventListener('click', startTest);
            document.getElementById('submit-test-btn').addEventListener('click', submitTest);
            document.getElementById('test-group-count').addEventListener('change', updateTestCountNote);
            document.addEventListener('click', handleChoiceClick);
            document.getElementById('test-groups').addEventListener('change', saveTestDraft);
            document.getElementById('test-groups').addEventListener('input', saveTestDraft);
            window.addEventListener('beforeunload', saveTestDraft);
        }

        function renderUnit(data) {
            unitData = data;
            renderHero(data);
            renderWords(data.words || []);
            renderSelfStudyGroups(data.quizGroups || []);
            renderDictationRangeOptions(data.words || []);
            renderTestOptions(data.quizGroups || []);
            wireEvents();
            document.getElementById('loading').style.display = 'none';
            document.getElementById('app').style.display = 'block';
            renderHistoryToolbar();
            if (!restoreTestDraft()) fetchPrefillAttempt();
        }

        updateIdentityStatus();

        function loadVocabularyUnit() {
            return fetch('content/vocabulary/' + encodeURIComponent(setId) + '.json?_=' + Date.now())
                .then(function(response) {
                    if (!response.ok) throw new Error('Vocabulary unit not found.');
                    return response.json();
                })
                .catch(function(fetchError) {
                    return injectScript('content/vocabulary/' + encodeURIComponent(setId) + '.js')
                        .then(function() {
                            var fallback = window.__VOCABULARY_UNITS__ && window.__VOCABULARY_UNITS__[setId];
                            if (!fallback) throw fetchError;
                            return fallback;
                        });
                });
        }

        loadVocabularyUnit()
            .then(renderUnit)
            .catch(function(error) {
                showError(error.message || 'Unable to load vocabulary unit.');
            });
    </script>
</body>
