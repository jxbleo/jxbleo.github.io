<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Climate Change & Economic Degrowth - Practice</title>
  <style>
    :root {
      --primary-color: #2c3e50;
      --secondary-color: #27ae60;
      --bg-color: #f4f7f6;
      --card-bg: #ffffff;
      --text-main: #333333;
      --text-light: #666666;
      --border-color: #e0e6ed;
      --correct-bg: #e8f8f5;
      --wrong-bg: #fdf2e9;
    }

    body {
      font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      background-color: var(--bg-color);
      color: var(--text-main);
      line-height: 1.6;
      margin: 0;
      padding: 40px 20px;
    }

    .container {
      max-width: 900px;
      margin: 0 auto;
      background: var(--card-bg);
      padding: 40px 50px;
      border-radius: 12px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
    }

    h1 {
      color: var(--primary-color);
      text-align: center;
      border-bottom: 2px solid var(--secondary-color);
      padding-bottom: 15px;
      margin-bottom: 40px;
    }

    h2 {
      color: var(--primary-color);
      font-size: 1.4em;
      margin-top: 40px;
      border-left: 4px solid var(--secondary-color);
      padding-left: 15px;
    }

    ol.fill-blanks {
      list-style-type: decimal;
      padding-left: 30px;
      color: var(--text-light);
      font-size: 1.05em;
    }

    ol.fill-blanks li {
      margin-bottom: 15px;
    }

    /* 输入框样式 */
    .blank-input {
      border: none;
      border-bottom: 2px solid var(--primary-color);
      width: 150px;
      font-size: 1em;
      padding: 2px 5px;
      margin-left: 10px;
      color: var(--primary-color);
    }

    .blank-input:focus {
      outline: none;
      border-color: var(--secondary-color);
    }

    #submit-answers {
      background-color: var(--secondary-color);
      color: white;
      border: none;
      padding: 12px 25px;
      font-size: 1em;
      border-radius: 6px;
      cursor: pointer;
      margin-top: 30px;
      transition: background-color 0.3s ease;
    }

    #submit-answers:hover {
      background-color: #22a047;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Climate Change & Economic Degrowth - Practice</h1>
    
    <h2>填空题部分</h2>
    <ol class="fill-blanks">
      <li>
        经济衰退的核心理念是<input type="text" class="blank-input" name="blank1" placeholder="填写答案" />
      </li>
      <li>
        “去增长”运动鼓励社会寻求 <input type="text" class="blank-input" name="blank2" placeholder="填写答案" /> 的生活方式
      </li>
      <li>
        资源消耗过快会导致 <input type="text" class="blank-input" name="blank3" placeholder="填写答案" />
      </li>
      <!-- 这里请继续补充30道题，示范中只写三个 -->
    </ol>

    <button id="submit-answers">提交答案</button>
  </div>

  <script>
    // 请替换成你自己的 Formspree 表单地址
    const formspreeUrl = 'https://formspree.io/f/your_form_id';

    document.getElementById('submit-answers').addEventListener('click', async () => {
      const inputs = document.querySelectorAll('.blank-input');
      const answers = {};

      inputs.forEach((input, idx) => {
        answers[`填空题${idx + 1}`] = input.value.trim();
      });

      const payload = {
        answers: answers,
        timestamp: new Date().toISOString()
      };

      try {
        const response = await fetch(https://formspree.io/f/mpqnvgel, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify(payload)
        });

        if (response.ok) {
          alert('答案提交成功！感谢你的参与。');
          // 可选：清空输入框
          inputs.forEach(input => (input.value = ''));
        } else {
          alert('提交失败，请稍后重试。');
        }
      } catch (error) {
        alert('提交出错，请检查网络连接。');
        console.error('提交错误：', error);
      }
    });
  </script>
</body>
</html>
