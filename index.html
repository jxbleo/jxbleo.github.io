<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Leo's English Practice Hub</title>
    <style>
        :root {
            --text-primary: #000000;
            --text-secondary: #666666;
            --text-muted: #8f8f8f;
            --border: #e5e7eb;
            --bg-hover: #f1f1f1;
            --bg-card: #ffffff;
            --bg-page: #ffffff;
        }

        * {
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-page);
            color: var(--text-primary);
            margin: 0;
            padding: 0;
            line-height: 1.6;
        }

        .header {
            background: linear-gradient(135deg, #f97316 0%, #ec4899 100%);
            color: #fff;
            padding: 60px 20px 36px;
            text-align: center;
            position: relative;
        }

        .header h1 {
            margin: 0;
            font-size: 2.2em;
            font-weight: 600;
            letter-spacing: -0.5px;
        }

        .header p {
            margin: 12px 0 0 0;
            color: rgba(255, 255, 255, 0.8);
            font-size: 1.05em;
        }

        .login-status {
            position: absolute;
            top: 16px;
            right: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 0.85em;
        }
        .login-status .user-btn {
            background: rgba(255,255,255,0.2);
            border: 1px solid rgba(255,255,255,0.3);
            color: #fff;
            padding: 6px 14px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.85em;
            font-weight: 500;
            transition: all 0.2s;
        }
        .login-status .user-btn:hover {
            background: rgba(255,255,255,0.3);
        }
        .login-status .user-name {
            font-weight: 600;
        }
        .login-status .logout-btn {
            background: none;
            border: none;
            color: rgba(255,255,255,0.7);
            cursor: pointer;
            font-size: 0.8em;
            padding: 2px 6px;
            border-radius: 4px;
        }
        .login-status .logout-btn:hover {
            color: #fff;
            background: rgba(255,255,255,0.15);
        }

        .container {
            max-width: 800px;
            margin: 40px auto;
            padding: 0 20px;
            padding-bottom: 60px;
        }

        .section-title {
            display: flex;
            align-items: center;
            color: var(--text-primary);
            font-size: 1.15em;
            margin-bottom: 20px;
            margin-top: 45px;
            font-weight: 600;
            cursor: pointer;
            user-select: none;
        }

        .menu-list {
            list-style: none;
            padding: 0;
            margin: 0;
            display: grid;
            gap: 16px;
        }

        .menu-card {
            background: var(--bg-card);
            border-radius: 6px;
            transition: all 0.2s ease;
            border: 1px solid var(--border);
            overflow: hidden;
        }

        .menu-card:hover {
            background: var(--bg-hover);
            border-color: #d1d5db;
        }

        .menu-card a {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 24px;
            text-decoration: none;
            color: inherit;
        }

        .card-content {
            flex: 1;
            padding-right: 20px;
        }

        .card-title {
            margin: 0 0 8px 0;
            color: var(--text-primary);
            font-size: 1.15em;
            font-weight: 600;
        }

        .card-date {
            margin: 0;
            font-size: 0.9em;
            color: var(--text-muted);
            font-weight: 500;
        }

        .meta-row {
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
            margin: 0 0 12px 0;
        }

        .tags {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .tag {
            font-size: 0.75em;
            padding: 4px 10px;
            border-radius: 20px;
            font-weight: 600;
            letter-spacing: 0.3px;
        }

        .tag-bbc {
            background-color: var(--bg-hover);
            color: var(--text-muted);
        }

        .tag-topic {
            background-color: var(--bg-hover);
            color: var(--text-secondary);
        }
        
        .tag-pending {
            background-color: var(--bg-hover);
            color: var(--text-muted);
        }

        .section {
            margin-bottom: 10px;
        }

        .toggle-btn {
            margin-left: auto;
            font-size: 0.65em;
            color: var(--text-muted);
            font-weight: 500;
            cursor: pointer;
            user-select: none;
            padding: 2px 6px;
            border-radius: 4px;
            transition: background-color 0.2s;
        }
        .toggle-btn:hover {
            background-color: var(--bg-hover);
        }

        .section-description {
            font-size: 0.9em;
            color: var(--text-secondary);
            margin: 0 0 16px 0;
            line-height: 1.5;
        }

        .card-note {
            margin: 12px 0 0 0;
            font-size: 0.88em;
            color: var(--text-secondary);
        }

        .placeholder-card .menu-card-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 24px;
        }

        .placeholder-card .card-title {
            color: var(--text-muted);
            margin-bottom: 6px;
        }

        .placeholder-card .card-note {
            margin-top: 0;
            color: var(--text-muted);
        }

        .user-dropdown {
            position: relative;
            display: inline-flex;
            align-items: center;
        }
        .user-name {
            cursor: pointer;
            font-weight: 600;
            font-size: 0.9em;
            color: var(--text-primary);
        }
        .user-arrow {
            font-size: 0.75em;
            margin-left: 2px;
        }
        .dropdown-menu {
            display: none;
            position: absolute;
            top: 100%;
            right: 0;
            margin-top: 6px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 8px;
            box-shadow: 0 4px 16px rgba(0,0,0,0.1);
            z-index: 1001;
            min-width: 100px;
            overflow: hidden;
        }
        .dropdown-menu.show {
            display: block;
        }
        .dropdown-menu .logout-btn {
            display: block;
            width: 100%;
            padding: 10px 16px;
            background: none;
            border: none;
            color: var(--text-primary);
            font-size: 0.85em;
            cursor: pointer;
            text-align: left;
            white-space: nowrap;
        }
        .dropdown-menu .logout-btn:hover {
            background: var(--bg-hover);
        }

        .search-btn {
            display: block;
            width: fit-content;
            margin: 0 auto 12px;
            font-size: 0.85em;
            color: var(--text-muted);
            cursor: pointer;
            user-select: none;
            padding: 6px 12px;
            border-radius: 6px;
            transition: all 0.2s;
        }
        .search-btn:hover {
            color: var(--text-primary);
            background-color: var(--bg-hover);
        }

        .arrow-box {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 36px;
            height: 36px;
            background-color: var(--bg-hover);
            border-radius: 50%;
            color: var(--text-secondary);
            font-weight: 500;
            font-size: 1.1em;
            transition: background-color 0.2s, color 0.2s;
        }

        .menu-card:hover .arrow-box {
            background-color: #e5e7eb;
            color: var(--text-primary);
        }

        .search-input {
            width: 100%;
            padding: 10px 14px;
            margin-bottom: 16px;
            border: 1px solid var(--border);
            border-radius: 6px;
            font-size: 0.95em;
            outline: none;
            box-sizing: border-box;
            background: var(--bg-page);
            transition: border-color 0.2s;
            color: var(--text-primary);
        }
        .search-input:focus {
            border-color: var(--text-primary);
        }
        .search-input::placeholder {
            color: var(--text-muted);
        }

        .champ-section {
            position: relative;
        }
        .champ-section::before {
            content: '';
            position: absolute;
            top: -10px; left: -10px; right: -10px; bottom: -10px;
            border: 2px dashed #f97316;
            border-radius: 12px;
            pointer-events: none;
            opacity: 0.4;
        }
        .champ-section .section-title {
            color: #ea580c;
        }

        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }
        .modal-overlay.active {
            display: flex;
        }
        .modal-box {
            background: var(--bg-card);
            border-radius: 12px;
            padding: 32px;
            max-width: 400px;
            width: 90%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            position: relative;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 8px;
        }
        .modal-header h2 {
            margin: 0;
            font-size: 1.3em;
        }
        .modal-close {
            background: none;
            border: none;
            font-size: 1.5em;
            cursor: pointer;
            color: var(--text-muted);
            padding: 0 4px;
            line-height: 1;
            border-radius: 4px;
        }
        .modal-close:hover {
            background: var(--bg-hover);
        }
        .modal-box p {
            color: var(--text-muted);
            margin: 0 0 20px;
            font-size: 0.9em;
        }
        .custom-login {
            display: flex;
            gap: 8px;
            margin-top: 14px;
        }
        .custom-login input {
            flex: 1;
            padding: 12px;
            border: 1px solid var(--border);
            border-radius: 8px;
            font-size: 0.95em;
            background: var(--bg-page);
            color: var(--text-primary);
            outline: none;
        }
        .custom-login input:focus {
            border-color: #f97316;
        }
        .custom-login button {
            padding: 12px 20px;
            background: #f97316;
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 0.95em;
            font-weight: 600;
            cursor: pointer;
            white-space: nowrap;
        }
        .custom-login button:hover {
            background: #ea580c;
        }
        .modal-hint {
            font-size: 0.85em;
            color: var(--text-muted);
            margin-top: 6px;
            min-height: 1.2em;
        }
        .divider {
            display: flex;
            align-items: center;
            gap: 10px;
            margin: 16px 0;
            color: var(--text-muted);
            font-size: 0.85em;
        }
        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            border-top: 1px solid var(--border);
        }
        .visitor-btn {
            display: block;
            width: 100%;
            padding: 12px;
            background: transparent;
            color: var(--text-muted);
            border: 1px solid var(--border);
            border-radius: 8px;
            font-size: 0.9em;
            cursor: pointer;
            transition: all 0.15s;
        }
        .visitor-btn:hover {
            border-color: var(--text-muted);
            color: var(--text-primary);
        }
        .login-note {
            text-align: center;
            color: var(--text-muted);
            font-size: 0.8em;
            margin-top: 16px;
        }

        @media screen and (max-width: 768px) {
            .header { padding: 40px 15px; }
            .header h1 { font-size: 1.8em; }
            .menu-card a { padding: 18px 15px; }
            .card-title { font-size: 1.1em; }
            .arrow-box { width: 32px; height: 32px; font-size: 1em; }
        }
    </style>
</head>
<body>

    <div class="header">
        <div class="login-status" id="login-status"></div>
        <h1>🚀 Leo's English Hub</h1>
        <p>Master English through engaging listening & reading practice</p>
    </div>

    <div class="container">
        <div id="sections-root"></div>
    </div>

    <div class="modal-overlay" id="login-modal">
        <div class="modal-box">
            <div class="modal-header">
                <h2>Select Student</h2>
                <button class="modal-close" id="modal-close">&times;</button>
            </div>
            <p>Enter your student ID to start practicing.</p>
            <div class="custom-login">
                <input type="text" id="custom-id-input" placeholder="Or enter a student ID..." autocomplete="off" />
                <button id="custom-login-btn">Login</button>
            </div>
            <div id="login-error" class="modal-hint"></div>
            <div class="divider"><span>or</span></div>
            <button class="visitor-btn" id="visitor-btn">Continue as Visitor</button>
        </div>
    </div>

<script>
    var homeCatalog = null;

    function injectScript(src) {
        return new Promise(function(resolve, reject) {
            var script = document.createElement('script');
            script.src = src;
            script.onload = resolve;
            script.onerror = reject;
            document.head.appendChild(script);
        });
    }

    function escapeHtml(value) {
        return String(value || '')
            .replace(/&/g, '&amp;')
            .replace(/</g, '&lt;')
            .replace(/>/g, '&gt;')
            .replace(/"/g, '&quot;')
            .replace(/'/g, '&#39;');
    }

    function buildTags(tags, topic) {
        var html = '';
        if (topic) {
            html += '<span class="tag tag-topic">' + escapeHtml(topic) + '</span>';
        }
        if (tags && tags.length) {
            for (var i = 0; i < tags.length; i++) {
                html += '<span class="tag tag-bbc">' + escapeHtml(tags[i]) + '</span>';
            }
        }
        return html;
    }

    function buildCard(item) {
        return '<li class="menu-card">' +
            '<a class="practice-link" href="' + escapeHtml(item.href) + '">' +
                '<div class="card-content">' +
                    '<h3 class="card-title">' + escapeHtml(item.title) + '</h3>' +
                    '<div class="meta-row">' +
                        '<div class="card-date">' + escapeHtml(item.displayValue || item.id) + '</div>' +
                        '<div class="tags">' + buildTags(item.tags, item.topic) + '</div>' +
                    '</div>' +
                    (item.note ? '<p class="card-note">' + escapeHtml(item.note) + '</p>' : '') +
                '</div>' +
                '<div class="arrow-box">→</div>' +
            '</a>' +
        '</li>';
    }

    function buildPlaceholderCard(section) {
        return '<li class="menu-card placeholder-card">' +
            '<div class="menu-card-content">' +
                '<div class="card-content">' +
                    '<h3 class="card-title">' + escapeHtml(section.emptyMessage || 'Developing') + '</h3>' +
                    '<p class="card-note">' + escapeHtml(section.emptyNote || '') + '</p>' +
                '</div>' +
                '<div class="arrow-box" style="background-color: transparent; color: var(--text-muted);">⏳</div>' +
            '</div>' +
        '</li>';
    }

    function sortSectionItems(items, section) {
        var sorted = items.slice();
        if (section.sortType === 'date_desc') {
            sorted.sort(function(a, b) {
                return String(b.sortValue || '').localeCompare(String(a.sortValue || ''));
            });
        } else if (section.sortType === 'number_asc') {
            sorted.sort(function(a, b) {
                return Number(a.sortValue || 0) - Number(b.sortValue || 0);
            });
        } else if (section.sortType === 'number_desc') {
            sorted.sort(function(a, b) {
                return Number(b.sortValue || 0) - Number(a.sortValue || 0);
            });
        }
        return sorted;
    }

    function buildSection(section, items) {
        var canSearch = section.searchEnabled && items.length > 0;
        var cardsHtml = '';
        if (items.length) {
            var sortedItems = sortSectionItems(items, section);
            for (var i = 0; i < sortedItems.length; i++) {
                cardsHtml += buildCard(sortedItems[i]);
            }
        } else {
            cardsHtml = buildPlaceholderCard(section);
        }

        return '<div class="section" data-section-id="' + escapeHtml(section.id) + '">' +
            '<div class="section-title">' +
                escapeHtml(section.title) +
                '<span class="toggle-btn">[show]</span>' +
            '</div>' +
            '<div class="section-body" style="display: none;">' +
                (canSearch ? '<span class="search-btn" style="display: none;">search</span>' : '') +
                (canSearch ? '<input type="text" class="search-input" placeholder="' + escapeHtml(section.searchPlaceholder || 'Search...') + '" style="display: none;">' : '') +
                '<ul class="menu-list">' + cardsHtml + '</ul>' +
            '</div>' +
        '</div>';
    }

    function applyUserToPracticeLinks(user) {
        var links = document.querySelectorAll('a.practice-link');
        for (var i = 0; i < links.length; i++) {
            var href = links[i].getAttribute('href');
            if (!href) continue;
            var cleanHref = href.replace(/[?&]user=[^&]*/, '').replace(/\?$/, '');
            if (user) {
                var sep = cleanHref.indexOf('?') !== -1 ? '&' : '?';
                links[i].href = cleanHref + sep + 'user=' + encodeURIComponent(user);
            } else {
                links[i].href = cleanHref;
            }
        }
    }

    function renderHomeSections() {
        var root = document.getElementById('sections-root');
        if (!homeCatalog || !homeCatalog.sections) {
            root.innerHTML = '<p class="section-description">Unable to load the home catalog.</p>';
            return;
        }

        var itemsBySection = {};
        var visibleItems = (homeCatalog.items || []).filter(function(item) {
            return item.visible !== false;
        });

        for (var i = 0; i < visibleItems.length; i++) {
            var item = visibleItems[i];
            if (!itemsBySection[item.sectionId]) itemsBySection[item.sectionId] = [];
            itemsBySection[item.sectionId].push(item);
        }

        var html = '';
        for (var j = 0; j < homeCatalog.sections.length; j++) {
            var section = homeCatalog.sections[j];
            html += buildSection(section, itemsBySection[section.id] || []);
        }
        root.innerHTML = html;

        var user = getCurrentUser();
        if (user) applyUserToPracticeLinks(user);
    }

    function loadHomeCatalog() {
        var root = document.getElementById('sections-root');
        root.innerHTML = '<p class="section-description">Loading lessons...</p>';
        if (window.__HOME_CATALOG__) {
            homeCatalog = window.__HOME_CATALOG__;
            renderHomeSections();
            return Promise.resolve();
        }
        return fetch('data/home-catalog.json?_=' + Date.now())
            .then(function(response) {
                if (!response.ok) {
                    throw new Error('Failed to load home catalog');
                }
                return response.json();
            })
            .then(function(data) {
                homeCatalog = data;
                renderHomeSections();
            })
            .catch(function() {
                return injectScript('data/home-catalog.js?_=' + Date.now())
                    .then(function() {
                        if (!window.__HOME_CATALOG__) throw new Error('Fallback catalog missing');
                        homeCatalog = window.__HOME_CATALOG__;
                        renderHomeSections();
                    })
                    .catch(function() {
                        root.innerHTML = '<p class="section-description">Unable to load the lesson catalog right now.</p>';
                    });
            });
    }

    function filterSection(input) {
        var query = input.value.toLowerCase();
        var list = input.nextElementSibling;
        if (!list || !list.classList.contains('menu-list')) return;
        var cards = list.querySelectorAll('.menu-card');
        for (var i = 0; i < cards.length; i++) {
            cards[i].style.display = cards[i].textContent.toLowerCase().indexOf(query) !== -1 ? '' : 'none';
        }
    }

    function toggleSection(titleEl) {
        var section = titleEl.closest('.section');
        var body = section.querySelector('.section-body');
        var btn = titleEl.querySelector('.toggle-btn');
        var isOpen = body.style.display !== 'none';
        body.style.display = isOpen ? 'none' : 'block';
        btn.textContent = isOpen ? '[show]' : '[hide]';
        var searchBtn = section.querySelector('.search-btn');
        if (searchBtn) {
            searchBtn.style.display = isOpen ? 'none' : 'block';
        }
        if (isOpen) {
            var input = section.querySelector('.search-input');
            if (input) input.style.display = 'none';
        }
    }

    function toggleSearch(btn) {
        var section = btn.closest('.section');
        var input = section.querySelector('.search-input');
        if (!input) return;
        var isHidden = input.style.display === 'none' || input.style.display === '';
        input.style.display = isHidden ? 'block' : 'none';
        if (isHidden) input.focus();
    }

    var students = [
        { id: 'EI6688', label: '甘昕雨Eilene' },
        { id: 'EV3389', label: '刘榆雯Eva' },
        { id: 'LEO6666', label: 'jxbleo' }
    ];

    var validIds = ['EI6688', 'EV3389', 'LEO6666'];

    var pendingHref = null;

    function getCurrentUser() {
        return localStorage.getItem('opencode_user') || '';
    }

    function isVisitor() {
        return localStorage.getItem('opencode_visitor') === 'true';
    }

    function selectStudent(id) {
        localStorage.setItem('opencode_user', id);
        localStorage.removeItem('opencode_visitor');
        hideLoginModal();
        updateLoginStatus();
        navigateAfterLogin();
    }

    function setVisitorMode() {
        localStorage.removeItem('opencode_user');
        localStorage.setItem('opencode_visitor', 'true');
    }

    function showLoginModal(href) {
        pendingHref = href;
        var input = document.getElementById('custom-id-input');
        if (input) input.value = '';
        var err = document.getElementById('login-error');
        if (err) err.textContent = '';
        document.getElementById('login-modal').classList.add('active');
        if (input) setTimeout(function() { input.focus(); }, 100);
    }

    function hideLoginModal() {
        document.getElementById('login-modal').classList.remove('active');
        pendingHref = null;
    }

    function navigateAfterLogin() {
        if (!pendingHref) return;
        var user = localStorage.getItem('opencode_user');
        if (user) {
            var sep = pendingHref.indexOf('?') !== -1 ? '&' : '?';
            window.location.href = pendingHref + sep + 'user=' + encodeURIComponent(user);
        } else {
            window.location.href = pendingHref;
        }
    }

    function handleCustomLogin() {
        var input = document.getElementById('custom-id-input');
        var id = input.value.trim();
        var errEl = document.getElementById('login-error');
        if (!id) {
            errEl.textContent = 'Please enter a student ID.';
            return;
        }
        if (validIds.indexOf(id) !== -1) {
            errEl.textContent = '';
            selectStudent(id);
        } else {
            errEl.textContent = 'Unknown ID: "' + id + '"';
            if (confirm('No matching ID for "' + id + '". Continue as visitor?')) {
                setVisitorMode();
                hideLoginModal();
                updateLoginStatus();
                navigateAfterLogin();
            }
        }
    }

    function logoutUser() {
        localStorage.removeItem('opencode_user');
        localStorage.removeItem('opencode_visitor');
        updateLoginStatus();
        applyUserToPracticeLinks('');
    }

    function updateLoginStatus() {
        var statusEl = document.getElementById('login-status');
        var user = getCurrentUser();
        if (user) {
            var label = user;
            for (var i = 0; i < students.length; i++) {
                if (students[i].id === user) { label = students[i].label; break; }
            }
            statusEl.innerHTML = '<div class="user-dropdown">' +
                '<span class="user-name" id="user-name-trigger">' + label + ' <span class="user-arrow">&#9662;</span></span>' +
                '<div class="dropdown-menu" id="dropdown-menu">' +
                    '<button class="logout-btn" id="logout-btn">Logout</button>' +
                '</div>' +
            '</div>';
            document.getElementById('user-name-trigger').addEventListener('click', function(e) {
                e.stopPropagation();
                document.getElementById('dropdown-menu').classList.toggle('show');
            });
            document.getElementById('logout-btn').addEventListener('click', function(e) {
                e.stopPropagation();
                document.getElementById('dropdown-menu').classList.remove('show');
                logoutUser();
            });
            document.addEventListener('click', function() {
                var menu = document.getElementById('dropdown-menu');
                if (menu) menu.classList.remove('show');
            }, { once: false });
        } else {
            statusEl.innerHTML = '<button class="user-btn" id="login-btn-header">Login</button>';
            document.getElementById('login-btn-header').addEventListener('click', function() {
                localStorage.removeItem('opencode_visitor');
                showLoginModal(null);
            });
        }
    }

    document.addEventListener('click', function(e) {
        var titleEl = e.target.closest('.section-title');
        if (titleEl) {
            toggleSection(titleEl);
            return;
        }

        var searchBtn = e.target.closest('.search-btn');
        if (searchBtn) {
            e.stopPropagation();
            toggleSearch(searchBtn);
            return;
        }

        var link = e.target.closest('a.practice-link');
        if (!link) return;
        var href = link.getAttribute('href');
        if (!href || href.indexOf('user=') !== -1) return;
        e.preventDefault();
        var storedUser = localStorage.getItem('opencode_user');
        if (storedUser) {
            var sep = href.indexOf('?') !== -1 ? '&' : '?';
            window.location.href = href + sep + 'user=' + encodeURIComponent(storedUser);
            return;
        }
        if (isVisitor()) {
            window.location.href = href;
            return;
        }
        showLoginModal(href);
    });

    document.getElementById('modal-close').addEventListener('click', hideLoginModal);
    document.getElementById('login-modal').addEventListener('click', function(e) {
        if (e.target === this) hideLoginModal();
    });
    document.getElementById('custom-login-btn').addEventListener('click', handleCustomLogin);
    document.getElementById('custom-id-input').addEventListener('keydown', function(e) {
        if (e.key === 'Enter') handleCustomLogin();
    });
    document.getElementById('visitor-btn').addEventListener('click', function() {
        setVisitorMode();
        hideLoginModal();
        updateLoginStatus();
        navigateAfterLogin();
    });

    document.addEventListener('input', function(e) {
        if (e.target.classList.contains('search-input')) {
            filterSection(e.target);
        }
    });

    loadHomeCatalog();

    (function() {
        var urlMatch = window.location.search.match(/[?&]user=([^&]*)/);
        var urlUser = urlMatch ? decodeURIComponent(urlMatch[1].replace(/\+/g, ' ')) : null;
        var storedUser = localStorage.getItem('opencode_user');
        var user = urlUser || storedUser;
        if (urlUser && urlUser !== storedUser) {
            localStorage.setItem('opencode_user', urlUser);
            localStorage.removeItem('opencode_visitor');
        }
        if (user) {
            applyUserToPracticeLinks(user);
        }
        updateLoginStatus();
    })();
</script>

</body>
</html>
