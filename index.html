<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Leo's English Practice Hub</title>
    <style>
        :root {
            --text-primary: #000000;
            --text-secondary: #666666;
            --text-muted: #8f8f8f;
            --border: #e5e7eb;
            --bg-hover: #f1f1f1;
            --bg-card: #ffffff;
            --bg-page: #ffffff;
        }

        * {
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-page);
            color: var(--text-primary);
            margin: 0;
            padding: 0;
            line-height: 1.6;
        }

        .header {
            background: linear-gradient(135deg, #f97316 0%, #ec4899 100%);
            color: #fff;
            padding: 60px 20px 36px;
            text-align: center;
        }

        .header h1 {
            margin: 0;
            font-size: 2.2em;
            font-weight: 600;
            letter-spacing: -0.5px;
        }

        .header p {
            margin: 12px 0 0 0;
            color: rgba(255, 255, 255, 0.8);
            font-size: 1.05em;
        }

        .container {
            max-width: 800px;
            margin: 40px auto;
            padding: 0 20px;
            padding-bottom: 60px; /* 底部留白 */
        }

        .section-title {
            display: flex;
            align-items: center;
            color: var(--text-primary);
            font-size: 1.15em;
            margin-bottom: 20px;
            margin-top: 45px;
            font-weight: 600;
            cursor: pointer;
            user-select: none;
        }

        /* 菜单卡片列表 */
        .menu-list {
            list-style: none;
            padding: 0;
            margin: 0;
            display: grid;
            gap: 16px;
        }

        .menu-card {
            background: var(--bg-card);
            border-radius: 6px;
            transition: all 0.2s ease;
            border: 1px solid var(--border);
            overflow: hidden;
        }

        .menu-card:hover {
            background: var(--bg-hover);
            border-color: #d1d5db;
        }

        .menu-card a {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 24px;
            text-decoration: none;
            color: inherit;
        }

        .card-content {
            flex: 1;
            padding-right: 20px;
        }

        .card-title {
            margin: 0 0 8px 0;
            color: var(--text-primary);
            font-size: 1.15em;
            font-weight: 600;
        }

        /* 日期样式 */
        .card-date {
            margin: 0;
            font-size: 0.9em;
            color: var(--text-muted);
            font-weight: 500;
        }

        .meta-row {
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
            margin: 0 0 12px 0;
        }

        /* 彩色小标签 */
        .tags {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .tag {
            font-size: 0.75em;
            padding: 4px 10px;
            border-radius: 20px;
            font-weight: 600;
            letter-spacing: 0.3px;
        }

        .tag-bbc {
            background-color: var(--bg-hover);
            color: var(--text-muted);
        }

        .tag-topic {
            background-color: var(--bg-hover);
            color: var(--text-secondary);
        }
        
        .tag-pending {
            background-color: var(--bg-hover);
            color: var(--text-muted);
        }

        .section {
            margin-bottom: 10px;
        }

        .toggle-btn {
            margin-left: auto;
            font-size: 0.65em;
            color: var(--text-muted);
            font-weight: 500;
            cursor: pointer;
            user-select: none;
            padding: 2px 6px;
            border-radius: 4px;
            transition: background-color 0.2s;
        }
        .toggle-btn:hover {
            background-color: var(--bg-hover);
        }

        .search-btn {
            display: block;
            width: fit-content;
            margin: 0 auto 12px;
            font-size: 0.85em;
            color: var(--text-muted);
            cursor: pointer;
            user-select: none;
            padding: 6px 12px;
            border-radius: 6px;
            transition: all 0.2s;
        }
        .search-btn:hover {
            color: var(--text-primary);
            background-color: var(--bg-hover);
        }

        .arrow-box {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 36px;
            height: 36px;
            background-color: var(--bg-hover);
            border-radius: 50%;
            color: var(--text-secondary);
            font-weight: 500;
            font-size: 1.1em;
            transition: background-color 0.2s, color 0.2s;
        }

        .menu-card:hover .arrow-box {
            background-color: #e5e7eb;
            color: var(--text-primary);
        }

        .search-input {
            width: 100%;
            padding: 10px 14px;
            margin-bottom: 16px;
            border: 1px solid var(--border);
            border-radius: 6px;
            font-size: 0.95em;
            outline: none;
            box-sizing: border-box;
            background: var(--bg-page);
            transition: border-color 0.2s;
            color: var(--text-primary);
        }
        .search-input:focus {
            border-color: var(--text-primary);
        }
        .search-input::placeholder {
            color: var(--text-muted);
        }

        /* 手机端适配 */
        @media screen and (max-width: 768px) {
            .header { padding: 40px 15px; }
            .header h1 { font-size: 1.8em; }
            .menu-card a { padding: 18px 15px; }
            .card-title { font-size: 1.1em; }
            .arrow-box { width: 32px; height: 32px; font-size: 1em; }
        }
    </style>
</head>
<body>

    <!-- 顶部欢迎横幅 -->
    <div class="header">
        <h1>🚀 Leo's English Hub</h1>
        <p>Master English through engaging listening & reading practice</p>
    </div>

    <div class="container">

    <div class="section">
        <div class="section-title" onclick="toggleSection(this)">
            BBC 6 Minute English
            <span class="toggle-btn">[show]</span>
        </div>
        <div class="section-body" style="display: none;">
            <span class="search-btn" style="display: none;" onclick="event.stopPropagation(); toggleSearch(this)">search</span>
            <input type="text" class="search-input" placeholder="Search title, date or topic..." oninput="filterSection(this)" style="display: none;">
            <ul class="menu-list" id="bbc-list"></ul>
        </div>
    </div>

    <div class="section">
        <div class="section-title" onclick="toggleSection(this)">
            IELTS Reading
            <span class="toggle-btn">[show]</span>
        </div>
        <div class="section-body" style="display: none;">
            <span class="search-btn" style="display: none;" onclick="event.stopPropagation(); toggleSearch(this)">search</span>
            <input type="text" class="search-input" placeholder="Search title or topic..." oninput="filterSection(this)" style="display: none;">
            <ul class="menu-list" id="ielts-list"></ul>
        </div>
    </div>

    <div class="section">
        <div class="section-title" onclick="toggleSection(this)">
            Vocabulary
            <span class="toggle-btn">[show]</span>
        </div>
        <div class="section-body" style="display: none;">
            <ul class="menu-list">
                <li class="menu-card">
                    <a href="#">
                        <div class="card-content">
                            <h3 class="card-title" style="color: var(--text-muted); margin-bottom: 0;">Coming soon...</h3>
                        </div>
                        <div class="arrow-box" style="background-color: transparent; color: var(--text-muted);">⏳</div>
                    </a>
                </li>
            </ul>
        </div>
    </div>

    <div class="section">
        <div class="section-title" onclick="toggleSection(this)">
            Grammar
            <span class="toggle-btn">[show]</span>
        </div>
        <div class="section-body" style="display: none;">
            <ul class="menu-list">
                <li class="menu-card">
                    <a href="#">
                        <div class="card-content">
                            <h3 class="card-title" style="color: var(--text-muted); margin-bottom: 0;">Coming soon...</h3>
                        </div>
                        <div class="arrow-box" style="background-color: transparent; color: var(--text-muted);">⏳</div>
                    </a>
                </li>
            </ul>
        </div>
    </div>

    </div>

<script>
    var bbcData = [
        { date: '2026-03-19', title: 'How do we adapt to the cold?', topic: 'Science / Health', file: '260319-how-do-we-adapt-to-the-cold.html' },
        { date: '2025-09-11', title: 'What causes hearing loss?', topic: 'Health / Science', file: '250911-what-causes-hearing-loss.html' },
        { date: '2025-09-04', title: 'The joys of writing lists', topic: 'Daily Life / Psychology', file: '250904-the-joys-of-writing-lists.html' },
        { date: '2025-08-28', title: 'What\'s it like to be a twin?', topic: 'Science / Identity', file: '250828-whats-it-like-to-be-a-twin.html' },
        { date: '2025-08-21', title: 'What\'s your favourite snack?', topic: 'Food / Lifestyle', file: '250821-whats-your-favourite-snack.html' },
        { date: '2025-08-14', title: 'Grownups buying kids toys', topic: 'Consumer Trends / Nostalgia', file: '250814-grownups-buying-kids-toys.html' },
        { date: '2025-08-07', title: 'Are you flourishing?', topic: 'Wellbeing / Psychology', file: '250807-are-you-flourishing.html' },
        { date: '2025-07-31', title: 'What is the manosphere?', topic: 'Society / Online Culture', file: '250731-what-is-the-manosphere.html' },
        { date: '2025-07-24', title: 'What is economic degrowth?', topic: 'Environment / Economy', file: '250724-what-is-degrowth.html' }
    ];

    var ieltsData = [
        { date: '2', title: 'Making Every Drop Count', topic: 'Environment / Water', file: 'making-every-drop-count.html', label: 'IELTS Reading Passage' },
        { date: '1', title: 'Ant Intelligence', topic: 'Science / Nature', file: 'ant-intelligence.html', label: 'IELTS Reading Passage' }
    ];

    function renderCard(item, dateLabel) {
        return '<li class="menu-card">' +
            '<a href="' + item.file + '">' +
                '<div class="card-content">' +
                    '<h3 class="card-title">' + item.title + '</h3>' +
                    '<div class="meta-row">' +
                        '<div class="card-date">' + (dateLabel || item.date) + '</div>' +
                        '<div class="tags"><span class="tag tag-topic">' + item.topic + '</span></div>' +
                    '</div>' +
                '</div>' +
                '<div class="arrow-box">→</div>' +
            '</a>' +
        '</li>';
    }

    function renderSection(listId, data, dateLabel) {
        var list = document.getElementById(listId);
        if (!list) return;
        data.sort(function(a, b) { return b.date.localeCompare(a.date); });
        list.innerHTML = '';
        for (var i = 0; i < data.length; i++) {
            list.innerHTML += renderCard(data[i], dateLabel);
        }
    }

    function filterSection(input) {
        var query = input.value.toLowerCase();
        var list = input.nextElementSibling;
        if (!list || !list.classList.contains('menu-list')) return;
        var cards = list.querySelectorAll('.menu-card');
        for (var i = 0; i < cards.length; i++) {
            cards[i].style.display = cards[i].textContent.toLowerCase().indexOf(query) !== -1 ? '' : 'none';
        }
    }

    function toggleSection(titleEl) {
        var section = titleEl.closest('.section');
        var body = section.querySelector('.section-body');
        var btn = titleEl.querySelector('.toggle-btn');
        var isOpen = body.style.display !== 'none';
        body.style.display = isOpen ? 'none' : 'block';
        btn.textContent = isOpen ? '[show]' : '[hide]';
        var searchBtn = section.querySelector('.search-btn');
        if (searchBtn) {
            searchBtn.style.display = isOpen ? 'none' : 'block';
        }
        if (isOpen) {
            var input = section.querySelector('.search-input');
            if (input) input.style.display = 'none';
        }
    }

    function toggleSearch(btn) {
        var section = btn.closest('.section');
        var input = section.querySelector('.search-input');
        var isHidden = input.style.display === 'none' || input.style.display === '';
        input.style.display = isHidden ? 'block' : 'none';
        if (isHidden) input.focus();
    }

    renderSection('bbc-list', bbcData);
    renderSection('ielts-list', ieltsData, 'IELTS Reading Passage');
</script>

</body>
</html>
